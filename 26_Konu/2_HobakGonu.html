<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>호박고누</title>
  <style>
    body {
      display: flex; flex-direction: column; align-items: center;
      background-color: #f4f1ea; font-family: 'Malgun Gothic', sans-serif;
      padding: 15px; margin: 0;
      -webkit-user-select: none; user-select: none;
      box-sizing: border-box;
    }

    h1 {
      font-size: clamp(2rem, 8vw, 3.5rem);
      color: #5d4037;
      margin: 15px 0;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
    }

    #selection-area, #info-panel {
      width: 100%; max-width: 576px; box-sizing: border-box;
    }

    #selection-area {
      background: white; padding: 20px; border-radius: 20px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px;
      text-align: center; border: 2px solid #e0dcd0;
    }

    .selection-title { font-size: 1.2rem; font-weight: bold; margin-bottom: 15px; }
    .btn-group { display: flex; gap: 10px; justify-content: center; }

    #game-container {
      position: relative;
      width: 100%;
      max-width: 576px;
      aspect-ratio: 1 / 1.25; 
      border-radius: 20px;
      background-color: #fffdf9;
      box-shadow: 0 10px 20px rgba(0,0,0,0.1);
      border: 7px solid #ccc;
      box-sizing: border-box;
      touch-action: none;
      overflow: hidden;
    }

    #board-canvas {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 1;
    }

    .node {
      position: absolute;
      width: 12.5%; 
      aspect-ratio: 1 / 1;
      border-radius: 50%;
      display: flex; justify-content: center; align-items: center;
      cursor: pointer; z-index: 2;
      transition: transform 0.2s;
      border: 4px solid #ddd;
      box-sizing: border-box;
      transform: translate(-50%, -50%);
    }
    
    .node.empty { background-color: rgba(255, 255, 255, 0.8); border-color: #5d4037; }
    .node.red { background-color: #ff4d4d; border-color: #b30000; box-shadow: 0 5px 0 #b30000; }
    .node.blue { background-color: #4d94ff; border-color: #0047b3; box-shadow: 0 5px 0 #0047b3; }
    .node.selected { transform: translate(-50%, -50%) scale(1.2); outline: 5px solid #ffd700; z-index: 3; }
    .node.hint { border: 4px dashed #2ecc71; background-color: rgba(46, 204, 113, 0.1); }

    #info-panel { margin-top: 25px; } /* 상단 여백 추가 */

    .status-badge { padding: 10px 25px; border-radius: 30px; font-weight: bold; font-size: 1.5rem; margin-bottom: 15px; display: none; }
    .red-turn { background-color: #ffe6e6; color: #b30000; }
    .blue-turn { background-color: #e6f2ff; color: #0047b3; }
    
    .choice-btn { padding: 10px 20px; font-size: 1rem; font-weight: bold; color: white; border: none; border-radius: 10px; cursor: pointer; flex: 1; }
    .btn-red { background-color: #ff4d4d; border-bottom: 4px solid #b30000; }
    .btn-blue { background-color: #4d94ff; border-bottom: 4px solid #0047b3; }

    #score-board { 
      display: flex; justify-content: space-around; 
      background: #fff; padding: 15px; border-radius: 15px; 
      margin-top: 0px; /* 게임판과의 간격을 늘림 */
      margin-bottom: 20px; 
      border: 2px solid #5d4037; 
    }
    .score-value { font-size: 1.8rem; font-weight: bold; }
    .rules-box { background: #fff; padding: 15px; border-radius: 15px; font-size: 0.95rem; text-align: left; border: 1px solid #ddd; line-height: 1.6; }

    #victory-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(5px); z-index: 100; justify-content: center; align-items: center; padding: 20px; }
    .modal-content { background: white; padding: 40px; border-radius: 30px; text-align: center; width: 100%; max-width: 400px; box-sizing: border-box; }
  </style>
</head>
<body>

  <h1>호박고누</h1>

  <div id="selection-area">
    <div class="selection-title">먼저 시작할 팀을 선택하세요.</div>
    <div class="btn-group">
      <button class="choice-btn btn-red" onclick="startGame('red')">빨간팀 선공</button>
      <button class="choice-btn btn-blue" onclick="startGame('blue')">파란팀 선공</button>
    </div>
  </div>

  <div id="turn-badge" class="status-badge"></div>

  <div id="game-container">
    <canvas id="board-canvas" width="576" height="720"></canvas>
  </div>

  <div id="info-panel">
    <div id="score-board">
      <div class="score-item">
        <div style="font-size: 0.8rem; color: #666;">🔴 빨간팀 승리</div>
        <div id="red-wins" class="score-value red-score" style="color:#ff4d4d">0</div>
      </div>
      <div style="border-left: 1px solid #ddd;"></div>
      <div class="score-item">
        <div style="font-size: 0.8rem; color: #666;">🔵 파란팀 승리</div>
        <div id="blue-wins" class="score-value blue-score" style="color:#4d94ff">0</div>
      </div>
    </div>

    <div class="rules-box">
      <strong>⚠️ 게임 규칙</strong><br>
      • 내 집 양 끝에서 중앙으로만 이동 가능.<br>
      • 집에서 중앙 원으로 나가면 돌아올 수 없음.<br>
      • 상대방의 집(3칸)은 들어갈 수 없음.<br>
      • 상대를 가두어 움직이지 못하게 하면 승리!
    </div>
    
    <div style="margin-top: 15px; display: flex; gap: 10px; justify-content: center;">
      <button onclick="location.reload()" style="padding:10px 15px; cursor:pointer; border-radius: 8px; border: 1px solid #ccc; background: #fff; font-size:0.9rem;">게임 초기화</button>
      <button onclick="resetScore()" style="padding:10px 15px; cursor:pointer; border-radius: 8px; border: 1px solid #ff4d4d; color: #ff4d4d; background: #fff; font-size:0.9rem;">전적 초기화</button>
    </div>
  </div>

  <div id="victory-modal">
    <div class="modal-content" id="modal-content-box">
      <div style="font-size: 2rem; font-weight: bold; margin-bottom: 10px;">축하합니다!</div>
      <div id="winner-display" style="font-size: 1.5rem; margin-bottom: 25px; color: #666;"></div>
      <button onclick="location.reload()" style="padding: 12px 30px; font-size: 1.1rem; font-weight: bold; color: white; background: #28a745; border: none; border-radius: 30px; cursor: pointer;">새 게임 시작</button>
    </div>
  </div>

<script>
  /* 자바스크립트 부분은 이전과 동일하게 유지됩니다. */
  const container = document.getElementById('game-container');
  const canvas = document.getElementById('board-canvas');
  const ctx = canvas.getContext('2d');
  const turnBadge = document.getElementById('turn-badge');
  const selectionArea = document.getElementById('selection-area');
  const victoryModal = document.getElementById('victory-modal');
  const winnerDisplay = document.getElementById('winner-display');
  const redWinsEl = document.getElementById('red-wins');
  const blueWinsEl = document.getElementById('blue-wins');

  const nodes = [
    { x: 25, y: 10,  type: 'red-home' }, { x: 50, y: 10,  type: 'red-home' }, { x: 75, y: 10,  type: 'red-home' },
    { x: 25, y: 50,  type: 'circle' },   { x: 50, y: 30,  type: 'circle' },   { x: 50, y: 50,  type: 'circle' }, 
    { x: 75, y: 50,  type: 'circle' },   { x: 50, y: 70,  type: 'circle' },
    { x: 25, y: 90,  type: 'blue-home' }, { x: 50, y: 90,  type: 'blue-home' }, { x: 75, y: 90,  type: 'blue-home' }
  ];

  let gameState = {
    pieces: ['red', 'red', 'red', 'empty', 'empty', 'empty', 'empty', 'empty', 'blue', 'blue', 'blue'],
    currentTurn: null,
    selected: null,
    gameStarted: false
  };

  let scores = {
    red: parseInt(localStorage.getItem('gonu_red_wins')) || 0,
    blue: parseInt(localStorage.getItem('gonu_blue_wins')) || 0
  };

  function drawBoardLines() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const mainColor = '#5d4037';
    const boldWidth = 10;
    const w = canvas.width;
    const h = canvas.height;

    const getX = (p) => (p / 100) * w;
    const getY = (p) => (p / 100) * h;

    ctx.strokeStyle = mainColor;
    ctx.lineWidth = boldWidth;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';

    ctx.beginPath();
    ctx.moveTo(getX(nodes[0].x), getY(nodes[0].y));
    ctx.lineTo(getX(nodes[1].x), getY(nodes[1].y));
    ctx.lineTo(getX(nodes[2].x), getY(nodes[2].y));
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(getX(nodes[8].x), getY(nodes[8].y));
    ctx.lineTo(getX(nodes[9].x), getY(nodes[9].y));
    ctx.lineTo(getX(nodes[10].x), getY(nodes[10].y));
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(getX(nodes[3].x), getY(nodes[3].y)); ctx.lineTo(getX(nodes[6].x), getY(nodes[6].y));
    ctx.moveTo(getX(nodes[4].x), getY(nodes[4].y)); ctx.lineTo(getX(nodes[7].x), getY(nodes[7].y));
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(getX(nodes[1].x), getY(nodes[1].y)); ctx.lineTo(getX(nodes[4].x), getY(nodes[4].y));
    ctx.moveTo(getX(nodes[9].x), getY(nodes[9].y)); ctx.lineTo(getX(nodes[7].x), getY(nodes[7].y));
    ctx.stroke();

    const radius = Math.abs(getY(nodes[5].y) - getY(nodes[4].y));
    ctx.beginPath();
    ctx.arc(getX(nodes[5].x), getY(nodes[5].y), radius, 0, Math.PI * 2);
    ctx.stroke();
  }

  function startGame(team) {
    gameState.currentTurn = team;
    gameState.gameStarted = true;
    selectionArea.style.display = 'none';
    turnBadge.style.display = 'inline-block';
    updateBoard();
  }

  function drawNodes() {
    nodes.forEach((node, i) => {
      const div = document.createElement('div');
      div.className = `node ${gameState.pieces[i]}`;
      div.id = `node-${i}`;
      div.style.left = node.x + '%';
      div.style.top = node.y + '%';
      div.onclick = (e) => { e.preventDefault(); handleNodeClick(i); };
      container.appendChild(div);
    });
  }

  function handleNodeClick(index) {
    if (!gameState.gameStarted) return;
    const piece = gameState.pieces[index];
    
    if (piece === gameState.currentTurn) {
      document.querySelectorAll('.node').forEach(n => n.classList.remove('selected', 'hint'));
      gameState.selected = index;
      document.getElementById(`node-${index}`).classList.add('selected');
      getValidMoves(index).forEach(m => document.getElementById(`node-${m}`).classList.add('hint'));
      return;
    }

    if (gameState.selected !== null && piece === 'empty') {
      if (getValidMoves(gameState.selected).includes(index)) {
        gameState.pieces[index] = gameState.currentTurn;
        gameState.pieces[gameState.selected] = 'empty';
        gameState.selected = null;
        gameState.currentTurn = (gameState.currentTurn === 'red') ? 'blue' : 'red';
        updateBoard();
        checkWinner();
      }
    }
  }

  function getValidMoves(idx) {
    const team = gameState.pieces[idx];
    const baseAdj = [[1], [4], [1], [4, 5, 7], [1, 3, 5, 6], [3, 4, 6, 7], [4, 5, 7], [3, 5, 6, 9], [9], [7], [9]];
    return baseAdj[idx].filter(target => {
      if (gameState.pieces[target] !== 'empty') return false;
      if (team === 'red' && nodes[target].type === 'blue-home') return false;
      if (team === 'blue' && nodes[target].type === 'red-home') return false;
      if (team === 'red' && nodes[idx].type === 'circle' && nodes[target].type === 'red-home') return false;
      if (team === 'blue' && nodes[idx].type === 'circle' && nodes[target].type === 'blue-home') return false;
      return true;
    });
  }

  function updateBoard() {
    gameState.pieces.forEach((p, i) => {
      const el = document.getElementById(`node-${i}`);
      if (el) {
        el.className = `node ${p}`;
        el.classList.remove('selected', 'hint');
      }
    });
    if (gameState.currentTurn) {
      turnBadge.textContent = gameState.currentTurn === 'red' ? "빨간팀 차례" : "파란팀 차례";
      turnBadge.className = `status-badge ${gameState.currentTurn === 'red' ? 'red-turn' : 'blue-turn'}`;
      container.style.borderColor = gameState.currentTurn === 'red' ? '#ff4d4d' : '#4d94ff';
    }
  }

  function checkWinner() {
    let canMove = false;
    gameState.pieces.forEach((p, i) => {
      if (p === gameState.currentTurn && getValidMoves(i).length > 0) canMove = true;
    });
    if (!canMove) {
      const winnerTeam = gameState.currentTurn === 'red' ? "blue" : "red";
      scores[winnerTeam]++;
      localStorage.setItem(`gonu_${winnerTeam}_wins`, scores[winnerTeam]);
      winnerDisplay.innerHTML = `<span style="color: ${winnerTeam==='red'?'#ff4d4d':'#4d94ff'}">${winnerTeam==='red'?'빨간팀':'파란팀'}</span>이 승리했습니다!`;
      victoryModal.style.display = 'flex';
      updateScoreDisplay();
    }
  }

  function updateScoreDisplay() {
    redWinsEl.textContent = scores.red;
    blueWinsEl.textContent = scores.blue;
  }

  function resetScore() {
    if(confirm("모든 전적을 초기화할까요?")) {
      scores = { red: 0, blue: 0 };
      localStorage.clear();
      updateScoreDisplay();
    }
  }

  drawBoardLines();
  drawNodes();
  updateScoreDisplay();
</script>
</body>
</html>
