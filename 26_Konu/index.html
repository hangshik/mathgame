<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>고누 놀이</title>
  <style>
    /* 기본 여백 제거 및 전체 높이 설정 */
    html, body { 
      margin: 0; 
      padding: 0; 
      height: 100%; 
      overflow: hidden; 
    }

    body { 
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      background-color: #f4f1ea; 
      font-family: 'Malgun Gothic', sans-serif; 
    }

    /* 상단 메뉴 영역: 화면이 좁으면 다음 줄로 넘어가도록 설정 */
    #game-menu { 
      display: flex; 
      flex-wrap: wrap; /* 너비가 부족하면 다음 줄로 넘김 */
      gap: 10px;      /* 버튼 사이의 가로/세로 간격 */
      padding: 15px; 
      width: 100%;
      justify-content: center; /* 버튼들을 항상 중앙에 배치 */
      background-color: #f4f1ea;
      border-bottom: 1px solid #ddd;
      flex-shrink: 0;
      box-sizing: border-box;
    }

    .menu-btn { 
      display: inline-block;
      padding: 10px 20px; 
      text-decoration: none; 
      color: #5d4037; 
      background: #e0dcd0; 
      border-radius: 8px; 
      font-weight: bold; 
      border: 1px solid #ccc; 
      cursor: pointer;
      transition: all 0.2s;
      font-size: 0.95rem;
      text-align: center;
      /* 모바일에서 너무 작아지지 않도록 최소 너비 설정 */
      min-width: calc(50% - 20px); 
      max-width: 150px;
      box-sizing: border-box;
    }

    /* PC/태블릿 등 화면이 조금 더 넓어지면 버튼 크기 최적화 */
    @media (min-width: 480px) {
      .menu-btn {
        min-width: auto;
        flex: 0 1 auto;
      }
    }

    .menu-btn:hover { background: #d0ccc0; }

    .menu-btn.active { 
      background: #007bff; 
      color: white; 
      border-color: #0056b3; 
    }

    /* iframe 영역: 남은 공간을 100% 채움 */
    #content-frame {
      width: 100%;
      flex-grow: 1; 
      border: none; 
      background: white;
    }
  </style>
</head>
<body>

  <nav id="game-menu">
    <a href="1_UmulGonu.html" target="gameView" class="menu-btn active" onclick="setActive(this)">우물고누</a>
    <a href="2_HobakGonu.html" target="gameView" class="menu-btn" onclick="setActive(this)">호박고누</a>
    <a href="3_JulGonu.html" target="gameView" class="menu-btn" onclick="setActive(this)">줄고누</a>
    <a href="4_ChamGonu.html" target="gameView" class="menu-btn" onclick="setActive(this)">참고누</a>
  </nav>

  <iframe src="1_UmulGonu.html" name="gameView" id="content-frame"></iframe>

  <script>
    function setActive(element) {
      const buttons = document.querySelectorAll('.menu-btn');
      buttons.forEach(btn => btn.classList.remove('active'));
      element.classList.add('active');
    }
  </script>

</body>
</html>
