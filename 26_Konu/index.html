<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>고누 놀이</title>
  <style>
    /* 기본 여백 제거 및 전체 높이 설정 */
    html, body { 
      margin: 0; 
      padding: 0; 
      height: 100%; 
      overflow: hidden; 
    }

    body { 
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      background-color: #f4f1ea; 
      font-family: 'Malgun Gothic', sans-serif; 
    }

    /* 상단 메뉴 영역: 가로 스크롤 지원 */
    #game-menu { 
      display: flex; 
      gap: 10px; 
      padding: 15px 10px; 
      width: 100%;
      justify-content: flex-start; /* 모바일 대응을 위해 시작점 정렬 */
      background-color: #f4f1ea;
      border-bottom: 1px solid #ddd;
      flex-shrink: 0;
      overflow-x: auto; /* 가로 스크롤 허용 */
      white-space: nowrap; /* 버튼 줄바꿈 방지 */
      -webkit-overflow-scrolling: touch; /* iOS 부드러운 스크롤 */
      box-sizing: border-box;
    }

    /* PC/태블릿 큰 화면에서는 중앙 정렬 유지 */
    @media (min-width: 600px) {
      #game-menu {
        justify-content: center;
      }
    }

    /* 스크롤바 숨기기 (선택 사항) */
    #game-menu::-webkit-scrollbar {
      display: none;
    }
    #game-menu {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    .menu-btn { 
      display: inline-block;
      padding: 10px 20px; 
      text-decoration: none; 
      color: #5d4037; 
      background: #e0dcd0; 
      border-radius: 8px; 
      font-weight: bold; 
      border: 1px solid #ccc; 
      cursor: pointer;
      transition: all 0.2s;
      font-size: 0.95rem;
      min-width: 80px; /* 모바일 터치 영역 확보 */
      text-align: center;
    }

    .menu-btn:hover { background: #d0ccc0; }

    .menu-btn.active { 
      background: #007bff; 
      color: white; 
      border-color: #0056b3; 
    }

    /* iframe 영역: 남은 공간을 100% 채움 */
    #content-frame {
      width: 100%;
      flex-grow: 1; 
      border: none; 
      background: white;
    }
  </style>
</head>
<body>

  <nav id="game-menu">
    <a href="1_UmulGonu.html" target="gameView" class="menu-btn active" onclick="setActive(this)">우물고누</a>
    <a href="2_HobakGonu.html" target="gameView" class="menu-btn" onclick="setActive(this)">호박고누</a>
    <a href="3_JulGonu.html" target="gameView" class="menu-btn" onclick="setActive(this)">줄고누</a>
    <a href="4_ChamGonu.html" target="gameView" class="menu-btn" onclick="setActive(this)">참고누</a>
  </nav>

  <iframe src="1_UmulGonu.html" name="gameView" id="content-frame"></iframe>

  <script>
    function setActive(element) {
      const buttons = document.querySelectorAll('.menu-btn');
      buttons.forEach(btn => btn.classList.remove('active'));
      element.classList.add('active');
      
      // 클릭 시 해당 버튼이 스크롤 중앙으로 오게 함 (모바일 편의성)
      element.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
    }
  </script>

</body>
</html>
