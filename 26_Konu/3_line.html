<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>줄고누</title>
  <style>
    body {
      display: flex; flex-direction: column; align-items: center;
      background-color: #f4f1ea; font-family: 'Malgun Gothic', sans-serif;
      padding: 20px; margin: 0; user-select: none; -webkit-touch-callout: none;
    }
    h1 { font-size: 2.8rem; color: #5d4037; margin-bottom: 15px; text-shadow: 2px 2px 4px rgba(0,0,0,0.1); }

    /* 상단 선택 영역 */
    #selection-area {
      background: white; padding: 20px 40px; border-radius: 20px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 25px;
      text-align: center; border: 2px solid #e0dcd0; width: 500px;
    }
    .btn-group { display: flex; gap: 15px; justify-content: center; margin-top: 15px; }
    .choice-btn {
      padding: 12px 25px; font-size: 1.1rem; font-weight: bold;
      color: white; border: none; border-radius: 10px; cursor: pointer; transition: transform 0.2s;
    }
    .btn-red { background-color: #ff4d4d; border-bottom: 4px solid #b30000; }
    .btn-blue { background-color: #4d94ff; border-bottom: 4px solid #0047b3; }

    /* 전적판 */
    #score-board {
      display: flex; justify-content: space-around; width: 500px;
      background: #fff; padding: 15px; border-radius: 15px;
      margin-bottom: 20px; border: 2px solid #5d4037;
    }
    /* 전적 항목 내부의 텍스트와 숫자를 모두 가운데 정렬 */
.score-item { 
  display: flex; 
  flex-direction: column; 
  align-items: center; 
  flex: 1; /* 양쪽 항목이 동일한 너비를 갖도록 설정 */
}
.score-value { font-size: 1.8rem; font-weight: bold; }
    .red-score { color: #ff4d4d; }
    .blue-score { color: #4d94ff; }

    /* 게임 보드 */
    #board-wrapper {
      position: relative; background: #fff;
      border: 7.2px solid #ccc; border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      transition: all 0.3s ease; touch-action: none;
    }
    #grid-canvas { position: absolute; top: 0; left: 0; z-index: 1; pointer-events: none; }
    #piece-layer { position: relative; z-index: 2; display: grid; }

    /* 말 스타일 */
    .cell { display: flex; justify-content: center; align-items: center; cursor: pointer; }
    .piece {
      width: 75%; height: 75%; border-radius: 50%;
      transition: transform 0.2s; border: 4px solid rgba(0,0,0,0.15); box-sizing: border-box;
    }
    .red { background-color: #ff4d4d; border-color: #b30000; box-shadow: 0 5px 0 #b30000; }
    .blue { background-color: #4d94ff; border-color: #0047b3; box-shadow: 0 5px 0 #0047b3; }
    .selected { transform: scale(1.15); outline: 5px solid #ffd700; z-index: 10; }
    .hint { width: 30%; height: 30%; background: rgba(46, 204, 113, 0.5); border-radius: 50%; }

    /* 하단 버튼 중앙 정렬 */
    .button-container {
      display: flex; justify-content: center; gap: 10px; margin-top: 20px; width: 500px;
    }
    .bottom-btn {
      padding: 10px 20px; cursor: pointer; border-radius: 8px; border: 1px solid #ccc; background: #fff;
      font-weight: bold; transition: background 0.2s;
    }
    .btn-danger { border-color: #ff4d4d; color: #ff4d4d; }
    .btn-danger:hover { background: #fff5f5; }

    .status-badge {
      padding: 10px 30px; border-radius: 30px; font-weight: bold; font-size: 1.5rem;
      margin-bottom: 20px; display: none;
    }
    .red-turn { background-color: #ffe6e6; color: #b30000; }
    .blue-turn { background-color: #e6f2ff; color: #0047b3; }

    .rules-box {
      background: #fff; padding: 15px; border-radius: 12px; width: 500px;
      font-size: 0.95rem; text-align: left; border: 1px solid #ddd; line-height: 1.6; margin-top: 15px;
    }

    #victory-modal {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.6); backdrop-filter: blur(5px);
      z-index: 100; justify-content: center; align-items: center;
    }
    .modal-content { background: white; padding: 40px; border-radius: 25px; text-align: center; }
  </style>
</head>
<body oncontextmenu="return false">

  <h1>줄고누</h1>

  <div id="selection-area">
    <div style="font-weight: bold; font-size: 1.3rem; color: #5d4037;">🎮 게임 설정</div>
    <div style="margin-top: 15px;">
      <label for="size-select" style="font-weight: bold;">판 크기: </label>
      <select id="size-select" onchange="updatePreview()" style="padding: 5px 10px; border-radius: 5px; border: 1px solid #5d4037; font-size: 1rem;">
        </select>
    </div>
    <div class="btn-group">
      <button class="choice-btn btn-red" onclick="startGame('red')">빨간팀 선공 시작</button>
      <button class="choice-btn btn-blue" onclick="startGame('blue')">파란팀 선공 시작</button>
    </div>
  </div>

  <div id="turn-badge" class="status-badge"></div>

  <div id="board-wrapper">
    <canvas id="grid-canvas"></canvas>
    <div id="piece-layer"></div>
  </div>


    <div id="score-board" style="margin-top: 20px;">
      <div class="score-item">
        <div style="font-size: 1rem; color: #666;">🔴 빨간팀 승리</div>
        <div id="red-wins" class="score-value red-score">0</div>
      </div>
      <div style="border-left: 1px solid #ddd;"></div>
      <div class="score-item">
        <div style="font-size: 1rem; color: #666;">🔵 파란팀 승리</div>
        <div id="blue-wins" class="score-value blue-score">0</div>
      </div>
    </div>

    <div class="rules-box">
      <strong>⚠️ 게임 규칙</strong><br>
      • 상하좌우 빈칸은 거리 제한 없이 이동 가능합니다.<br>
      • <b>샌드위치</b>: 상대 말 1개를 내 말 둘 사이에 가두면 따냅니다.(단 상대 말 2개 이상은 제외)<br>
      • <b>포위</b>: 구석/변에서 상대 말에 막혀 움직일 곳이 없으면 따냅니다.<br>
      • 상대방 말이 <b>1개</b>만 남으면 승리합니다!
    </div>
  </div>

  <div id="info-panel">
    <div class="button-container">
      <button class="bottom-btn" onclick="location.reload()">게임 초기화</button>
      <button class="bottom-btn btn-danger" onclick="resetScore()">전적 초기화</button>
    </div>


  <div id="victory-modal">
    <div class="modal-content" id="modal-box">
      <div style="font-size: 2.5rem; font-weight: bold; margin-bottom: 15px;">승리!</div>
      <div id="winner-display" style="font-size: 1.5rem; margin-bottom: 25px;"></div>
      <button onclick="location.reload()" style="padding: 12px 35px; background: #28a745; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold;">다시 하기</button>
    </div>
  </div>

<script>
  const sizeSelect = document.getElementById('size-select');
  const boardWrapper = document.getElementById('board-wrapper');
  const pieceLayer = document.getElementById('piece-layer');
  const canvas = document.getElementById('grid-canvas');
  const ctx = canvas.getContext('2d');
  const turnBadge = document.getElementById('turn-badge');
  const selectionArea = document.getElementById('selection-area');
  const victoryModal = document.getElementById('victory-modal');
  const winnerDisplay = document.getElementById('winner-display');

  let size = 4;
  let board = [];
  let currentTurn = null;
  let selectedIdx = null;
  let gameStarted = false;
  const cellSize = 70;

  let scores = {
    red: parseInt(localStorage.getItem('jool_red_wins')) || 0,
    blue: parseInt(localStorage.getItem('jool_blue_wins')) || 0
  };

  function updateScoreUI() {
    document.getElementById('red-wins').textContent = scores.red;
    document.getElementById('blue-wins').textContent = scores.blue;
  }

  function resetScore() {
    if(confirm("모든 전적을 초기화할까요?")) {
      scores = { red: 0, blue: 0 };
      localStorage.setItem('jool_red_wins', 0);
      localStorage.setItem('jool_blue_wins', 0);
      updateScoreUI();
    }
  }

  function setupSizeOptions() {
    for (let i = 4; i <= 20; i += 2) {
      const opt = document.createElement('option');
      opt.value = i;
      opt.textContent = `${i} x ${i}`;
      sizeSelect.appendChild(opt);
    }
  }

  // 게임판 미리보기 (팀 선택 전 상태)
  function updatePreview() {
    if (gameStarted) return;
    size = parseInt(sizeSelect.value);
    board = Array(size * size).fill(null);
    for (let i = 0; i < size; i++) {
      board[i] = 'red';
      board[size * (size - 1) + i] = 'blue';
    }
    drawGrid();
    renderPieces();
  }

  function startGame(team) {
    size = parseInt(sizeSelect.value);
    currentTurn = team;
    gameStarted = true;
    selectionArea.style.display = 'none';
    turnBadge.style.display = 'inline-block';
    updateTurnUI();
    renderPieces();
  }

  function drawGrid() {
    const total = size * cellSize;
    canvas.width = total;
    canvas.height = total;
    boardWrapper.style.width = total + 'px';
    boardWrapper.style.height = total + 'px';

    ctx.strokeStyle = '#5d4037';
    ctx.lineWidth = 6;
    ctx.lineCap = 'round';

    for (let i = 0; i < size; i++) {
      ctx.beginPath();
      ctx.moveTo(cellSize/2, i * cellSize + cellSize/2);
      ctx.lineTo(total - cellSize/2, i * cellSize + cellSize/2);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(i * cellSize + cellSize/2, cellSize/2);
      ctx.lineTo(i * cellSize + cellSize/2, total - cellSize/2);
      ctx.stroke();
    }
  }

  function renderPieces() {
    pieceLayer.style.gridTemplateColumns = `repeat(${size}, 1fr)`;
    pieceLayer.innerHTML = '';
    
    board.forEach((p, i) => {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.style.width = cellSize + 'px';
      cell.style.height = cellSize + 'px';
      cell.onclick = () => handleCellClick(i);

      if (p) {
        const div = document.createElement('div');
        div.className = `piece ${p} ${selectedIdx === i ? 'selected' : ''}`;
        cell.appendChild(div);
      } else if (gameStarted && selectedIdx !== null && getValidMoves(selectedIdx).includes(i)) {
        const hint = document.createElement('div');
        hint.className = 'hint';
        cell.appendChild(hint);
      }
      pieceLayer.appendChild(cell);
    });
  }

  function handleCellClick(idx) {
    if (!gameStarted) return;
    if (board[idx] === currentTurn) {
      selectedIdx = (selectedIdx === idx) ? null : idx;
    } else if (selectedIdx !== null && board[idx] === null) {
      if (getValidMoves(selectedIdx).includes(idx)) {
        executeMove(selectedIdx, idx);
        return;
      }
    } else {
      selectedIdx = null;
    }
    renderPieces();
  }

  function getValidMoves(from) {
    const moves = [];
    const r = Math.floor(from / size), c = from % size;
    const dirs = [[0,1], [0,-1], [1,0], [-1,0]];
    dirs.forEach(([dr, dc]) => {
      let nr = r + dr, nc = c + dc;
      while (nr >= 0 && nr < size && nc >= 0 && nc < size) {
        const tidx = nr * size + nc;
        if (board[tidx] === null) moves.push(tidx);
        else break;
        nr += dr; nc += dc;
      }
    });
    return moves;
  }

  function executeMove(from, to) {
    board[to] = board[from];
    board[from] = null;
    captureLogic(to);
    selectedIdx = null;
    currentTurn = (currentTurn === 'red') ? 'blue' : 'red';
    renderPieces();
    updateTurnUI();
    checkWinner();
  }

  function captureLogic(movedIdx) {
    const r = Math.floor(movedIdx / size), c = movedIdx % size;
    const me = board[movedIdx];
    const enemy = (me === 'red') ? 'blue' : 'red';
    const dirs = [[0,1], [0,-1], [1,0], [-1,0]];

    dirs.forEach(([dr, dc]) => {
      // 1. 샌드위치 포획
      const midR = r + dr, midC = c + dc;
      const endR = r + dr * 2, endC = c + dc * 2;
      if (isInside(endR, endC)) {
        const midIdx = midR * size + midC;
        const endIdx = endR * size + endC;
        if (board[midIdx] === enemy && board[endIdx] === me) {
          board[midIdx] = null;
        }
      }
      // 2. 사방 포위 포획
      const adjR = r + dr, adjC = c + dc;
      if (isInside(adjR, adjC)) {
        const adjIdx = adjR * size + adjC;
        if (board[adjIdx] === enemy && isTrapped(adjIdx, me)) {
          board[adjIdx] = null;
        }
      }
    });
  }

  function isTrapped(idx, attacker) {
    const r = Math.floor(idx / size), c = idx % size;
    const dirs = [[0,1], [0,-1], [1,0], [-1,0]];
    for (let [dr, dc] of dirs) {
      const nr = r + dr, nc = c + dc;
      if (isInside(nr, nc)) {
        if (board[nr * size + nc] === null) return false;
        if (board[nr * size + nc] !== attacker) return false;
      }
    }
    return true;
  }

  function isInside(r, c) { return r >= 0 && r < size && c >= 0 && c < size; }

  function updateTurnUI() {
    const color = (currentTurn === 'red') ? '#ff4d4d' : '#4d94ff';
    turnBadge.textContent = (currentTurn === 'red' ? "빨간팀" : "파란팀") + " 차례";
    turnBadge.className = `status-badge ${currentTurn}-turn`;
    boardWrapper.style.borderColor = color;
    boardWrapper.style.boxShadow = `0 10px 30px ${color}44`;
  }

  function checkWinner() {
    const rCount = board.filter(p => p === 'red').length;
    const bCount = board.filter(p => p === 'blue').length;
    if (rCount <= 1 || bCount <= 1) {
      const winTeam = (rCount > 1) ? 'red' : 'blue';
      scores[winTeam]++;
      localStorage.setItem(`jool_${winTeam}_wins`, scores[winTeam]);
      updateScoreUI();
      winnerDisplay.innerHTML = `<b style="color:${(winTeam==='red'?'#ff4d4d':'#4d94ff')}">${winTeam==='red'?'빨간팀':'파란팀'}</b> 승리!`;
      victoryModal.style.display = 'flex';
      gameStarted = false;
    }
  }

  // 초기화 실행
  setupSizeOptions();
  updatePreview();
  updateScoreUI();
</script>
</body>
</html>
