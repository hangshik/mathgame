<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>참고누 - 반응형</title>
  <style>
    body {
      display: flex; flex-direction: column; align-items: center;
      background-color: #f4f1ea; font-family: 'Malgun Gothic', sans-serif;
      padding: 10px; margin: 0; user-select: none; -webkit-touch-callout: none;
      min-height: 100vh; box-sizing: border-box;
    }
    h1 {
      font-size: clamp(2rem, 8vw, 3.5rem);
      color: #5d4037;
      margin: 15px 0;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
    }

    /* 설정 및 정보 영역 */
    #selection-area, #score-board, .rules-box, .status-badge {
      width: 100%; max-width: 550px; box-sizing: border-box;
    }

    #selection-area {
      background: white; padding: 20px; border-radius: 20px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px;
      text-align: center; border: 2px solid #e0dcd0;
    }
    .btn-group { display: flex; gap: 10px; justify-content: center; margin-top: 15px; }
    .choice-btn {
      flex: 1; padding: 12px 10px; font-size: 1rem; font-weight: bold;
      color: white; border: none; border-radius: 10px; cursor: pointer; transition: transform 0.2s;
    }
    .btn-red { background-color: #ff4d4d; border-bottom: 4px solid #b30000; }
    .btn-blue { background-color: #4d94ff; border-bottom: 4px solid #0047b3; }

    /* 게임 보드 영역 */
    #board-wrapper {
      position: relative; background: #fff;
      border: 6px solid #ccc; border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      width: 92vw; height: 92vw; /* 모바일 비율 */
      max-width: 520px; max-height: 520px; /* PC 최대 크기 */
      margin: 10px 0;
    }
    #grid-canvas { position: absolute; top: 0; left: 0; z-index: 1; pointer-events: none; width: 100%; height: 100%; }
    #piece-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; }

    .node {
      position: absolute; width: 10%; height: 10%; border-radius: 50%;
      transform: translate(-50%, -50%); cursor: pointer;
      display: flex; justify-content: center; align-items: center;
      transition: all 0.2s; z-index: 5;
    }
    .node.empty::after {
      content: ''; width: 60%; height: 60%;
      background-color: rgba(255, 255, 255, 0.9); border: 2px solid #ddd; border-radius: 50%;
    }
    .piece { width: 90%; height: 90%; border-radius: 50%; border: 3px solid rgba(0,0,0,0.15); box-sizing: border-box; }
    .red { background-color: #ff4d4d; border-color: #b30000; box-shadow: 0 3px 0 #b30000; }
    .blue { background-color: #4d94ff; border-color: #0047b3; box-shadow: 0 3px 0 #0047b3; }
    
    .blocked { 
      position: relative; width: 80%; height: 80%; 
      display: flex; justify-content: center; align-items: center;
    }
    .blocked::before, .blocked::after {
      content: ''; position: absolute; width: 100%; height: 4px; 
      background-color: #333; border-radius: 2px;
    }
    .blocked::before { transform: rotate(45deg); }
    .blocked::after { transform: rotate(-45deg); }

    .node.selected { transform: translate(-50%, -50%) scale(1.2); outline: 4px solid #ffd700; z-index: 10; }
    .node.hint { border: 3px dashed #2ecc71; background-color: rgba(46, 204, 113, 0.15); border-radius: 50%; }

    .status-badge {
      padding: 10px 20px; border-radius: 35px; font-weight: bold; font-size: 1.2rem;
      margin-bottom: 15px; display: none; text-align: center;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    .red-turn { background-color: #ffe6e6; color: #b30000; border: 2px solid #ff4d4d; }
    .blue-turn { background-color: #e6f2ff; color: #0047b3; border: 2px solid #4d94ff; }

    #score-board {
      display: flex; justify-content: space-around;
      background: #fff; padding: 12px; border-radius: 15px;
      margin-top: 15px; border: 2px solid #5d4037;
    }
    .score-value { font-size: 1.5rem; font-weight: bold; }
    .score-item { flex: 1; display: flex; flex-direction: column; align-items: center; }

    .rules-box {
      background: #fff; padding: 15px; border-radius: 15px;
      font-size: 0.95rem; text-align: left; border: 1px solid #ddd; line-height: 1.6; margin-top: 15px;
    }

    .modal {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.7); backdrop-filter: blur(5px); z-index: 100;
      justify-content: center; align-items: center;
    }
    .modal-content {
      background: white; padding: 25px; border-radius: 25px; text-align: center;
      width: 85%; max-width: 350px; box-shadow: 0 15px 40px rgba(0,0,0,0.4);
    }
    .modal-btn { padding: 12px 25px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 1rem; margin-top: 15px; }
  </style>
</head>
<body oncontextmenu="return false">

  <h1>참고누</h1>

  <div id="selection-area">
    <div style="font-weight: bold;">먼저 시작할 팀을 선택하세요.</div>
    <div class="btn-group">
      <button class="choice-btn btn-red" onclick="initGame('red')">빨강 선공</button>
      <button class="choice-btn btn-blue" onclick="initGame('blue')">파랑 선공</button>
    </div>
  </div>

  <div id="turn-badge" class="status-badge"></div>

  <div id="board-wrapper">
    <canvas id="grid-canvas"></canvas>
    <div id="piece-layer"></div>
  </div>

  <div id="score-board">
    <div class="score-item">
      <div style="font-size: 0.8rem; color: #666;">🔴 빨강 승리</div>
      <div id="red-wins" class="score-value" style="color:#ff4d4d">0</div>
    </div>
    <div style="border-left: 1px solid #ddd; height: 35px;"></div>
    <div class="score-item">
      <div style="font-size: 0.8rem; color: #666;">🔵 파랑 승리</div>
      <div id="blue-wins" class="score-value" style="color:#4d94ff">0</div>
    </div>
  </div>

  <div class="rules-box">
    <strong>⚠️ 게임 규칙</strong><br>
    • <b>놓기</b>: 빈 자리(하얀 원)에 말을 둡니다. 3개가 나란히 되면(곤) 상대 말을 따고 <b>X</b>를 표시합니다.<br>
    • <b>이동</b>: 모든 말을 다 놓으면 시작됩니다. 선을 따라 한 칸씩 이동하며 곤을 만듭니다.<br>
    • <b>승리</b>: 상대방의 말을 <b>2개</b>만 남게 만들면 최종 승리합니다!
  </div>

  <div style="margin: 20px 0; display: flex; gap: 10px;">
    <button onclick="location.reload()" style="flex:1; padding:10px; cursor:pointer; border-radius:8px; border:1px solid #ccc; background:#fff; font-weight:bold;">게임 초기화</button>
    <button onclick="resetScore()" style="flex:1; padding:10px; cursor:pointer; border-radius:8px; border:1px solid #ff4d4d; color:#ff4d4d; background:#fff; font-weight:bold;">전적 초기화</button>
  </div>

  <div id="gon-modal" class="modal">
    <div class="modal-content" style="border-top: 8px solid #ffd700;">
      <h2 style="font-size: 2rem; color: #d4af37; margin: 0;">" 곤! "</h2>
      <p id="gon-msg" style="font-size: 1rem; margin: 15px 0; line-height: 1.5;"></p>
      <button class="modal-btn" style="background:#333; color:white;" onclick="closeModal('gon-modal')">상대 말 따내기</button>
    </div>
  </div>

  <div id="phase-modal" class="modal">
    <div class="modal-content" style="border-top: 8px solid #2ecc71;">
      <h2 style="font-size: 1.8rem; color: #2ecc71; margin: 0;">🏃 이동 단계 시작</h2>
      <p style="font-size: 1rem; margin: 15px 0;">모든 말을 놓았습니다.<br>이제 말을 움직여 승부를 내세요!</p>
      <button class="modal-btn" style="background:#2ecc71; color:white;" onclick="closeModal('phase-modal')">확인</button>
    </div>
  </div>

<script>
  const canvas = document.getElementById('grid-canvas');
  const ctx = canvas.getContext('2d');
  const pieceLayer = document.getElementById('piece-layer');
  const turnBadge = document.getElementById('turn-badge');
  const boardWrapper = document.getElementById('board-wrapper');
  
  const nodeDef = [
    {x:10,y:10}, {x:50,y:10}, {x:90,y:10}, {x:90,y:50}, {x:90,y:90}, {x:50,y:90}, {x:10,y:90}, {x:10,y:50}, 
    {x:25,y:25}, {x:50,y:25}, {x:75,y:25}, {x:75,y:50}, {x:75,y:75}, {x:50,y:75}, {x:25,y:75}, {x:25,y:50}, 
    {x:37,y:37}, {x:50,y:37}, {x:63,y:37}, {x:63,y:50}, {x:63,y:63}, {x:50,y:63}, {x:37,y:63}, {x:37,y:50}  
  ];

  const adj = [
    [1, 7, 8], [0, 2, 9], [1, 3, 10], [2, 4, 11], [3, 5, 12], [4, 6, 13], [5, 7, 14], [0, 6, 15],
    [9, 15, 0, 16], [1, 8, 10, 17], [9, 11, 2, 18], [3, 10, 12, 19], [11, 13, 4, 20], [5, 12, 14, 21], [13, 15, 6, 22], [7, 8, 14, 23],
    [17, 23, 8], [9, 16, 18], [17, 19, 10], [11, 18, 20], [19, 21, 12], [13, 20, 22], [21, 23, 14], [15, 16, 22]
  ];

  const lines = [
    [0,1,2],[2,3,4],[4,5,6],[6,7,0], [8,9,10],[10,11,12],[12,13,14],[14,15,8], [16,17,18],[18,19,20],[20,21,22],[22,23,16], 
    [1,9,17],[3,11,19],[5,13,21],[7,15,23], [0,8,16],[2,10,18],[4,12,20],[6,14,22]
  ];

  let state = {
    phase: 'placing', board: Array(24).fill(null),
    currentTurn: 'red', selectedIdx: null,
    isRemoving: false, gameActive: false
  };

  let scores = {
    red: parseInt(localStorage.getItem('cham_red_wins')) || 0,
    blue: parseInt(localStorage.getItem('cham_blue_wins')) || 0
  };

  function calculateLayout() {
    const w = boardWrapper.clientWidth;
    canvas.width = w;
    canvas.height = w;
    drawGrid();
    renderNodes();
  }

  function updateScoreUI() {
    document.getElementById('red-wins').textContent = scores.red;
    document.getElementById('blue-wins').textContent = scores.blue;
  }

  function resetScore() {
    if(confirm("전적을 초기화할까요?")) {
      scores = {red:0, blue:0};
      localStorage.setItem('cham_red_wins',0);
      localStorage.setItem('cham_blue_wins',0);
      updateScoreUI();
    }
  }

  function drawGrid() {
    const w = canvas.width, h = canvas.height;
    ctx.clearRect(0, 0, w, h);
    ctx.strokeStyle = '#5d4037';
    ctx.lineWidth = w / 100; // 화면 크기에 비례한 선 두께
    const getPos = (n) => ({x: nodeDef[n].x * w / 100, y: nodeDef[n].y * h / 100});

    for(let i=0; i<3; i++) {
      ctx.beginPath();
      const s = getPos(i*8); ctx.moveTo(s.x, s.y);
      for(let j=1; j<8; j++) { ctx.lineTo(getPos(i*8+j).x, getPos(i*8+j).y); }
      ctx.closePath(); ctx.stroke();
    }
    // 대각선 실선 연결
    [[1,17], [3,19], [5,21], [7,23], [0,16], [2,18], [4,20], [6,22]].forEach(p => {
      ctx.beginPath(); ctx.moveTo(getPos(p[0]).x, getPos(p[0]).y); ctx.lineTo(getPos(p[1]).x, getPos(p[1]).y); ctx.stroke();
    });
  }

  function initGame(team) {
    state.currentTurn = team;
    state.gameActive = true;
    document.getElementById('selection-area').style.display = 'none';
    turnBadge.style.display = 'block';
    updateTurnUI();
    renderNodes();
  }

  function renderNodes() {
    pieceLayer.innerHTML = '';
    nodeDef.forEach((node, i) => {
      const el = document.createElement('div');
      el.className = 'node';
      el.style.left = node.x + '%'; el.style.top = node.y + '%';
      
      const val = state.board[i];
      if(val === 'red' || val === 'blue') {
        const p = document.createElement('div'); p.className = `piece ${val}`; el.appendChild(p);
        if(state.selectedIdx === i) el.classList.add('selected');
      } else if(val === 'blocked') {
        const b = document.createElement('div'); b.className = 'blocked'; el.appendChild(b);
      } else {
        if (state.phase === 'placing' && !state.isRemoving) el.classList.add('empty');
        if (state.phase === 'moving' && state.selectedIdx !== null && adj[state.selectedIdx].includes(i)) el.classList.add('hint');
      }

      el.onclick = () => handleInteraction(i);
      pieceLayer.appendChild(el);
    });
  }

  function handleInteraction(idx) {
    if(!state.gameActive) return;

    if(state.isRemoving) {
      const enemy = state.currentTurn === 'red' ? 'blue' : 'red';
      if(state.board[idx] === enemy) {
        state.board[idx] = (state.phase === 'placing') ? 'blocked' : null;
        state.isRemoving = false;
        endTurn();
        updateTurnUI();
        renderNodes();
      }
      return; 
    }

    if(state.phase === 'placing') {
      if(!state.board[idx]) {
        state.board[idx] = state.currentTurn;
        if(checkGon(idx)) triggerGonPopup();
        else endTurn();
      }
    } else {
      if(state.board[idx] === state.currentTurn) {
        state.selectedIdx = (state.selectedIdx === idx) ? null : idx;
      } else if(state.selectedIdx !== null && !state.board[idx] && adj[state.selectedIdx].includes(idx)) {
        state.board[idx] = state.currentTurn;
        state.board[state.selectedIdx] = null;
        state.selectedIdx = null;
        if(checkGon(idx)) triggerGonPopup();
        else endTurn();
      }
    }
    updateTurnUI();
    renderNodes();
  }

  function triggerGonPopup() {
    const name = state.currentTurn === 'red' ? '빨간팀' : '파란팀';
    document.getElementById('gon-msg').innerHTML = `<b>${name}</b>이 '곤'을 만들었습니다!<br>상대방의 말을 선택해 하나 따내세요.`;
    document.getElementById('gon-modal').style.display = 'flex';
    state.isRemoving = true;
    state.selectedIdx = null;
    updateTurnUI();
  }

  function closeModal(id) { 
    document.getElementById(id).style.display = 'none'; 
    renderNodes(); 
  }

  function endTurn() {
    if(state.phase === 'placing' && state.board.filter(v => v === null).length === 0) {
      state.phase = 'moving';
      state.board = state.board.map(v => v === 'blocked' ? null : v);
      document.getElementById('phase-modal').style.display = 'flex';
    }
    state.currentTurn = state.currentTurn === 'red' ? 'blue' : 'red';
    checkVictory();
  }

  function updateTurnUI() {
    const name = state.currentTurn === 'red' ? "빨간팀" : "파란팀";
    const enemyName = state.currentTurn === 'red' ? "파란말" : "빨간말";
    const enemyColor = state.currentTurn === 'red' ? "#4d94ff" : "#ff4d4d";
    
    if (state.isRemoving) {
      turnBadge.innerHTML = `${name} 차례 (<span style="color:${enemyColor}">${enemyName} 제거</span>)`;
    } else {
      const phaseName = state.phase === 'placing' ? "말 놓기" : "말 이동";
      turnBadge.innerHTML = `${name} 차례 (${phaseName})`;
    }
    turnBadge.className = `status-badge ${state.currentTurn}-turn`;
    boardWrapper.style.borderColor = state.currentTurn === 'red' ? '#ff4d4d' : '#4d94ff';
  }

  function checkVictory() {
    if(state.phase !== 'moving') return;
    const rCount = state.board.filter(v => v === 'red').length;
    const bCount = state.board.filter(v => v === 'blue').length;
    if(rCount < 3 || bCount < 3) {
      const win = rCount >= 3 ? 'red' : 'blue';
      scores[win]++;
      localStorage.setItem('cham_red_wins', scores.red);
      localStorage.setItem('cham_blue_wins', scores.blue);
      alert(`${win === 'red'?'빨간팀':'파란팀'} 승리!`);
      location.reload();
    }
  }

  function checkGon(lastIdx) {
    const me = state.board[lastIdx];
    return lines.some(line => line.includes(lastIdx) && line.every(i => state.board[i] === me));
  }

  window.addEventListener('resize', calculateLayout);
  calculateLayout();
  updateScoreUI();
</script>
</body>
</html>
