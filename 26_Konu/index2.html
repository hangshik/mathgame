<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>호박고누</title>
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      background-color: #f4f1ea;
      font-family: 'Malgun Gothic', sans-serif;
      padding: 20px;
      margin: 0;
      /* 텍스트 선택 방지 */
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      user-select: none;
      /* 모바일 롱탭 메뉴 방지 */
      -webkit-touch-callout: none;
    }

    h1 {
      font-size: 2.5rem;
      color: #5d4037;
      margin: 10px 0;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
    }

    #selection-area {
      background: white;
      padding: 15px 30px;
      border-radius: 20px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
      margin-bottom: 20px;
      text-align: center;
      border: 2px solid #e0dcd0;
      width: 100%;
      max-width: 500px;
      box-sizing: border-box;
    }

    .selection-title { font-size: 1.2rem; font-weight: bold; margin-bottom: 10px; color: #333; }
    .btn-group { display: flex; gap: 15px; justify-content: center; }

    /* 게임 보드 컨테이너 */
    #game-container {
      position: relative;
      width: 576px; height: 720px;
      border-radius: 21.6px;
      box-shadow: 0 11.52px 23.04px rgba(0,0,0,0.1);
      background-image: url('pumpkin.png');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      transition: all 0.3s ease;
      border: 7.2px solid #ccc;
      box-sizing: border-box;
      
      /* 드래그 및 스크롤 방지 (모바일 핵심) */
      touch-action: none; 
      -webkit-user-drag: none;
    }

    .node {
      position: absolute;
      width: 72px; height: 72px;
      border-radius: 50%;
      display: flex; justify-content: center; align-items: center;
      cursor: pointer; z-index: 2;
      transition: transform 0.2s, box-shadow 0.2s;
      border: 4.32px solid #ddd;
      box-sizing: border-box;
      /* 클릭 시 하이라이트 제거 */
      -webkit-tap-highlight-color: transparent;
    }
    
    .node.empty { background-color: rgba(255, 255, 255, 0.7); border-color: #eee; }
    .node.red { background-color: #ff4d4d; border-color: #b30000; box-shadow: 0 5.76px 0 #b30000; }
    .node.blue { background-color: #4d94ff; border-color: #0047b3; box-shadow: 0 5.76px 0 #0047b3; }
    .node.selected { transform: scale(1.2); outline: 5.76px solid #ffd700; z-index: 3; }
    .node.hint { border: 4.32px dashed #2ecc71; background-color: rgba(46, 204, 113, 0.1); }

    #info-panel { margin-top: 20px; text-align: center; width: 576px; }
    
    .status-badge {
      padding: 12px 30px; border-radius: 30px;
      font-weight: bold; font-size: 1.5rem;
      margin-bottom: 15px; display: none;
    }
    .red-turn { background-color: #ffe6e6; color: #b30000; }
    .blue-turn { background-color: #e6f2ff; color: #0047b3; }
    
    .choice-btn {
      padding: 10px 20px; font-size: 1rem; font-weight: bold;
      color: white; border: none; border-radius: 10px;
      cursor: pointer; transition: transform 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-red { background-color: #ff4d4d; border-bottom: 4px solid #b30000; }
    .btn-blue { background-color: #4d94ff; border-bottom: 4px solid #0047b3; }

    #score-board {
      display: flex; justify-content: space-around;
      background: #fff; padding: 15px; border-radius: 15px;
      margin-bottom: 15px; border: 2px solid #5d4037;
    }
    .score-value { font-size: 1.8rem; font-weight: bold; }
    .red-score { color: #ff4d4d; }
    .blue-score { color: #4d94ff; }

    .rules-box {
      background: #fff; padding: 15px; border-radius: 15px;
      font-size: 0.95rem; text-align: left; border: 1px solid #ddd;
      line-height: 1.5; width: 100%; box-sizing: border-box;
    }

    /* 승리 모달 */
    #victory-modal {
      display: none; position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.5); backdrop-filter: blur(5px);
      z-index: 100; justify-content: center; align-items: center;
    }
    .modal-content {
      background: white; padding: 40px; border-radius: 30px;
      text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.3);
      width: 80%; max-width: 400px;
    }

    /* 화면 크기에 따른 스케일 조정 (모바일용) */
    @media (max-width: 600px) {
      body { transform: scale(0.65); transform-origin: top center; padding-top: 10px; }
      h1 { margin-bottom: 5px; }
    }
  </style>
</head>
<body oncontextmenu="return false" ondragstart="return false">

  <h1>호박고누</h1>

  <div id="selection-area">
    <div class="selection-title">먼저 시작할 팀을 선택하세요</div>
    <div class="btn-group">
      <button class="choice-btn btn-red" onclick="startGame('red')">빨간팀 선공</button>
      <button class="choice-btn btn-blue" onclick="startGame('blue')">파란팀 선공</button>
    </div>
  </div>

  <div id="turn-badge" class="status-badge"></div>

  <div id="game-container" onmousedown="return false"></div>

  <div id="info-panel">
    <div id="score-board">
      <div class="score-item">
        <div style="font-size: 0.9rem; color: #666;">🔴 빨간팀 승리</div>
        <div id="red-wins" class="score-value red-score">0</div>
      </div>
      <div style="border-left: 1px solid #ddd;"></div>
      <div class="score-item">
        <div style="font-size: 0.9rem; color: #666;">🔵 파란팀 승리</div>
        <div id="blue-wins" class="score-value blue-score">0</div>
      </div>
    </div>

    <div class="rules-box">
      <strong>⚠️ 게임 규칙</strong><br>
      • 내 집 양 끝에서 중앙으로만 이동 가능.<br>
      • 집에서 중앙 원으로 나가면 돌아올 수 없음.<br>
      • 상대방의 집(3칸)은 들어갈 수 없음.<br>
      • 상대를 가두어 움직이지 못하게 하면 승리!
    </div>
    
    <div style="margin-top: 15px; display: flex; gap: 10px; justify-content: center;">
      <button onclick="location.reload()" style="padding:8px 15px; cursor:pointer; border-radius: 8px; border: 1px solid #ccc; background: #fff;">게임 초기화</button>
      <button onclick="resetScore()" style="padding:8px 15px; cursor:pointer; border-radius: 8px; border: 1px solid #ff4d4d; color: #ff4d4d; background: #fff;">전적 초기화</button>
    </div>
  </div>

  <div id="victory-modal">
    <div class="modal-content" id="modal-content-box">
      <div style="font-size: 2.5rem; font-weight: bold; margin-bottom: 10px;">축하합니다!</div>
      <div id="winner-display" style="font-size: 1.5rem; margin-bottom: 25px; color: #666;"></div>
      <button onclick="location.reload()" style="padding: 12px 35px; font-size: 1.1rem; font-weight: bold; color: white; background: #28a745; border: none; border-radius: 30px; cursor: pointer;">새 게임 시작</button>
    </div>
  </div>

<script>
  // (이전 스크립트 내용과 동일하며, 모바일 최적화 로직 포함)
  const container = document.getElementById('game-container');
  const turnBadge = document.getElementById('turn-badge');
  const selectionArea = document.getElementById('selection-area');
  const victoryModal = document.getElementById('victory-modal');
  const winnerDisplay = document.getElementById('winner-display');
  const redWinsEl = document.getElementById('red-wins');
  const blueWinsEl = document.getElementById('blue-wins');

  const nodes = [
    { x: 144, y: 100.8,  type: 'red-home' }, { x: 288, y: 100.8,  type: 'red-home' }, { x: 432, y: 100.8,  type: 'red-home' },
    { x: 144, y: 360,    type: 'circle' },   { x: 288, y: 244.8,  type: 'circle' },   { x: 288, y: 360,    type: 'circle' }, 
    { x: 432, y: 360,    type: 'circle' },   { x: 288, y: 475.2,  type: 'circle' },
    { x: 144, y: 619.2,  type: 'blue-home' }, { x: 288, y: 619.2,  type: 'blue-home' }, { x: 432, y: 619.2,  type: 'blue-home' }
  ];

  let gameState = {
    pieces: ['red', 'red', 'red', 'empty', 'empty', 'empty', 'empty', 'empty', 'blue', 'blue', 'blue'],
    currentTurn: null,
    selected: null,
    gameStarted: false
  };

  let scores = {
    red: parseInt(localStorage.getItem('gonu_red_wins')) || 0,
    blue: parseInt(localStorage.getItem('gonu_blue_wins')) || 0
  };

  function updateScoreDisplay() {
    redWinsEl.textContent = scores.red;
    blueWinsEl.textContent = scores.blue;
  }

  function resetScore() {
    if(confirm("모든 전적을 초기화할까요?")) {
      scores = { red: 0, blue: 0 };
      localStorage.setItem('gonu_red_wins', 0);
      localStorage.setItem('gonu_blue_wins', 0);
      updateScoreDisplay();
    }
  }

  function startGame(team) {
    gameState.currentTurn = team;
    gameState.gameStarted = true;
    selectionArea.style.display = 'none';
    turnBadge.style.display = 'inline-block';
    updateBoard();
  }

  function drawBoard() {
    container.innerHTML = '';
    nodes.forEach((node, i) => {
      const div = document.createElement('div');
      div.className = `node ${gameState.pieces[i]}`;
      div.id = `node-${i}`;
      div.style.left = (node.x - 36) + 'px';
      div.style.top = (node.y - 36) + 'px';
      // 클릭/터치 이벤트
      div.onclick = (e) => {
        e.preventDefault();
        handleNodeClick(i);
      };
      container.appendChild(div);
    });
  }

  function handleNodeClick(index) {
    if (!gameState.gameStarted) return;
    const piece = gameState.pieces[index];
    
    if (piece === gameState.currentTurn) {
      document.querySelectorAll('.node').forEach(n => n.classList.remove('selected', 'hint'));
      gameState.selected = index;
      document.getElementById(`node-${index}`).classList.add('selected');
      getValidMoves(index).forEach(m => document.getElementById(`node-${m}`).classList.add('hint'));
      return;
    }

    if (gameState.selected !== null && piece === 'empty') {
      if (getValidMoves(gameState.selected).includes(index)) {
        gameState.pieces[index] = gameState.currentTurn;
        gameState.pieces[gameState.selected] = 'empty';
        gameState.selected = null;
        gameState.currentTurn = (gameState.currentTurn === 'red') ? 'blue' : 'red';
        updateBoard();
        checkWinner();
      }
    }
  }

  function getValidMoves(idx) {
    const team = gameState.pieces[idx];
    const possible = [];
    const baseAdj = [
      [1], [0, 2, 4], [1],
      [4, 5, 7], [1, 3, 5, 6], [3, 4, 6, 7], [4, 5, 7], [3, 5, 6, 9],
      [9], [7, 8, 10], [9]
    ];
    baseAdj[idx].forEach(target => {
      if (gameState.pieces[target] !== 'empty') return;
      if (team === 'red' && nodes[target].type === 'blue-home') return;
      if (team === 'blue' && nodes[target].type === 'red-home') return;
      if (team === 'red' && nodes[idx].type === 'circle' && nodes[target].type === 'red-home') return;
      if (team === 'blue' && nodes[idx].type === 'circle' && nodes[target].type === 'blue-home') return;
      if (team === 'red' && idx === 1 && (target === 0 || target === 2)) return;
      if (team === 'blue' && idx === 9 && (target === 8 || target === 10)) return;
      possible.push(target);
    });
    return possible;
  }

  function updateBoard() {
    gameState.pieces.forEach((p, i) => {
      document.getElementById(`node-${i}`).className = `node ${p}`;
    });
    if (gameState.currentTurn) {
      turnBadge.textContent = gameState.currentTurn === 'red' ? "빨간팀 차례" : "파란팀 차례";
      turnBadge.className = `status-badge ${gameState.currentTurn === 'red' ? 'red-turn' : 'blue-turn'}`;
      container.style.border = `7.2px solid ${gameState.currentTurn === 'red' ? '#ff4d4d' : '#4d94ff'}`;
      container.style.boxShadow = `0 11.52px 28.8px ${gameState.currentTurn === 'red' ? 'rgba(255,77,77,0.3)' : 'rgba(77,148,255,0.3)'}`;
    }
  }

  function checkWinner() {
    let canMove = false;
    gameState.pieces.forEach((p, i) => {
      if (p === gameState.currentTurn && getValidMoves(i).length > 0) canMove = true;
    });
    if (!canMove) {
      const winnerTeam = gameState.currentTurn === 'red' ? "blue" : "red";
      const winnerName = winnerTeam === "red" ? "빨간팀" : "파란팀";
      const winnerColor = winnerTeam === "red" ? "#ff4d4d" : "#4d94ff";
      
      scores[winnerTeam]++;
      localStorage.setItem(`gonu_${winnerTeam}_wins`, scores[winnerTeam]);
      updateScoreDisplay();

      winnerDisplay.innerHTML = `<span style="color: ${winnerColor}">${winnerName}</span>이 승리했습니다!`;
      document.getElementById('modal-content-box').style.borderTop = `15px solid ${winnerColor}`;
      victoryModal.style.display = 'flex';
    }
  }

  drawBoard();
  updateScoreDisplay();
</script>
</body>
</html>
