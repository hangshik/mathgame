<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>호박고누</title>
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      background-color: #f4f1ea;
      font-family: 'Malgun Gothic', sans-serif;
      padding: 24px; /* 30px * 0.8 */
      margin: 0;
    }
    #game-container {
      position: relative;
      width: 480px;  /* 600px * 0.8 */
      height: 600px; /* 750px * 0.8 */
      border-radius: 18px; /* 22.5px * 0.8 */
      box-shadow: 0 9.6px 19.2px rgba(0,0,0,0.1);
      background-image: url('pumpkin.png');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      transition: border 0.3s ease, box-shadow 0.3s ease;
      border: 6px solid #ff4d4d; /* 7.5px * 0.8 */
      box-sizing: border-box;
    }
    .node {
      position: absolute;
      width: 60px;  /* 75px * 0.8 */
      height: 60px; /* 75px * 0.8 */
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      z-index: 2;
      transition: transform 0.2s, box-shadow 0.2s;
      border: 3.6px solid #ddd; /* 4.5px * 0.8 */
      box-sizing: border-box;
    }
    .node.empty { background-color: rgba(255, 255, 255, 0.7); border-color: #eee; }
    .node.red { background-color: #ff4d4d; border-color: #b30000; box-shadow: 0 4.8px 0 #b30000; }
    .node.blue { background-color: #4d94ff; border-color: #0047b3; box-shadow: 0 4.8px 0 #0047b3; }
    
    .node.selected { transform: scale(1.2); outline: 4.8px solid #ffd700; z-index: 3; }
    .node.hint { border: 3.6px dashed #2ecc71; background-color: rgba(46, 204, 113, 0.1); }

    #info-panel {
      margin-top: 24px;
      text-align: center;
      width: 480px; /* 게임판 너비와 일치 */
    }
    .status-badge {
      padding: 9.6px 24px;
      border-radius: 24px;
      font-weight: bold;
      font-size: 1.44rem; /* 1.8rem * 0.8 */
      margin-bottom: 18px;
      display: inline-block;
    }
    .red-turn { background-color: #ffe6e6; color: #b30000; }
    .blue-turn { background-color: #e6f2ff; color: #0047b3; }
    
    .rules-box {
      background: #fff;
      padding: 18px;
      border-radius: 12px;
      font-size: 0.96rem; /* 1.2rem * 0.8 */
      text-align: left;
      border: 1.2px solid #ddd;
      line-height: 1.6;
      width: 100%; /* 부모(info-panel) 너비에 맞춤 */
      box-sizing: border-box;
    }

    #victory-modal {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(9.6px);
      z-index: 100;
      justify-content: center;
      align-items: center;
    }

    .modal-content {
      background: white;
      padding: 48px;
      border-radius: 24px;
      text-align: center;
      box-shadow: 0 24px 48px rgba(0,0,0,0.2);
      border-top: 12px solid #28a745;
      animation: popUp 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    @keyframes popUp {
      from { transform: scale(0.8); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    .modal-title {
      font-size: 3rem; /* 3.75rem * 0.8 */
      font-weight: bold;
      margin-bottom: 12px;
      color: #333;
    }

    .winner-text {
      font-size: 1.8rem; /* 2.25rem * 0.8 */
      margin-bottom: 36px;
      color: #666;
    }

    .restart-btn {
      padding: 14.4px 48px;
      font-size: 1.32rem; /* 1.65rem * 0.8 */
      font-weight: bold;
      color: white;
      background-color: #28a745;
      border: none;
      border-radius: 36px;
      cursor: pointer;
      transition: background 0.2s;
    }
  </style>
</head>
<body>

  <div id="info-panel">
    <div id="turn-badge" class="status-badge red-turn">빨간팀 차례</div>
  </div>

  <div id="game-container"></div>

  <div id="info-panel">
    <div class="rules-box">
      <strong>⚠️ 게임 규칙</strong><br>
      • <b>집 탈출:</b> 내 집 좌우(끝)에서 중앙으로만 이동 가능.<br>
      • <b>일방통행:</b> 집에서 중앙 원으로 나가면 돌아올 수 없음.<br>
      • <b>금지구역:</b> 상대방의 집(3칸)은 들어갈 수 없음.<br>
      • <b>승리조건:</b> 상대가 더이상 움직이지 못하도록 가두면 승리!
    </div>
    <button onclick="location.reload()" style="margin-top:18px; padding:9.6px 24px; cursor:pointer; border-radius: 6px; border: 1.2px solid #ccc; font-size: 0.96rem;">게임 초기화</button>
  </div>

  <div id="victory-modal">
    <div class="modal-content">
      <div class="modal-title">축하합니다!</div>
      <div id="winner-display" class="winner-text"></div>
      <button class="restart-btn" onclick="location.reload()">새 게임 시작</button>
    </div>
  </div>

<script>
  const container = document.getElementById('game-container');
  const turnBadge = document.getElementById('turn-badge');
  const victoryModal = document.getElementById('victory-modal');
  const winnerDisplay = document.getElementById('winner-display');

  // 좌표값들에 0.8을 곱하여 노드 위치 재설정 (이전 1.5배 버전 기준 좌표 대비 0.8배)
  const nodes = [
    { x: 120, y: 84,  type: 'red-home' }, { x: 240, y: 84,  type: 'red-home' }, { x: 360, y: 84,  type: 'red-home' },
    { x: 120, y: 300, type: 'circle' },   { x: 240, y: 204, type: 'circle' },   { x: 240, y: 300, type: 'circle' }, 
    { x: 360, y: 300, type: 'circle' },   { x: 240, y: 396, type: 'circle' },
    { x: 120, y: 516, type: 'blue-home' }, { x: 240, y: 516, type: 'blue-home' }, { x: 360, y: 516, type: 'blue-home' }
  ];

  let gameState = {
    pieces: ['red', 'red', 'red', 'empty', 'empty', 'empty', 'empty', 'empty', 'blue', 'blue', 'blue'],
    currentTurn: 'red',
    selected: null
  };

  function drawBoard() {
    container.innerHTML = '';
    nodes.forEach((node, i) => {
      const div = document.createElement('div');
      div.className = `node ${gameState.pieces[i]}`;
      div.id = `node-${i}`;
      // 노드 크기(60px)의 절반인 30px을 빼서 중앙 정렬
      div.style.left = (node.x - 30) + 'px';
      div.style.top = (node.y - 30) + 'px';
      div.onclick = () => handleNodeClick(i);
      container.appendChild(div);
    });
  }

  function handleNodeClick(index) {
    const piece = gameState.pieces[index];
    
    if (piece === gameState.currentTurn) {
      document.querySelectorAll('.node').forEach(n => n.classList.remove('selected', 'hint'));
      gameState.selected = index;
      document.getElementById(`node-${index}`).classList.add('selected');
      
      getValidMoves(index).forEach(m => {
        document.getElementById(`node-${m}`).classList.add('hint');
      });
      return;
    }

    if (gameState.selected !== null && piece === 'empty') {
      const moves = getValidMoves(gameState.selected);
      if (moves.includes(index)) {
        gameState.pieces[index] = gameState.currentTurn;
        gameState.pieces[gameState.selected] = 'empty';
        gameState.selected = null;
        gameState.currentTurn = (gameState.currentTurn === 'red') ? 'blue' : 'red';
        updateBoard();
        checkWinner();
      }
    }
  }

  function getValidMoves(idx) {
    const team = gameState.pieces[idx];
    const possible = [];
    
    const baseAdj = [
      [1], [0, 2, 4], [1],
      [4, 5, 7], [1, 3, 5, 6], [3, 4, 6, 7], [4, 5, 7], [3, 5, 6, 9],
      [9], [7, 8, 10], [9]
    ];

    baseAdj[idx].forEach(target => {
      if (gameState.pieces[target] !== 'empty') return;
      if (team === 'red' && nodes[target].type === 'blue-home') return;
      if (team === 'blue' && nodes[target].type === 'red-home') return;
      if (team === 'red' && nodes[idx].type === 'circle' && nodes[target].type === 'red-home') return;
      if (team === 'blue' && nodes[idx].type === 'circle' && nodes[target].type === 'blue-home') return;
      if (team === 'red' && idx === 1 && (target === 0 || target === 2)) return;
      if (team === 'blue' && idx === 9 && (target === 8 || target === 10)) return;
      possible.push(target);
    });
    
    return possible;
  }

  function updateBoard() {
    gameState.pieces.forEach((p, i) => {
      const node = document.getElementById(`node-${i}`);
      node.className = `node ${p}`;
    });
    
    turnBadge.textContent = gameState.currentTurn === 'red' ? "빨간팀 차례" : "파란팀 차례";
    turnBadge.className = `status-badge ${gameState.currentTurn === 'red' ? 'red-turn' : 'blue-turn'}`;

    if (gameState.currentTurn === 'red') {
      container.style.border = "6px solid #ff4d4d";
      container.style.boxShadow = "0 9.6px 24px rgba(255, 77, 77, 0.3)";
    } else {
      container.style.border = "6px solid #4d94ff";
      container.style.boxShadow = "0 9.6px 24px rgba(77, 148, 255, 0.3)";
    }
  }

  function checkWinner() {
    let canMove = false;
    gameState.pieces.forEach((p, i) => {
      if (p === gameState.currentTurn) {
        if (getValidMoves(i).length > 0) canMove = true;
      }
    });

    if (!canMove) {
      const winner = gameState.currentTurn === 'red' ? "파란팀" : "빨간팀";
      const winnerColor = gameState.currentTurn === 'red' ? "#4d94ff" : "#ff4d4d";
      
      winnerDisplay.innerHTML = `<span style="color: ${winnerColor}">${winner}</span>이 승리했습니다!`;
      victoryModal.style.display = 'flex';
    }
  }

  drawBoard();
  updateBoard();
</script>
</body>
</html>
