<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>사각형 퍼즐 (Shikaku)</title>
<style>
  /* 1. 디자인 시스템 변수 정의 */
  :root {
    --bg: #f0f2f5;
    --card-bg: #ffffff;
    --active: #007bff;
    --success: #28a745;
    --danger: #dc3545;
    --text-main: #222222;
    --text-sub: #555555;
  }

  * { 
    box-sizing: border-box; 
    -webkit-tap-highlight-color: transparent; 
  }

  body {
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    background: var(--bg);
    margin: 0;
    padding: 15px 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    color: var(--text-main);
    overflow-x: hidden;
  }

  /* 2. 레이아웃 및 전체 가로 길이 */
  .container-fixed {
    width: 100%;
    max-width: 800px;
    background: var(--card-bg);
    border-radius: 20px;
    padding: 20px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.05);
    margin-bottom: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* [영역 1: 타이틀 및 단계 선택 영역] */
  h1 { 
    margin: 0 0 20px; 
    font-size: clamp(24px, 5vw, 32px);
    text-align: center; 
    font-weight: 800; 
  }

  #stageButtons {
    display: grid;
    grid-template-columns: repeat(5, minmax(0, 1fr));
    gap: 6px;
    width: 100%;
    margin-bottom: 5px;
  }

  .stage-btn {
    width: 100%;
    padding: 10px 2px;
    border-radius: 10px;
    border: 1px solid #e9ecef;
    background: #f8f9fa;
    font-size: clamp(11px, 2.8vw, 15px);
    font-weight: 700;
    cursor: pointer;
    transition: background 0.2s, color 0.2s, border-color 0.2s;
    text-align: center;
  }

  @media (hover: hover) {
    .stage-btn:hover { background: #e9ecef; }
  }
  .stage-btn:active { background: #e9ecef; }

  .stage-btn.selected {
    background: var(--active) !important;
    color: #fff !important;
    border-color: var(--active) !important;
  }

  .stage-btn.completed {
    background: var(--success) !important;
    color: #fff !important;
    border-color: var(--success) !important;
  }

  /* [영역 2: 퍼즐 문제 영역 (그리드)] */
  #board-wrapper {
    width: 100%;
    display: flex;
    justify-content: center;
    margin: 15px 0;
  }

  #board {
    display: grid;
    gap: 1px;
    position: relative;
    touch-action: none;
    user-select: none;
    background: #999;
    border: 2px solid #999;
    border-radius: 8px;
    overflow: hidden;
    width: 100%;
    max-width: 400px;
  }

  .cell {
    aspect-ratio: 1 / 1;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: clamp(14px, 4vw, 20px);
    font-weight: 800;
    background: white;
    box-sizing: border-box;
  }

  .number {
    color: var(--text-main);
  }

.start-cell { background-color: #e2f0d9; !important; }
    .selected-cell { background-color: #e2f0d9; }

  .rectangle-border {
    position: absolute;
    border: 3px solid var(--success);
    pointer-events: auto;
    border-radius: 6px;
    background: transparent;
    box-sizing: border-box;
    cursor: pointer;
  }

  /* [영역 3: 하단 조작 버튼 영역] */
  #toolbar {
    width: 100%;
    display: flex;
    justify-content: center;
    margin-top: 5px;
  }

  #resetBtn {
    width: 100%;
    max-width: 200px;
    padding: 12px 20px;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    border: 1px solid #dee2e6;
    background: #fff;
    transition: background 0.2s;
  }
  #resetBtn:active {
    background: #f1f3f5;
  }

  /* [영역 4: 문제 설명 공간] */
  .quiz-rule {
    background: #f8f9fa;
    padding: 15px 20px; 
    border-radius: 12px;
    font-size: clamp(15px, 3.5vw, 17px);
    border-left: 4px solid var(--active);
    line-height: 1.6;
    color: var(--text-sub);
    width: 100%;
    word-break: keep-all;
    text-align: left;
  }

  .rule-title {
    font-weight: 800;
    color: var(--text-main);
    margin-bottom: 8px;
    font-size: 18px;
    display: block;
  }

  .rule-item {
    display: block;
    margin-bottom: 6px;
  }
  .rule-item:last-child {
    margin-bottom: 0;
  }

  /* [모달 디스플레이 시스템 스타일] */
  .success-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.7);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 10000;
    padding: 20px;
  }

  .success-modal {
    background: var(--card-bg);
    padding: 30px 25px;
    border-radius: 20px;
    text-align: center;
    width: 100%;
    max-width: 350px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.2);
    animation: modalPop 0.3s ease-out;
  }

  @keyframes modalPop {
    from { transform: scale(0.9); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }

  .modal-title {
    font-size: 24px;
    font-weight: 800;
    margin: 0 0 10px 0;
  }

  .modal-desc {
    font-size: 16px;
    color: var(--text-sub);
    margin: 0 0 25px 0;
    line-height: 1.4;
  }

  .modal-btn {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    border: none;
    color: #fff;
    transition: opacity 0.2s;
  }
  .modal-btn:active {
    opacity: 0.86;
  }

  /* 조건별 모달 커스텀 사양 */
  .modal-success-title { color: var(--success); }
  .modal-success-btn { background: var(--success); }

  .modal-danger-border { border-top: 5px solid var(--danger); }
  .modal-danger-title { color: var(--danger); }
  .modal-danger-btn { background: var(--danger); }

  @media (min-width: 800px) {
    .container-fixed { padding: 30px; }
    #stageButtons { gap: 8px; }
  }
</style>
</head>
<body>

<!-- 상단 영역 종합 카드 -->
<div class="container-fixed">
  
  <!-- [영역 1: 타이틀 및 단계 선택 영역] -->
  <h1>사각형 퍼즐</h1>
  <div id="stageButtons">
    <button class="stage-btn" data-stage="1">1단계</button>
    <button class="stage-btn" data-stage="2">2단계</button>
    <button class="stage-btn" data-stage="3">3단계</button>
    <button class="stage-btn" data-stage="4">4단계</button>
    <button class="stage-btn" data-stage="5">5단계</button>
    <button class="stage-btn" data-stage="6">6단계</button>
    <button class="stage-btn" data-stage="7">7단계</button>
    <button class="stage-btn" data-stage="8">8단계</button>
    <button class="stage-btn" data-stage="9">9단계</button>
    <button class="stage-btn" data-stage="10">10단계</button>
    <button class="stage-btn" data-stage="11">11단계</button>
    <button class="stage-btn" data-stage="12">12단계</button>
    <button class="stage-btn" data-stage="13">13단계</button>
    <button class="stage-btn" data-stage="14">14단계</button>
    <button class="stage-btn" data-stage="15">15단계</button>
  </div>

  <!-- [영역 2: 퍼즐 문제 영역] -->
  <div id="board-wrapper">
    <div id="board"></div>
  </div>

  <!-- [영역 3: 하단 조작 버튼 영역] -->
  <div id="toolbar">
    <button id="resetBtn">초기화</button>
  </div>

</div>

<!-- [영역 4: 문제 설명 공간] -->
<div class="container-fixed">
  <div class="quiz-rule">
    <span class="rule-title">[사각형 퍼즐(Shikaku) 규칙]</span>
    <span class="rule-item">1. 그림의 칸이 하나도 남지 않도록 <b>정사각형 또는 직사각형으로만</b> 나눕니다.</span>
    <span class="rule-item">2. 하나의 정사각형 또는 직사각형 안에는 반드시 <b>한 개의 수</b>가 들어갑니다.</span>
    <span class="rule-item">3. 칸 안의 수는 사각형이 차지해야 하는 총 칸수를 나타냅니다.</span>
    <span class="rule-item">4. 하나의 칸을 두 개 이상의 사각형이 동시에 겹쳐서 사용할 수 없습니다.</span>
    <hr style="border: 0; border-top: 1px solid #e9ecef; margin: 12px 0;">
    <span class="rule-item">※ 사각형 모양대로 <b>드래그하거나 양 끝을 클릭</b>합니다.</span>
    <span class="rule-item">※ 이미 그려진 <b>사각형을 클릭</b>하면 삭제됩니다.</span>
  </div>
</div>

<script>
(() => {
  const board = document.getElementById("board");
  const stageButtons = document.querySelectorAll(".stage-btn");
  const resetBtn = document.getElementById("resetBtn");

  const stages = {
    // 연습문제
    // 1: { width: 7, height: 7, puzzle: [["","","","","","","6"], ["","","","","","",""], ["3","","10","","6","",""], ["","","","","","","8"], ["","","","4","","",""], ["","8","","","","",""], ["4","","","","","",""]] },
    1: { width: 5, height: 5, puzzle: [["4", "", "", "", ""], ["", "", "9", "", ""], ["", "", "", "", ""], ["6", "", "", "6", ""], ["", "", "", "", ""]] },
    2: { width: 6, height: 6, puzzle: [["6", "", "", "", "", ""], ["", "", "", "5", "", ""], ["", "", "10", "", "", "3"], ["", "", "", "", "", ""], ["4", "", "8", "", "", ""], ["", "", "", "", "", ""]] },
    3: { width: 6, height: 6, puzzle: [["4", "", "", "", "", ""], ["", "", "8", "", "", "4"], ["4", "", "", "", "", ""], ["", "", "", "", "", "8"], ["", "", "", "", "", ""], ["4", "", "", "4", "", ""]] },
    4: { width: 7, height: 7, puzzle: [["","","2","","","","3"], ["2","","","5","","",""], ["3","","4","","2","2",""], ["","","","","","",""], ["","","4","","4","","5"], ["","","3","","3","",""], ["","2","","5","","",""]] },
    5: { width: 7, height: 7, puzzle: [["4","","","","3","",""], ["4","","","","","",""], ["4","","","","","4",""], ["","","2","5","4","","6"], ["","2","","","","4",""], ["","4","","","","",""], ["","","3","","","",""]] },
    6: { width: 8, height: 8, puzzle: [["", "", "", "", "6", "", "", ""], ["", "8", "", "", "", "", "", "6"], ["", "", "", "8", "", "", ""], ["", "", "", "", "", "6", "", ""], ["", "", "", "", "4", "", "", ""], ["", "", "6", "", "", "6", "", ""], ["", "", "", "", "", "", "8", ""], ["", "", "", "6", "", "", "", ""]] },
    7: { width: 8, height: 8, puzzle: [["6", "", "", "", "", "", "4", ""], ["", "4", "", "", "6", "", "", "6"], ["", "", "", "", "", "", "", ""], ["", "", "", "", "6", "", "4", ""], ["", "", "8", "", "", "", "", ""], ["", "", "", "", "4", "", "", ""], ["", "", "6", "", "", "6", "", "4"], ["", "", "", "", "", "", "", ""]] },
    8: { width: 9, height: 9, puzzle: [["","","","","","","","8",""], ["","3","","","4","3","","3",""], ["","5","","2","","","","",""], ["4","","4","","","","2","",""], ["","","","2","","","2","",""], ["2","","","","","","","8",""], ["","","","","","12","4","","6"], ["3","","","","","","","",""], ["","2","2","","","","","",""]] },
    9: { width: 9, height: 9, puzzle: [["","","","","","","","",""], ["","","10","","","","","",""], ["","2","","","","4","3","6",""], ["","","","6","","","2","",""], ["4","","","6","","","","",""], ["4","4","6","","","","","4","3"], ["","","","","2","","","3",""], ["","","","","","","","","4"], ["","","","2","2","","","4",""]] },
    10: { width: 10, height: 10, puzzle: [["","","","","","8","","","",""], ["","8","","","","","","","",""], ["","","","","","","","","",""], ["","","","","","","","","",""], ["","","6","","","","","15","",""], ["","","","","","","16","","","4"], ["","","","","6","","","","",""], ["","12","","","","","4","","6",""], ["","","","","10","","","","",""], ["","","","","","","","5","",""]] },
    11: { width: 10, height: 10, puzzle: [["","","","","","","","","","10"], ["","","","8","","","","","",""], ["","","","","4","","","","","9"], ["","","","6","","","9","","",""], ["","12","","","","8","","","",""], ["","","","","","","6","","",""], ["","","","4","","","","","",""], ["","","","","","6","","9","",""], ["","","","","","","","","",""], ["","","3","","","6","","","",""]] },
    12: { width: 10, height: 10, puzzle: [["","","","6","","","","","",""], ["","","6","","","","","","6",""], ["","","","","","","","","",""], ["","6","3","","9","","","","",""], ["","","","6","","","6","","",""], ["","","6","","","4","","","","6"], ["","","","","6","","","","",""], ["","6","6","","","","6","","6",""], ["","","","","","","","","",""], ["","","6","","","","","","",""]] },
    13: { width: 10, height: 10, puzzle: [["","","","","","","","6","",""], ["","4","","","4","","","","6",""], ["","","","","","","","4","","4"], ["","6","","","","6","","","",""], ["","","","","","","","","",""], ["","","","6","4","","6","","",""], ["","","","","","6","","","","6"], ["","","","","4","","4","","",""], ["","6","","","","","","","",""], ["6","","","","","6","","","6",""]] },
    14: { width: 12, height: 12, puzzle: [["","","","","","","","","","8","",""], ["","","","","","","","","","","",""], ["8","","","12","","8","","","6","","",""], ["","","","","","","","","","","",""], ["","","","","","","","","10","","","6"], ["6","","6","","","10","","","","","",""], ["","","","","","","","","","","",""], ["","","","","","","","9","","","",""], ["6","","4","","5","","","","","8","",""], ["","","","","","","","","6","","",""], ["6","","","","","","","8","","","",""], ["","","","","","7","","","","","","5"]] },
    15: { width: 12, height: 12, puzzle: [["","","","","8","","","","","","",""], ["","9","","","","","","","6","","",""], ["","","","","","","8","","","","",""], ["","","","","","","","","6","","","4"], ["","","","","","6","","","","","",""], ["","","","","","","","","","","8",""], ["6","","","9","","8","","","","","",""], ["","","","","","","","6","","10","","6"], ["","8","","","4","","","","","","",""], ["","","","","","","6","","","","",""], ["4","","","8","","","","","","8","",""], ["","","","","","6","","","","","",""]] },
  };

  // 기존 내장 데이터 파싱 오류 수정 가공
  stages[6].puzzle[2][6] = "";
  stages[12].puzzle[3][0] = "";
  stages[12].puzzle[7][0] = "";

  let stageStates = {};
  let currentStage = 1;
  let startCell = null;
  let endCell = null;
  let isDragging = false;
  let interactionLocked = false;
  let mouseDownPos = null;

  function init() {
    for (let s in stages) {
      stageStates[s] = { ...stages[s], rectangles: [], completed: false };
    }
    renderStage(currentStage);
  }

  /* 커스텀 모달 출력 전용 함수 */
  function showModal(type, title, text, btnText, callback) {
    const overlay = document.createElement("div");
    overlay.className = "success-overlay";

    const modal = document.createElement("div");
    modal.className = `success-modal ${type === 'danger' ? 'modal-danger-border' : ''}`;

    const h2 = document.createElement("h2");
    h2.className = `modal-title ${type === 'danger' ? 'modal-danger-title' : 'modal-success-title'}`;
    h2.textContent = title;

    const p = document.createElement("p");
    p.className = "modal-desc";
    p.innerHTML = text;

    const btn = document.createElement("button");
    btn.className = `modal-btn ${type === 'danger' ? 'modal-danger-btn' : 'modal-success-btn'}`;
    btn.textContent = btnText;

    btn.addEventListener("click", () => {
      overlay.remove();
      if (callback) callback();
    });

    modal.appendChild(h2);
    modal.appendChild(p);
    modal.appendChild(btn);
    overlay.appendChild(modal);
    document.body.appendChild(overlay);
  }

  // [수정 후 자바스크립트 renderStage 함수 내부]
  function renderStage(stage) {
    const { width, height, puzzle, rectangles } = stageStates[stage];
    board.innerHTML = "";
    board.style.gridTemplateColumns = `repeat(${width}, 1fr)`;
    board.style.pointerEvents = "auto";

    // 격자 가로 개수(width)에 따라 전체 크기(max-width) 동적 조절
    if (width <= 6) {
      board.style.maxWidth = "400px";  // 1~3단계 (가로 5~6개): 기존 크기 유지
    } else if (width <= 8) {
      board.style.maxWidth = "480px";  // 4~7단계 (가로 7~8개): 조금 늘림
    } else if (width <= 10) {
      board.style.maxWidth = "560px";  // 8~13단계 (가로 9~10개): 더 늘림
    } else {
      board.style.maxWidth = "650px";  // 14~15단계 (가로 12개): 최대 크기로 확장
    }

    for (let y = 0; y < height; y++) {
      for (let x = 0; x < width; x++) {
        const cell = document.createElement("div");
        cell.classList.add("cell");
        cell.dataset.x = x;
        cell.dataset.y = y;
        if (puzzle[y][x]) {
          cell.textContent = puzzle[y][x];
          cell.classList.add("number");
        }
        board.appendChild(cell);
      }
    }

    rectangles.forEach(r => {
      if (!r.element) {
        r.element = drawBorder(r);
      } else if (!board.contains(r.element)) {
        board.appendChild(r.element);
      }
    });

    updateStageButtons();

    if (stageStates[stage].completed) lockInteraction();
    else unlockInteraction();

    startCell = null;
    endCell = null;
    updateCellStyles();
  }

  function drawBorder({ x1, y1, x2, y2 }) {
    const rect = document.createElement("div");
    rect.className = "rectangle-border";

    const c1 = getCell(x1, y1);
    const c2 = getCell(x2, y2);

    const left = Math.min(c1.offsetLeft, c2.offsetLeft);
    const top = Math.min(c1.offsetTop, c2.offsetTop);
    const right = Math.max(c1.offsetLeft + c1.offsetWidth, c2.offsetLeft + c2.offsetWidth);
    const bottom = Math.max(c1.offsetTop + c1.offsetHeight, c2.offsetTop + c2.offsetHeight);

    rect.style.left = left + "px";
    rect.style.top = top + "px";
    rect.style.width = (right - left) + "px";
    rect.style.height = (bottom - top) + "px";

    rect.addEventListener("click", e => {
      if (!interactionLocked) {
        rect.remove();
        stageStates[currentStage].rectangles = stageStates[currentStage].rectangles.filter(r =>
          !(r.x1 === x1 && r.y1 === y1 && r.x2 === x2 && r.y2 === y2));
        checkComplete();
      }
    });

    board.appendChild(rect);
    return rect;
  }

  function getCell(x, y) {
    return document.querySelector(`.cell[data-x="${x}"][data-y="${y}"]`);
  }

  function updateCellStyles() {
    document.querySelectorAll(".cell").forEach(cell => {
      cell.classList.remove("selected-cell", "start-cell");
    });
    if (startCell && !endCell) {
      startCell.classList.add("start-cell");
    }
    if (startCell && endCell) {
      const x1 = Math.min(+startCell.dataset.x, +endCell.dataset.x);
      const x2 = Math.max(+startCell.dataset.x, +endCell.dataset.x);
      const y1 = Math.min(+startCell.dataset.y, +endCell.dataset.y);
      const y2 = Math.max(+startCell.dataset.y, +endCell.dataset.y);
      for (let y = y1; y <= y2; y++) {
        for (let x = x1; x <= x2; x++) {
          getCell(x, y)?.classList.add("selected-cell");
        }
      }
    }
  }

  function tryConfirmRectangle() {
    if (!startCell || !endCell) return;
    if (startCell) startCell.classList.remove("start-cell");

    const x1 = Math.min(+startCell.dataset.x, +endCell.dataset.x);
    const x2 = Math.max(+startCell.dataset.x, +endCell.dataset.x);
    const y1 = Math.min(+startCell.dataset.y, +endCell.dataset.y);
    const y2 = Math.max(+startCell.dataset.y, +endCell.dataset.y);
    const area = (x2 - x1 + 1) * (y2 - y1 + 1);

    const puzzle = stageStates[currentStage].puzzle;
    let number = null, count = 0;
    for (let y = y1; y <= y2; y++) {
      for (let x = x1; x <= x2; x++) {
        const val = puzzle[y][x];
        if (val) {
          number = Number(val);
          count++;
        }
      }
    }

    /* 오답 카운트를 올리지 않는 대신, 규칙 위반 시 [경고 모달] 노출 */
    if (count === 0) {
      showModal("danger", "❌ 틀렸습니다!", "사각형 내부에 숫자가 존재하지 않습니다.", "다시 시도");
      resetSelection();
      return;
    }
    if (count > 1) {
      showModal("danger", "❌ 틀렸습니다!", "하나의 사각형 내부에는 오직 한 개의 숫자만 들어갈 수 있습니다.", "다시 시도");
      resetSelection();
      return;
    }
    if (area !== number) {
      showModal("danger", "❌ 틀렸습니다!", `드래그한 크기(${area}칸)가 내부 숫자(${number})와 일치하지 않습니다.`, "다시 시도");
      resetSelection();
      return;
    }

    for (const r of stageStates[currentStage].rectangles) {
      if (!(x2 < r.x1 || x1 > r.x2 || y2 < r.y1 || y1 > r.y2)) {
        showModal("danger", "❌ 틀렸습니다!", "이미 확정된 다른 사각형 영역과 중복되거나 겹칩니다.", "다시 시도");
        resetSelection();
        return;
      }
    }

    const rect = { x1, y1, x2, y2 };
    stageStates[currentStage].rectangles.push(rect);
    rect.element = drawBorder(rect);

    resetSelection();
    checkComplete();
  }

  function resetSelection() {
    startCell = null;
    endCell = null;
    updateCellStyles();
  }

  /* 마우스 입력 제어 */
  board.addEventListener("mousedown", e => {
    if (interactionLocked) return;
    if (!e.target.classList.contains("cell")) return;
    mouseDownPos = { x: e.clientX, y: e.clientY };
    isDragging = false;
  });

  board.addEventListener("mousemove", e => {
    if (interactionLocked) return;
    if (!mouseDownPos) return;
    if (!e.target.classList.contains("cell")) return;

    const dx = e.clientX - mouseDownPos.x;
    const dy = e.clientY - mouseDownPos.y;
    const dist = Math.sqrt(dx*dx + dy*dy);

    if (dist > 5) {
      if (!isDragging) {
        isDragging = true;
        startCell = e.target;
        endCell = null;
        updateCellStyles();
      } else {
        endCell = e.target;
        if (startCell) startCell.classList.remove("start-cell");
        updateCellStyles();
      }
    }
  });

  board.addEventListener("mouseup", e => {
    if (interactionLocked) return;
    if (!e.target.classList.contains("cell")) return;
    if (!mouseDownPos) return;

    const dx = e.clientX - mouseDownPos.x;
    const dy = e.clientY - mouseDownPos.y;
    const dist = Math.sqrt(dx*dx + dy*dy);

    if (dist <= 5) {
      handleCellClick(e.target);
    } else {
      endCell = e.target;
      if (startCell) startCell.classList.remove("start-cell");
      updateCellStyles();
      tryConfirmRectangle();
    }
    mouseDownPos = null;
    isDragging = false;
  });

  /* 모바일 터치 제어 */
  function getCellFromTouch(touch) {
    const el = document.elementFromPoint(touch.clientX, touch.clientY);
    if (el && el.classList && el.classList.contains("cell")) return el;
    return null;
  }

  board.addEventListener("touchstart", function(e) {
    if (interactionLocked) return;
    if (e.touches.length > 1) return;
    const touch = e.touches[0];
    const cell = getCellFromTouch(touch);
    if (!cell) return;

    mouseDownPos = { x: touch.clientX, y: touch.clientY };
    isDragging = false;
    e.preventDefault();
  }, { passive: false });

  board.addEventListener("touchmove", function(e) {
    if (interactionLocked) return;
    if (!mouseDownPos) return;
    if (e.touches.length > 1) return;
    const touch = e.touches[0];
    const cell = getCellFromTouch(touch);
    if (!cell) return;

    const dx = touch.clientX - mouseDownPos.x;
    const dy = touch.clientY - mouseDownPos.y;
    const dist = Math.sqrt(dx*dx + dy*dy);

    if (dist > 5) {
      if (!isDragging) {
        isDragging = true;
        startCell = cell;
        endCell = null;
        updateCellStyles();
      } else {
        endCell = cell;
        if (startCell) startCell.classList.remove("start-cell");
        updateCellStyles();
      }
    }
    e.preventDefault();
  }, { passive: false });

  board.addEventListener("touchend", function(e) {
    if (interactionLocked) return;
    let touch = e.changedTouches?.[0] || e.touches?.[0];
    if (!touch || !mouseDownPos) {
      mouseDownPos = null;
      isDragging = false;
      return;
    }
    const cell = getCellFromTouch(touch);

    let dx = touch.clientX - mouseDownPos.x;
    let dy = touch.clientY - mouseDownPos.y;
    let dist = Math.sqrt(dx*dx + dy*dy);

    if (dist <= 5) {
      if (cell) handleCellClick(cell);
    } else {
      if (cell) {
        endCell = cell;
        if (startCell) startCell.classList.remove("start-cell");
        updateCellStyles();
        tryConfirmRectangle();
      }
    }
    mouseDownPos = null;
    isDragging = false;
    e.preventDefault();
  }, { passive: false });

  function handleCellClick(cell) {
    if (interactionLocked) return;
    if (!cell.classList.contains("cell")) return;

    if (startCell === null) {
      startCell = cell;
      endCell = null;
    } else if (startCell !== null && endCell === null) {
      endCell = cell;
      if (startCell) startCell.classList.remove("start-cell");
    } else {
      startCell = cell;
      endCell = null;
    }
    updateCellStyles();

    if (startCell && endCell) {
      tryConfirmRectangle();
    }
  }

  resetBtn.addEventListener("click", () => {
    const s = stageStates[currentStage];
    s.rectangles.forEach(r => r.element?.remove());
    s.rectangles = [];
    s.completed = false;
    resetSelection();
    renderStage(currentStage);
  });

  /* 퍼즐 완료 여부 검사 */
  function checkComplete() {
    const { width, height, rectangles } = stageStates[currentStage];
    const covered = Array.from({ length: height }, () => Array(width).fill(false));

    for (const r of rectangles) {
      for (let y = r.y1; y <= r.y2; y++) {
        for (let x = r.x1; x <= r.x2; x++) {
          covered[y][x] = true;
        }
      }
    }

    const allCovered = covered.every(row => row.every(cell => cell));
    if (allCovered) {
      stageStates[currentStage].completed = true;
      lockInteraction();
      updateStageButtons();

      /* 성공 시 모달 시스템 연동 (다음 단계 이동 기능 추가) */
      const isLastStage = currentStage === Object.keys(stages).length;
      const descText = isLastStage ? "축하합니다! 모든 퍼즐 단계를 정복하셨습니다." : "참 잘하셨습니다! 다음 단계의 퍼즐이 기다리고 있습니다.";
      const btnText = isLastStage ? "처음으로 가기" : "다음 단계로";

      showModal("success", "🎉 성공!", descText, btnText, () => {
        if (isLastStage) {
          currentStage = 1;
        } else {
          currentStage += 1;
        }
        renderStage(currentStage);
      });
    }
  }

  function lockInteraction() {
    interactionLocked = true;
    board.style.pointerEvents = "none";
  }

  function unlockInteraction() {
    interactionLocked = false;
    board.style.pointerEvents = "auto";
  }

  function updateStageButtons() {
    stageButtons.forEach(btn => {
      const stage = +btn.dataset.stage;
      btn.classList.remove("selected", "completed");
      if (stage === currentStage) btn.classList.add("selected");
      if (stageStates[stage]?.completed) btn.classList.add("completed");
    });
  }

  stageButtons.forEach(btn => {
    btn.addEventListener("click", () => {
      currentStage = +btn.dataset.stage;
      renderStage(currentStage);
    });
  });

  init();
})();
</script>
