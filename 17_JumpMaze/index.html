<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>점프 미로</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<style>
    /* ===== 디자인 시스템 변수 정의 ===== */
    :root {
        --bg: #f0f2f5;
        --card-bg: #ffffff;
        --active: #007bff;
        --success: #28a745;
        --danger: #dc3545;
        --text-main: #222222;
        --text-sub: #555555;
        --gray-light: #f8f9fa;
        --gray-border: #e9ecef;
        
        /* 파란색 계열 디자인 변수 */
        --blue-current: #0056b3;  
        --blue-clickable: #4dabf7; 
        --blue-glow: rgba(77, 171, 247, 0.6);
    }

    /* ===== 전역 초기화 및 모바일 최적화 ===== */
    * {
        box-sizing: border-box;
        font-family: 'Pretendard', sans-serif;
        -webkit-touch-callout: none;
    }

    body {
        background-color: var(--bg);
        color: var(--text-main);
        margin: 0;
        padding: 15px 10px;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
        touch-action: manipulation;
    }

    /* ===== 레이아웃 시스템 ===== */
    .fluid-area {
        width: 100%;
        max-width: 800px;
        margin-bottom: 20px;
    }

    .container-fixed {
        width: 100%;
        max-width: 800px; 
        background-color: var(--card-bg);
        border-radius: 20px;
        padding: 30px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        margin-bottom: 20px;
    }

    @media (max-width: 600px) {
        .container-fixed {
            padding: 16px;
        }
    }

    /* [영역 1-A: 퍼즐 제목 영역] */
    h1.puzzle-title {
        font-size: 36px;
        font-weight: 800;
        margin: 10px 0 5px 0;
        text-align: center;
    }

    /* [영역 1-B: 단계 선택 영역] */
    .stage-grid {
        display: grid;
        grid-template-columns: repeat(6, minmax(0, 1fr));
        gap: 8px;
    }
    @media (max-width: 600px) {
        .stage-grid { grid-template-columns: repeat(4, minmax(0, 1fr)); }
    }

    .stage-btn {
        background-color: var(--gray-light);
        border: 1px solid var(--gray-border);
        color: var(--text-sub);
        padding: 12px 5px;
        border-radius: 12px;
        font-weight: 600;
        font-size: 14px;
        cursor: pointer;
        transition: all 0.2s ease;
        text-align: center;
    }
    .stage-btn:hover {
        background-color: var(--gray-border);
    }
    .stage-btn.active {
        background-color: var(--active);
        color: #ffffff;
        border-color: var(--active);
        box-shadow: 0 4px 10px rgba(0,123,255,0.3);
    }

    /* [영역 2: 퍼즐 문제 영역] */
    .puzzle-wrapper {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        width: 100%;
    }

    /* 퍼즐 상단 정보 바 너비 동기화 */
    .status-bar {
        width: 100%;
        max-width: var(--puzzle-total-width, 100%);
        display: flex;
        justify-content: space-between;
        margin-bottom: 15px;
        font-size: 16px;
        font-weight: 600;
        color: var(--text-sub);
        padding: 0 5px;
        transition: max-width 0.2s ease;
    }

    /* JS 연산 로직에 맞춰 85px 단위를 베이스로 작동하는 반응형 그리드 */
    #grid-container {
        display: grid;
        justify-content: center;
        align-content: center;
        margin: 20px auto;
        border: 3px solid #dee2e6;
        padding: 5px;
        background-color: #fff;
        
        width: 100%;
        /* 칸당 85px을 기준으로 늘어나되, 가로 누적 800px을 넘어가면 100% 꽉 채우도록 제한 */
        max-width: var(--puzzle-total-width, 100%); 
        aspect-ratio: 1 / 1; 
        transition: max-width 0.2s ease;
    }

    .grid-cell {
        width: 100%;
        height: 100%;
        border: 1px solid #ced4da;
        display: flex;
        justify-content: center;
        align-items: center;
        font-weight: bold;
        user-select: none;
        transition: all 0.2s ease;
        font-size: calc(1.6rem - var(--cell-scale, 0rem)); 
    }

    /* ===== 파란색 계열 UI 디자인 ===== */
    .grid-cell.clickable {
        cursor: pointer;
        background-color: var(--blue-clickable) !important;
        color: white;
        border-radius: 6px;
    }
    .grid-cell.clickable:hover {
        transform: scale(1.05);
        box-shadow: 0 0 12px var(--blue-glow);
    }

    .grid-cell.current {
        background-color: var(--blue-current) !important;
        color: #ffffff !important;
        transform: scale(1.08);
        border-radius: 50%;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.15);
    }

    .grid-cell.disabled {
        pointer-events: none;
        background-color: #e9ecef;
        color: #6c757d;
        opacity: 0.7;
    }

    .grid-cell.finish {
        background-color: #dc3545 !important;
        color: white !important;
    }

    .grid-cell.finish-active {
        animation: pulseBlue 1.5s infinite ease-in-out;
        box-shadow: 0 0 15px var(--blue-glow);
        transform: scale(1.05);
    }

    @keyframes pulseBlue {
        0% { background-color: var(--blue-clickable) !important; }
        50% { background-color: #1c7ed6 !important; transform: scale(1.08); }
        100% { background-color: var(--blue-clickable) !important; }
    }

    .grid-cell.start-cell {
        background-color: #ffeb3b !important;
        color: #333 !important;
        cursor: pointer;
    }

    /* [영역 3: 하단 조작 버튼 영역] */
    .action-bar {
        display: flex;
        gap: 12px;
        justify-content: center;
        flex-wrap: wrap;
    }
    .action-btn {
        flex: 1;
        min-width: 100px;
        max-width: 800px;
        height: 54px;
        border: none;
        border-radius: 14px;
        font-size: 16px;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.2s ease;
        box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    }
    .btn-reset {
        background-color: #ffffff;
        color: var(--danger);
        border: 1.5px solid var(--danger);
    }
    .btn-reset:hover {       background-color: var(--danger);
        color: white; }
    
    .btn-new-puzzle {
        background-color: #e3fafc;
        color: #0b7285;
        border: 1px solid #99e9f2;
    }
    .btn-new-puzzle:hover { background-color: #c5f6fa; }

    .btn-undo {
        background-color: #fff3bf;
        color: #d9480f;
    }
    .btn-undo:hover { background-color: #ffe066; }
    .btn-undo:disabled {
        background-color: var(--gray-border);
        color: #adb5bd;
        cursor: not-allowed;
    }

    /* [영역 4, 5: 하단 가이드 공간] */
    .guide-box {
        background-color: var(--card-bg);
        border-radius: 12px;
        padding: 18px 20px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.02);
        font-size: 17px;
        line-height: 1.6;
        word-break: keep-all;
        margin-bottom: 12px;
    }
    .guide-box h3 {
        margin: 0 0 12px 0;
        font-size: 18px;
        font-weight: 700;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }
    .guide-box ul {
        margin: 0;
        padding-left: 20px;
        color: var(--text-sub);
    }

    .guide-danger { border-left: 6px solid var(--danger); }
    .guide-danger h3 { color: var(--danger); }
    .guide-active { border-left: 6px solid var(--active); }
    .guide-active h3 { color: var(--active); }

    .btn-text-danger {
        background: #ffffff;
        color: var(--danger);
        border: 1px solid var(--danger);
        padding: 4px 10px;
        border-radius: 6px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
    }
    .btn-text-danger:hover {
        background-color: var(--danger);
        color: #ffffff;
    }

    /* 누적 기록 표(Table) 스타일 */
    .record-table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 10px;
        font-size: 15px;
        text-align: center;
    }
    .record-table th, .record-table td {
        border: 1px solid var(--gray-border);
        padding: 8px;
    }
    .record-table th {
        background-color: var(--gray-light);
        color: var(--text-main);
    }
    .last-score {
        color: var(--danger);
        font-weight: bold;
    }
    .no-record-msg {
        color: var(--text-sub);
        padding: 15px 0;
        text-align: center;
        font-size: 15px;
    }

    /* ===== 결과 알림 팝업창 (모달) ===== */
    .modal-overlay {
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        background: rgba(0, 0, 0, 0.7);
        backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px);
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 1000;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s ease;
    }
    .modal-overlay.show {
        opacity: 1;
        pointer-events: auto;
    }
    .modal-card {
        width: 90%;
        max-width: 350px;
        background-color: var(--card-bg);
        border-radius: 20px;
        padding: 30px 24px;
        text-align: center;
        box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        transform: translateY(20px);
        transition: transform 0.3s ease;
    }
    .modal-overlay.show .modal-card {
        transform: translateY(0);
    }
    .modal-card.success { border-top: 6px solid var(--success); }
    .modal-card.danger { border-top: 6px solid var(--danger); }
    .modal-card.clear-record { border-top: 6px solid var(--danger); }

    .modal-title {
        font-size: 24px;
        font-weight: 800;
        margin-bottom: 12px;
    }
    .modal-title.success { color: var(--success); }
    .modal-title.danger { color: var(--danger); }
    .modal-title.clear-record { color: var(--danger); }
    
    .modal-body {
        color: var(--text-sub);
        font-size: 16px;
        margin-bottom: 24px;
    }
    
    /* 모달 버튼 레이아웃 구조 */
    .modal-btn {
        width: 100%;
        height: 48px;
        border: none;
        border-radius: 12px;
        font-size: 16px;
        font-weight: 700;
        cursor: pointer;
        color: #ffffff;
    }
    .modal-btn.success { background-color: var(--success); }
    .modal-btn.success:hover { background-color: #218838; }
    .modal-btn.danger { background-color: var(--danger); }
    .modal-btn.danger:hover { background-color: #c82333; }

    /* 초기화 커스텀 모달 전용 트윈 버튼 레이아웃 스타일 */
    .modal-btn-group {
        display: flex;
        gap: 10px;
    }
    .modal-btn-cancel {
        background-color: #6c757d;
        color: #ffffff;
    }
    .modal-btn-cancel:hover {
        background-color: #5a6268;
    }
    .modal-btn-confirm {
        background-color: var(--danger);
        color: #ffffff;
    }
    .modal-btn-confirm:hover {
        background-color: #bd2130;
    }
</style>
</head>
<body>

<div class="fluid-area">
    <h1 class="puzzle-title">점프 미로</h1>
</div>

<div class="container-fixed">
    <div class="stage-grid" id="stage-selector"></div>
</div>

<div class="container-fixed" id="puzzle-card">
    <div class="puzzle-wrapper">
        <div class="status-bar" id="status-bar-wrapper">
            <span id="status-stage">크기: 3x3</span>
            <span id="status-moves">이동 횟수: 0</span>
        </div>
        <div id="grid-container"></div>
    </div>
</div>

<div class="fluid-area action-bar">
    <button class="action-btn btn-new-puzzle" id="btn-new-puzzle">새로운 퍼즐</button>
    <button class="action-btn btn-undo" id="btn-undo" disabled>되돌리기</button>
    <button class="action-btn btn-reset" id="btn-reset">🔄 처음으로</button>
</div>

<div class="fluid-area guide-box guide-danger">
    <h3>
        <span>📊 누적 기록</span>
        <button class="btn-text-danger" id="btn-clear-record">누적 기록 초기화</button>
    </h3>
    <div id="record-container"></div>
</div>

<div class="fluid-area guide-box guide-active">
    <h3>🧩 게임 규칙</h3>
    <ul>
        <li><span style="color: #e5c100; font-weight: bold;">좌측 하단(노란색 테두리)</span>을 클릭하면 게임이 시작됩니다.</li>
        <li>오른쪽 상단의 <span style="color: var(--danger); font-weight: bold;">F(빨간색)</span> 칸에 정확히 도달하면 성공합니다.</li>
        <li>각 칸에 적힌 숫자는 현재 위치에서 <strong>상/하/좌/우</strong>로 정확히 그 숫자만큼만 '직진 점프'할 수 있는 거리입니다.</li>
        <li>그리드 바깥으로 벗어나는 점프는 불가능합니다.</li>
    </ul>
</div>

<div class="modal-overlay" id="modal-overlay">
    <div class="modal-card" id="modal-card">
        <div class="modal-title" id="modal-title">🎉 성공!</div>
        <div class="modal-body" id="modal-body">축하합니다! 미로를 탈출했습니다.</div>
        <div id="modal-btn-container">
            <button class="modal-btn" id="modal-confirm-btn">확인</button>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
    const dataSets = {};

    function hasValidPath(size, numbers) {
        const visited = Array.from({ length: size }, () => Array(size).fill(false));
        let solvable = false;

        function dfs(r, c) {
            if (solvable) return;
            if (r === 0 && c === size - 1) {
                solvable = true;
                return;
            }

            visited[r][c] = true;
            const jump = numbers[r][c];
            if (jump === 0) return;

            const directions = [
                {r: -jump, c: 0}, {r: jump, c: 0},
                {r: 0, c: -jump}, {r: 0, c: jump}
            ];

            for (let d of directions) {
                const nr = r + d.r;
                const nc = c + d.c;
                if (nr >= 0 && nr < size && nc >= 0 && nc < size) {
                    if (!visited[nr][nc]) {
                        dfs(nr, nc);
                    }
                }
            }
        }

        dfs(size - 1, 0);
        return solvable;
    }

    function generatePuzzleData(size) {
        let attempts = 0;
        while (attempts < 2000) {
            const numbers = Array.from({ length: size }, () => Array(size).fill(0));
            
            for (let r = 0; r < size; r++) {
                for (let c = 0; c < size; c++) {
                    if (r === 0 && c === size - 1) {
                        numbers[r][c] = 0;
                        continue;
                    }
                    
                    const maxUp = r;
                    const maxDown = size - 1 - r;
                    const maxLeft = c;
                    const maxRight = size - 1 - c;
                    const absoluteMax = Math.max(maxUp, maxDown, maxLeft, maxRight);
                    
                    let options = [];
                    for (let step = 1; step <= absoluteMax; step++) {
                        if (step <= maxUp || step <= maxDown || step <= maxLeft || step <= maxRight) {
                            options.push(step);
                        }
                    }
                    
                    if (options.length === 0) {
                        numbers[r][c] = 1;
                    } else {
                        numbers[r][c] = options[Math.floor(Math.random() * options.length)];
                    }
                }
            }

            if (hasValidPath(size, numbers)) {
                return { size, numbers };
            }
            attempts++;
        }
        
        const fallback = Array.from({ length: size }, () => Array(size).fill(1));
        fallback[0][size-1] = 0;
        return { size, numbers: fallback };
    }

    for (let s = 3; s <= 14; s++) {
        dataSets[s] = generatePuzzleData(s);
    }

    let currentSize = 3;
    let currentRow = 2;
    let currentCol = 0;
    let moveHistory = [];
    let isGameActive = false; 
    let gameStarted = false;  
    let targetNewPuzzleOnReset = false; 

    const stageHistory = {};
    
    let savedData = JSON.parse(localStorage.getItem('jumpMaze_recordSystem')) || { records: {}, lastUpdatedStage: null };
    let stageMoveRecords = savedData.records;
    let globalLastStage = savedData.lastUpdatedStage;

    const stageSelector = document.getElementById('stage-selector');
    const gridContainer = document.getElementById('grid-container');
    const statusStage = document.getElementById('status-stage');
    const statusMoves = document.getElementById('status-moves');
    const btnReset = document.getElementById('btn-reset');
    const btnNewPuzzle = document.getElementById('btn-new-puzzle');
    const btnUndo = document.getElementById('btn-undo');
    const recordContainer = document.getElementById('record-container');
    const btnClearRecord = document.getElementById('btn-clear-record');

    const modalOverlay = document.getElementById('modal-overlay');
    const modalCard = document.getElementById('modal-card');
    const modalTitle = document.getElementById('modal-title');
    const modalBody = document.getElementById('modal-body');
    const modalBtnContainer = document.getElementById('modal-btn-container');
    const modalConfirmBtn = document.getElementById('modal-confirm-btn');

    // 모달 닫기 시 게임 리셋 여부를 판별하기 위한 플래그 상태 정의
    let isClearRecordModalActive = false;

    function init() {
        renderStageButtons();
        loadStage(3);
        updateRecordTableUI();
    }

    function renderStageButtons() {
        stageSelector.innerHTML = '';
        for (let i = 3; i <= 14; i++) {
            const btn = document.createElement('button');
            btn.className = 'stage-btn';
            if (i === currentSize) btn.classList.add('active');
            btn.textContent = `${i}x${i}`;
            btn.addEventListener('click', () => {
                saveCurrentStateToHistory();
                loadStage(i);
            });
            stageSelector.appendChild(btn);
        }
    }

    function saveCurrentStateToHistory() {
        stageHistory[currentSize] = {
            currentRow,
            currentCol,
            moveHistory: [...moveHistory],
            isGameActive,
            gameStarted
        };
    }

    function loadStage(size) {
        currentSize = size;
        
        document.querySelectorAll('.stage-btn').forEach((btn) => {
            btn.classList.remove('active');
            if (parseInt(btn.textContent) === size) btn.classList.add('active');
        });

        statusStage.textContent = `크기: ${size}x${size}`;

        const targetCellWidth = 86; 
        let calculatedWidth = '100%';

        if ((size * targetCellWidth) + 16 < 800) {
            calculatedWidth = ((size * targetCellWidth) + 16) + 'px';
        } else {
            calculatedWidth = '100%'; 
        }
        
        document.documentElement.style.setProperty('--puzzle-total-width', calculatedWidth);

        if (stageHistory[size]) {
            const hist = stageHistory[size];
            currentRow = hist.currentRow;
            currentCol = hist.currentCol;
            moveHistory = hist.moveHistory;
            isGameActive = hist.isGameActive;
            gameStarted = hist.gameStarted;
        } else {
            currentRow = size - 1;
            currentCol = 0;
            moveHistory = [];
            isGameActive = false; 
            gameStarted = false;
        }

        renderGrid();
        updateGameControlUI();
    }

    function renderGrid() {
        gridContainer.innerHTML = '';
        gridContainer.style.gridTemplateColumns = `repeat(${currentSize}, 1fr)`; 
        gridContainer.style.gridTemplateRows = `repeat(${currentSize}, 1fr)`; 

        let cellScale = "0rem";
        if (currentSize >= 12) cellScale = "0.7rem";
        else if (currentSize >= 9) cellScale = "0.4rem";
        else if (currentSize >= 6) cellScale = "0.1rem";
        gridContainer.style.setProperty('--cell-scale', cellScale);

        const puzzleData = dataSets[currentSize];
        const jumpValue = puzzleData.numbers[currentRow][currentCol];

        const clickablePositions = [];
        if (isGameActive && gameStarted && jumpValue > 0) {
            const directions = [
                {r: -jumpValue, c: 0}, {r: jumpValue, c: 0},
                {r: 0, c: -jumpValue}, {r: 0, c: jumpValue}
            ];
            directions.forEach(d => {
                const nr = currentRow + d.r;
                const nc = currentCol + d.c;
                if (nr >= 0 && nr < currentSize && nc >= 0 && nc < currentSize) {
                    clickablePositions.push(`${nr},${nc}`);
                }
            });
        }

        const isFinishClickable = clickablePositions.includes(`0,${currentSize - 1}`);

        for (let r = 0; r < currentSize; r++) {
            for (let c = 0; c < currentSize; c++) {
                const cell = document.createElement('div');
                cell.className = 'grid-cell';
                
                const val = puzzleData.numbers[r][c];
                cell.textContent = (r === 0 && c === currentSize - 1) ? 'F' : val;

                if (r === currentSize - 1 && c === 0) {
                    cell.classList.add('start-cell');
                    if (!gameStarted) {
                        cell.addEventListener('click', startGame);
                    }
                }
                
                if (r === 0 && c === currentSize - 1) {
                    cell.classList.add('finish');
                    if (gameStarted && isFinishClickable) {
                        cell.classList.add('finish-active');
                    }
                }

                if (gameStarted && r === currentRow && c === currentCol) {
                    cell.classList.add('current'); 
                } else if (gameStarted && clickablePositions.includes(`${r},${c}`)) {
                    cell.classList.add('clickable'); 
                    cell.addEventListener('click', () => handleCellClick(r, c));
                } else {
                    if (gameStarted || !(r === currentSize - 1 && c === 0)) {
                        cell.classList.add('disabled');
                    }
                }

                gridContainer.appendChild(cell);
            }
        }

        if (isGameActive && gameStarted && clickablePositions.length === 0 && !(currentRow === 0 && currentCol === currentSize - 1)) {
            showModal(false);
            isGameActive = false;
            saveCurrentStateToHistory();
        }
    }

    function startGame() {
        isGameActive = true;
        gameStarted = true;
        currentRow = currentSize - 1;
        currentCol = 0;
        renderGrid();
        updateGameControlUI();
    }

    function updateGameControlUI() {
        statusMoves.textContent = `이동 횟수: ${moveHistory.length}`;
        btnUndo.disabled = moveHistory.length === 0 || !gameStarted;
    }

    function handleCellClick(row, col) {
        if (!isGameActive) return;

        moveHistory.push({ r: currentRow, c: currentCol });
        currentRow = row;
        currentCol = col;

        if (currentRow === 0 && currentCol === currentSize - 1) {
            isGameActive = false;
            triggerWin();
        } else {
            renderGrid();
            updateGameControlUI();
        }
    }

    function triggerWin() {
        renderGrid();
        updateGameControlUI();
        
        if (!stageMoveRecords[currentSize]) {
            stageMoveRecords[currentSize] = [];
        }
        stageMoveRecords[currentSize].push(moveHistory.length);
        globalLastStage = currentSize; 
        
        localStorage.setItem('jumpMaze_recordSystem', JSON.stringify({
            records: stageMoveRecords,
            lastUpdatedStage: globalLastStage
        }));
        
        updateRecordTableUI();
        targetNewPuzzleOnReset = true; 
        showModal(true);
    }

    function updateRecordTableUI() {
        const activeSizes = Object.keys(stageMoveRecords).filter(size => stageMoveRecords[size] && stageMoveRecords[size].length > 0);
        
        if (activeSizes.length === 0) {
            recordContainer.innerHTML = `<div class="no-record-msg">성공한 스테이지가 없습니다. 성공 기록을 쌓아보세요!</div>`;
            return;
        }

        let tableHTML = `
            <table class="record-table">
                <thead>
                    <tr>
                        <th>스테이지 크기</th>
                        <th>이동 횟수 기록 이력 (전체 중 가장 마지막 기록만 <span style="color:var(--danger)">빨간색</span>)</th>
                    </tr>
                </thead>
                <tbody>
        `;

        activeSizes.map(Number).sort((a, b) => a - b).forEach(size => {
            const records = stageMoveRecords[size];
            let itemElements = [];

            records.forEach((rec, index) => {
                if (size === globalLastStage && index === records.length - 1) {
                    itemElements.push(`<span class="last-score">${rec}</span>`);
                } else {
                    itemElements.push(`<span>${rec}</span>`);
                }
            });

            tableHTML += `
                <tr>
                    <td><strong>${size}x${size}</strong></td>
                    <td>${itemElements.join(', ')}</td>
                </tr>
            `;
        });

        tableHTML += `
                </tbody>
            </table>
        `;

        recordContainer.innerHTML = tableHTML;
    }

    // 누적 기록 초기화 커스텀 모달 노출 처리 함수
    btnClearRecord.addEventListener('click', () => {
        isClearRecordModalActive = true;
        
        modalCard.className = 'modal-card clear-record';
        modalTitle.className = 'modal-title clear-record';
        modalTitle.textContent = '기록 초기화';
        modalBody.textContent = '누적 기록을 모두 삭제하시겠습니까?';
        
        // 취소(회색), 초기화(빨간색) 트윈 버튼 생성 및 컨테이너 바인딩
        modalBtnContainer.innerHTML = `
            <div class="modal-btn-group">
                <button class="modal-btn modal-btn-cancel" id="modal-clear-cancel-btn">취소</button>
                <button class="modal-btn modal-btn-confirm" id="modal-clear-confirm-btn">초기화</button>
            </div>
        `;

        // 초기화 모달 이벤트 연결
        document.getElementById('modal-clear-cancel-btn').addEventListener('click', closeModal);
        document.getElementById('modal-clear-confirm-btn').addEventListener('click', () => {
            stageMoveRecords = {};
            globalLastStage = null;
            localStorage.removeItem('jumpMaze_recordSystem');
            updateRecordTableUI();
            closeModal();
        });

        modalOverlay.classList.add('show');
    });

    btnReset.addEventListener('click', () => {
        if (targetNewPuzzleOnReset) {
            dataSets[currentSize] = generatePuzzleData(currentSize);
            targetNewPuzzleOnReset = false;
        }
        currentRow = currentSize - 1;
        currentCol = 0;
        moveHistory = [];
        isGameActive = false;
        gameStarted = false;
        saveCurrentStateToHistory();
        renderGrid();
        updateGameControlUI();
    });

    btnNewPuzzle.addEventListener('click', () => {
        dataSets[currentSize] = generatePuzzleData(currentSize);
        targetNewPuzzleOnReset = false;
        currentRow = currentSize - 1;
        currentCol = 0;
        moveHistory = [];
        isGameActive = false;
        gameStarted = false;
        saveCurrentStateToHistory();
        renderGrid();
        updateGameControlUI();
    });

    btnUndo.addEventListener('click', () => {
        if (moveHistory.length === 0) return;
        const previousPos = moveHistory.pop();
        currentRow = previousPos.r;
        currentCol = previousPos.c;
        isGameActive = true;
        gameStarted = true;
        saveCurrentStateToHistory();
        renderGrid();
        updateGameControlUI();
    });

    function showModal(isSuccess) {
        isClearRecordModalActive = false;
        
        modalCard.className = 'modal-card ' + (isSuccess ? 'success' : 'danger');
        modalTitle.className = 'modal-title ' + (isSuccess ? 'success' : 'danger');
        
        // 원래 단일 레이아웃 버튼으로 복원 처리
        modalBtnContainer.innerHTML = `<button class="modal-btn" id="modal-confirm-btn">확인</button>`;
        const newConfirmBtn = document.getElementById('modal-confirm-btn');
        newConfirmBtn.className = 'modal-btn ' + (isSuccess ? 'success' : 'danger');
        newConfirmBtn.addEventListener('click', closeModal);

        if (isSuccess) {
            modalTitle.textContent = '🎉 성공! 정답입니다.';
            modalBody.textContent = `미로를 무사히 탈출했습니다! (총 이동 횟수: ${moveHistory.length}회)`;
            newConfirmBtn.textContent = '다시 하기';
        } else {
            modalTitle.textContent = '❌ 실패! 탈출 불가';
            modalBody.textContent = '이동 가능한 거리가 없습니다. 다시 시작해 보세요.';
            newConfirmBtn.textContent = '다시 시도';
        }

        modalOverlay.classList.add('show');
    }

    function closeModal() {
        modalOverlay.classList.remove('show');
        // 기록 초기화 창을 닫을 때는 게임판이 강제로 리셋되는 구조(btnReset.click())를 패스하도록 방어막 처리
        if (!isClearRecordModalActive) {
            btnReset.click(); 
        }
        isClearRecordModalActive = false;
    }

    modalConfirmBtn.addEventListener('click', closeModal);
    window.addEventListener('contextmenu', (e) => { e.preventDefault(); });

    init();
});
</script>
</body>
</html>
