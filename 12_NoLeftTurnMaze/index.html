<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=0.90, minimum-scale=0.2, maximum-scale=5.0, user-scalable=yes">
  <title>좌회전 금지 미로</title>
  <style>
    body {
      touch-action: manipulation; 
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      background: #f0f0f0;
    }

    .stage-buttons {
      margin-bottom: 6px;
    }

    .stage-buttons button {
      margin: 0 5px;
      padding: 8px 14px;
      font-size: 15px;
      border: none;
      background-color: #ccc;
      color: white;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .stage-buttons button.active {
      background-color: #007bff;
      color: white;
    }

    .stage-buttons button.cleared {
      background-color: #4caf50 !important;
      color: #fff !important;
    }

    .map {
      display: grid;
      gap: 0;
      position: relative;
      user-select: none;
      background-color: #fff;
      border: 3px solid #007bff;
      box-shadow: 0 0 6px rgba(0,0,0,0.1);
    }

    .cell {
      position: relative;
      background: white;
      box-sizing: border-box;
      width: 50px;
      height: 50px;
    }

    .cell .dir {
      position: absolute;
      background: #333;
    }

    .cell .up { top: 0; left: 50%; width: 8px; height: 28px; transform: translateX(-50%); }
    .cell .down { bottom: 0; left: 50%; width: 8px; height: 28px; transform: translateX(-50%); }
    .cell .left { left: 0; top: 50%; width: 28px; height: 8px; transform: translateY(-50%); }
    .cell .right { right: 0; top: 50%; width: 28px; height: 8px; transform: translateY(-50%); }

    .label {
      position: absolute;
      bottom: -28px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 18px;
      font-weight: bold;
      color: #444;
      white-space: nowrap; /* 글자가 줄바꿈되지 않도록 설정 */
      z-index: 0;
    }

    .unit {
      position: absolute;
      top: 13px;
      left: 13px;
      width: 24px;
      height: 24px;
      z-index: 10;
      pointer-events: none;
    }

    .triangle {
      width: 0;
      height: 0;
      border-left: 12px solid transparent;
      border-right: 12px solid transparent;
      border-bottom: 24px solid #007bff;
      transition: transform 0.3s;
    }

    .controls {
      margin-top: 15px;
    }

    .controls button {
      margin: 0 5px;
      padding: 6px 16px;
      font-size: 15px;
      height: 50px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .controls button:disabled {
      background: #aaa;
      cursor: default;
    }

    #msg {
      margin-top: 12px;
      font-size: 18px;
      color: green;
      font-weight: bold;
      height: 24px;
    }

    #timer {
      margin-top: 10px;
      font-size: 16px;
      font-weight: 600;
      color: #333;
    }
  </style>
</head>
<body>

<div class="stage-buttons">
  <button id="sbtn1" onclick="loadStage(1)">1단계</button>
  <button id="sbtn2" onclick="loadStage(2)">2단계</button>
  <button id="sbtn3" onclick="loadStage(3)">3단계</button>
</div>
<br>
<div class="map" id="map"></div>
<br>
<div class="controls">
  <button id="btnForward" onclick="moveForward()">앞으로</button>
  <button id="btnTurn" onclick="rotateRight()">우회전</button>
  <button onclick="restartStage()">처음부터</button>
</div>

<div id="msg"></div>
<div id="timer">경과 시간: 0.00초</div>
<br>
<div style="font-size: 18px;">
    ◈ 키보드<br>
    앞으로: ↑, 우회전: →, 처음부터: R
</div>

<script>
let width, height;
const mapEl = document.getElementById('map');
const msgEl = document.getElementById('msg');
const timerEl = document.getElementById('timer');
const btnForward = document.getElementById('btnForward');
const btnTurn = document.getElementById('btnTurn');

const delta = { up: [-1, 0], right: [0, 1], down: [1, 0], left: [0, -1] };
const opp = { up: 'down', down: 'up', left: 'right', right: 'left' };
const dirs = ['up', 'right', 'down', 'left'];

let configStages = {
    1: { width: 7, height: 7, start: [6, 5], goal: [6, 1], grid: [['DR','DLR','DLR','LR','DLR','LR','DL'],['UD','UDR','UDLR','LR','ULR','DLR','UDL'],['UD','UD','UR','DLR','DLR','UDL','UD'],['UR','UDLR','LR','UDLR','UL','UD','UD'],['','UDR','LR','ULR','DLR','UDL','UD'],['','UDR','LR','LR','ULR','UDLR','UL'],['','UD','','','','UD',''],['','','','','','','']] },
    2: { width: 7, height: 7, start: [6, 5], goal: [6, 2], grid: [['RD','DLR','LR','LR','DLR','LR','LD'],['UD','UDR','LR','DLR','ULR','DLR','UDL'],['UDR','UDLR','DLR','UDLR','DLR','UDL','UD'],['UD','UDR','UDL','UD','UDR','UDLR','UL'],['UR','UL','UDR','ULR','UDL','UD',''],['','','UDR','LR','ULR','UDL',''],['','','UD','','','UD','']] },
    3: { width: 8, height: 9, start: [8, 0], goal: [8, 3], grid: [['DR','DLR','LR','LR','DLR','DL','DR','DL'],['UR','UDLR','DLR','DLR','UDL','UDR','ULR','UDL'],['DR','ULR','UDLR','UDL','UDR','UDLR','DL','UD'],['UD','DR','UDLR','UDLR','UDL','UDR','ULR','UDL'],['UDR','UDLR','UL','UDR','ULR','ULR','DL','UD'],['UD','UDR','DLR','ULR','DLR','DLR','UDLR','UL'],['UDR','UL','UDR','DLR','UDLR','UDLR','UDLR','DL'],['UD','','UR','UDLR','UL','UR','ULR','UL'],['UD','','','UD','','','','']] }
};

// --- 상태 관리 변수 ---
let uy, ux, dirIdx, currentStage = null;
let moveStack = [];
let cellDirs = [];
let clearedStages = new Set();
let stageStates = {}; // 스테이지별 상태 저장소

let timer = null;
let timeSec = 0;
let hasStarted = false;

function startTimer() {
  clearInterval(timer);
  timer = setInterval(() => {
    timeSec += 0.01;
    timerEl.textContent = `경과 시간: ${timeSec.toFixed(2)}초`;
  }, 10);
}

function stopTimer() {
  clearInterval(timer);
}

function saveCurrentState() {
  if (currentStage === null) return;
  stageStates[currentStage] = {
    uy, ux, dirIdx, moveStack: [...moveStack], 
    timeSec, hasStarted, 
    msg: msgEl.textContent,
    isCleared: clearedStages.has(currentStage)
  };
}

function loadStage(stageNum) {
  // 현재 상태 저장
  saveCurrentState();

  currentStage = stageNum;
  const stage = configStages[stageNum];
  width = stage.width;
  height = stage.height;
  
  // 초기화
  mapEl.innerHTML = '';
  stopTimer();

  // 맵 생성 및 그리기 (매번 초기화는 필요함)
  mapEl.style.gridTemplateColumns = `repeat(${width}, 50px)`;
  mapEl.style.gridTemplateRows = `repeat(${height}, 50px)`;
  cellDirs = Array.from({ length: height }, () => Array(width).fill([]));

  for (let y = 0; y < height; y++) {
    for (let x = 0; x < width; x++) {
      const cfg = (stage.grid[y] && stage.grid[y][x]) || '';
      cellDirs[y][x] = cfg.split('').map(ch => ({'U':'up','D':'down','L':'left','R':'right'}[ch]));
      
      const cell = document.createElement('div');
      cell.className = 'cell';
      cellDirs[y][x].forEach(d => {
        const dirDiv = document.createElement('div');
        dirDiv.className = `dir ${d}`;
        cell.appendChild(dirDiv);
      });

      if (y === stage.start[0] && x === stage.start[1]) {
        const lbl = document.createElement('div'); lbl.className = 'label'; lbl.textContent = '출발';
        cell.appendChild(lbl);
      }
      if (y === stage.goal[0] && x === stage.goal[1]) {
        const lbl = document.createElement('div'); lbl.className = 'label'; lbl.textContent = '도착';
        cell.appendChild(lbl);
      }
      mapEl.appendChild(cell);
    }
  }

  // 데이터 복원 혹은 신규 생성
  if (stageStates[stageNum]) {
    const s = stageStates[stageNum];
    uy = s.uy; ux = s.ux; dirIdx = s.dirIdx;
    moveStack = s.moveStack;
    timeSec = s.timeSec;
    hasStarted = s.hasStarted;
    msgEl.textContent = s.msg;
    if (hasStarted && !s.isCleared && !s.msg.includes('실패')) startTimer();
    else timerEl.textContent = `경과 시간: ${timeSec.toFixed(2)}초`;
  } else {
    uy = stage.start[0]; ux = stage.start[1]; dirIdx = 0;
    moveStack = [];
    timeSec = 0;
    hasStarted = false;
    msgEl.textContent = '';
    timerEl.textContent = `경과 시간: 0.00초`;
  }

  // 유닛 배치
  const unit = document.createElement('div');
  unit.className = 'unit';
  unit.id = 'unit';
  const tri = document.createElement('div');
  tri.className = 'triangle';
  tri.id = 'tri';
  unit.appendChild(tri);
  mapEl.children[uy * width + ux].appendChild(unit);
  tri.style.transform = `rotate(${dirIdx * 90}deg)`;

  updateUI();
}

function updateUI() {
  // 스테이지 버튼 스타일
  document.querySelectorAll('.stage-buttons button').forEach((btn, idx) => {
    const num = idx + 1;
    btn.className = '';
    if (num === currentStage) btn.classList.add('active');
    if (clearedStages.has(num)) btn.classList.add('cleared');
  });

  const isGoal = (uy === configStages[currentStage].goal[0] && ux === configStages[currentStage].goal[1]);
  if (isGoal) {
    btnForward.disabled = true;
    btnTurn.disabled = true;
  } else {
    btnForward.disabled = !canMoveForward();
    btnTurn.disabled = !canTurnAndMove();
    if (!canMoveForward() && !canTurnAndMove()) {
        msgEl.textContent = '🔴 실패했습니다.';
        stopTimer();
    }
  }
}

function canMoveForward() {
  const d = dirs[dirIdx];
  const [dy, dx] = delta[d];
  const ny = uy + dy, nx = ux + dx;
  if (ny < 0 || ny >= height || nx < 0 || nx >= width) return false;
  return cellDirs[uy][ux].includes(d) && cellDirs[ny][nx].includes(opp[d]);
}

function canTurnAndMove() {
  const newDir = (dirIdx + 1) % 4;
  const [dy, dx] = delta[dirs[newDir]];
  const ny = uy + dy, nx = ux + dx;
  if (ny < 0 || ny >= height || nx < 0 || nx >= width) return false;
  return cellDirs[uy][ux].includes(dirs[newDir]) && cellDirs[ny][nx].includes(opp[dirs[newDir]]);
}

function moveForward() {
  if (!canMoveForward()) return;
  if (!hasStarted) { hasStarted = true; startTimer(); }

  moveStack.push({uy, ux, dirIdx});
  const [dy, dx] = delta[dirs[dirIdx]];
  
  const unit = document.getElementById('unit');
  uy += dy; ux += dx;
  mapEl.children[uy * width + ux].appendChild(unit);

  if (uy === configStages[currentStage].goal[0] && ux === configStages[currentStage].goal[1]) {
    msgEl.textContent = '🟢 성공! 도착했습니다!';
    stopTimer();
    clearedStages.add(currentStage);
  }
  updateUI();
}

function rotateRight() {
  if (!canTurnAndMove()) return;
  if (!hasStarted) { hasStarted = true; startTimer(); }

  moveStack.push({uy, ux, dirIdx});
  dirIdx = (dirIdx + 1) % 4;
  document.getElementById('tri').style.transform = `rotate(${dirIdx * 90}deg)`;
  
  if (canMoveForward()) moveForward();
  else updateUI();
}

function restartStage() {
  // 1. 현재 스테이지의 저장된 상태 데이터를 완전히 삭제
  delete stageStates[currentStage]; 

  // 2. 현재 실행 중인 타이머 중지
  stopTimer();

  // 3. 내부 변수(위치, 방향, 이동기록, 시간 등)를 초기 상태로 리셋
  const stage = configStages[currentStage];
  uy = stage.start[0];
  ux = stage.start[1];
  dirIdx = 0;
  moveStack = [];
  timeSec = 0;
  hasStarted = false;

  // 4. 스테이지를 다시 로드하여 화면 갱신
  loadStage(currentStage);
}

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowUp') moveForward();
  if (e.key === 'ArrowRight') rotateRight();
  if (e.key.toLowerCase() === 'r') restartStage(); // r, R 모두 대응
});

loadStage(1);
</script>
</body>
</html>
