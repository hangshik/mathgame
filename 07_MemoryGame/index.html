<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>메모리 게임</title>
  <style>
    :root { --bg: #f0f2f5; --card-bg: #ffffff; --active: #007bff; --success: #28a745; --danger: #dc3545; --text-main: #222222; --text-sub: #555555; --border: #e9ecef; --btn-base: #f8f9fa; }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; }
    body { background-color: var(--bg); padding: 15px 10px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
    .wrapper { width: 100%; max-width: 800px; display: flex; flex-direction: column; gap: 20px; }
    .title-area { text-align: center; padding: 10px 0; }
    .container-fixed { background-color: var(--card-bg); border-radius: 20px; padding: 24px; box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05); }
    
    /* 단계 버튼 레이아웃 */
    .stage-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; }
    @media (max-width: 600px) { .stage-grid { grid-template-columns: repeat(4, 1fr); } }
    @media (max-width: 400px) { .stage-grid { grid-template-columns: repeat(3, 1fr); } }
    .stage-btn { width: 100%; font-size: 14px; font-weight: 600; padding: 10px 0; border-radius: 12px; border: 1px solid var(--border); background-color: var(--btn-base); cursor: pointer; }
    .stage-btn.active { background-color: var(--active); color: white; }
    .stage-btn.completed { background-color: var(--success); color: white; }
    
    .game-board { display: grid; grid-template-columns: repeat(9, 1fr); grid-template-rows: repeat(5, 1fr); gap: 8px; width: 100%; aspect-ratio: 9 / 5; }
    @media (max-width: 600px) { .game-board { gap: 4px; } }
    .cell { background-color: #e9ecef; display: flex; justify-content: center; align-items: center; font-size: clamp(12px, 4vw, 24px); font-weight: 700; border-radius: 8px; cursor: pointer; color: var(--active); border: 2px solid transparent; }
    .cell.hidden { background-color: var(--active); color: var(--active); }
    .cell.clicked { background-color: #ffffff; border: 2px solid var(--border); color: #adb5bd; cursor: default; }
    .cell.wrong { color: var(--danger) !important; border: 2px solid var(--danger) !important; background-color: #ffeef0; }
    .start-cell { grid-column: 9; grid-row: 5; background-color: var(--success); color: white; border-radius: 8px; display: flex; justify-content: center; align-items: center; cursor: pointer; font-weight: 700; }
    
    .guide-box { background-color: var(--card-bg); border-radius: 12px; padding: 18px 30px; border-left: 6px solid var(--active); }
    .modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); display: flex; justify-content: center; align-items: center; z-index: 1000; opacity:0; pointer-events: none; transition: opacity 0.3s; }
    .modal-overlay.open { opacity:1; pointer-events: auto; }
    .modal-card { background: white; width:90%; max-width:350px; padding: 30px; border-radius: 20px; text-align: center; }
    .modal-card.success-type { border-top: 6px solid var(--success); }
    .modal-card.danger-type { border-top: 6px solid var(--danger); }
    .modal-action-btn { width: 100%; height: 48px; border: none; border-radius: 12px; font-weight: 700; color: white; cursor: pointer; margin-top: 20px; }
  </style>
</head>
<body>

<div class="wrapper">
  <div class="title-area"><h1>메모리 게임</h1></div>
  <div class="container-fixed"><div class="stage-grid" id="stage-buttons"></div></div>
  <div class="container-fixed"><div class="game-board" id="game-board"></div></div>
  <div class="guide-box">
    <h3>💡 게임 규칙</h3>
    <ul>
      <li>'Start' 버튼을 누르면 숫자가 나타납니다.</li>
      <li>숫자 1을 누르면 가림막이 생깁니다.</li>
      <li>순서대로 누르세요. 틀리면 오답 이후 숫자는 빨간색으로 표시됩니다.</li>
    </ul>
  </div>
</div>

<div class="modal-overlay" id="result-modal">
  <div class="modal-card" id="modal-card">
    <div id="modal-title" style="font-size:24px; font-weight:800; margin-bottom:10px;">🎉 성공!</div>
    <div id="modal-desc">단계를 클리어했습니다.</div>
    <button class="modal-action-btn" id="modal-action-btn">확인</button>
  </div>
</div>

<script>
  const MIN_STAGE = 5, MAX_STAGE = 22;
  let currentStage = 5;
  let completedStages = new Set();
  let stageHistory = {};

  function initStage(num) {
    return { isStarted: false, gameStarted: false, sequence: Array.from({length: num}, (_,i) => i+1), userSequence: [], boardCells: Array.from({length: 45}, (_,i) => ({id: i+1, hasNumber: null, isClicked: false, isWrong: false})) };
  }

  function renderStageButtons() {
    const container = document.getElementById('stage-buttons');
    container.innerHTML = '';
    for (let i = MIN_STAGE; i <= MAX_STAGE; i++) {
      const btn = document.createElement('button');
      btn.textContent = `${i}단계`;
      btn.className = `stage-btn ${i === currentStage ? 'active' : ''} ${completedStages.has(i) ? 'completed' : ''}`;
      btn.onclick = () => { 
        currentStage = i; 
        if(!stageHistory[i]) stageHistory[i] = initStage(i);
        stageHistory[i].isStarted = false; 
        renderStageButtons(); drawBoard(); 
      };
      container.appendChild(btn);
    }
  }

  function drawBoard() {
    const gameBoard = document.getElementById('game-board');
    gameBoard.innerHTML = '';
    const state = stageHistory[currentStage];
    state.boardCells.forEach(cell => {
      if (cell.id === 45 && !state.isStarted) {
        const start = document.createElement('div'); start.className = 'start-cell'; start.textContent = 'Start';
        start.onclick = () => {
          state.isStarted = true; state.gameStarted = false; state.userSequence = [];
          state.boardCells.forEach(c => {c.hasNumber = null; c.isClicked = false; c.isWrong = false;});
          let pos = Array.from({length: 45}, (_,i) => i).sort(() => Math.random() - 0.5);
          state.sequence.forEach((n, i) => state.boardCells[pos[i]].hasNumber = n);
          drawBoard();
        };
        gameBoard.appendChild(start);
      } else {
        const el = document.createElement('div');
        const isHidden = state.gameStarted && !cell.isClicked && cell.hasNumber;
        el.className = `cell ${cell.isClicked ? 'clicked' : ''} ${isHidden ? 'hidden' : ''} ${cell.isWrong ? 'wrong' : ''}`;
        if (cell.isClicked || (!state.gameStarted && cell.hasNumber)) el.textContent = cell.hasNumber || '';
        el.onclick = () => handleCellClick(cell);
        gameBoard.appendChild(el);
      }
    });
  }

  function handleCellClick(cell) {
    const state = stageHistory[currentStage];
    if (!state.isStarted || cell.isClicked || !cell.hasNumber) return;
    if (cell.hasNumber === 1) state.gameStarted = true;
    
    if (cell.hasNumber === state.userSequence.length + 1) {
      state.userSequence.push(cell.hasNumber);
      cell.isClicked = true;
      if (state.userSequence.length === state.sequence.length) {
        completedStages.add(currentStage);
        showModal(true);
      } else { drawBoard(); }
    } else {
      state.gameStarted = false;
      state.boardCells.forEach(c => { if(c.hasNumber > state.userSequence.length) c.isWrong = true; });
      drawBoard();
      showModal(false);
    }
  }

  function showModal(isSuccess) {
    const card = document.getElementById('modal-card');
    const title = document.getElementById('modal-title');
    const desc = document.getElementById('modal-desc');
    const btn = document.getElementById('modal-action-btn');
    card.className = `modal-card ${isSuccess ? 'success-type' : 'danger-type'}`;
    title.textContent = isSuccess ? '🎉 성공!' : '❌ 틀렸습니다!';
    title.style.color = isSuccess ? 'var(--success)' : 'var(--danger)';
    desc.innerHTML = isSuccess ? `${currentStage}단계를 클리어했습니다.` : `순서가 올바르지 않습니다.<br>다시 도전해보세요.`;
    btn.textContent = isSuccess ? '다음 단계로' : '다시 시도';
    btn.style.backgroundColor = isSuccess ? 'var(--success)' : 'var(--danger)';
    btn.onclick = () => {
      document.getElementById('result-modal').classList.remove('open');
      if (isSuccess && currentStage < MAX_STAGE) currentStage++;
      stageHistory[currentStage].isStarted = false;
      renderStageButtons();
      drawBoard();
    };
    document.getElementById('result-modal').classList.add('open');
  }

  for(let i=MIN_STAGE; i<=MAX_STAGE; i++) stageHistory[i] = initStage(i);
  renderStageButtons();
  drawBoard();
</script>
</body>
</html>
