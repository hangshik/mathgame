<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>슬라이딩 퍼즐</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
    <style>
        :root {
            --bg: #f0f2f5;
            --card-bg: #ffffff;
            --active: #007bff;
            --success: #28a745;
            --danger: #dc3545;
            --text-main: #222222;
            --text-sub: #555555;
            --table-border: #e9ecef;
            --btn-dark-gray: #6c757d; /* 취소 버튼용 어두운 회색 */
            
            /* 자바스크립트에서 동적으로 계산되어 할당될 변수 */
            --square-size: 75px;
            --square-font-size: 24px;
        }

        * {
            box-sizing: border-box;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
        }

        body {
            background: var(--bg);
            color: var(--text-main);
            min-height: 100vh;
            margin: 0;
            padding: 15px 10px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            touch-action: manipulation;
            overscroll-behavior: none;
            -webkit-user-select: none;
            user-select: none;
        }

        .container-fixed {
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* 영역 1-A: 퍼즐 제목 영역 */
        h1 {
            text-align: center;
            font-size: 32px;
            font-weight: 800;
            margin: 10px 0 0 0;
            color: var(--text-main);
        }

        /* 영역 1-B: 설정 및 제어 영역 */
        .config-card {
            background: var(--card-bg);
            padding: 18px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.03);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .config-group {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        .config-card label {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-main);
        }

        .config-card input[type="number"] {
            font-size: 16px;
            font-weight: 600;
            width: 55px;
            height: 38px;
            text-align: center;
            border: 1px solid #ced4da;
            border-radius: 8px;
            color: var(--text-main);
            background-color: #f8f9fa;
        }

        .config-card input[type="number"]:focus {
            outline: none;
            border-color: var(--active);
            background-color: #fff;
        }

        .btn-start {
            height: 38px;
            padding: 0 24px;
            font-size: 15px;
            font-weight: 700;
            background: var(--active);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            flex-shrink: 0;
            transition: all 0.2s ease;
            box-shadow: 0 4px 8px rgba(0, 123, 255, 0.2);
        }

        .btn-start:hover {
            background: #0069d9;
        }

        /* 타이머 가로폭 고정 및 좌우 흔들림 차단 */
        .timer-wrapper {
            font-weight: 700;
            font-size: 16px;
            color: var(--danger);
            background: #fff5f5;
            border: 1px solid #ffe3e3;
            border-radius: 8px;
            display: none;
            align-items: center;
            justify-content: center;
            width: 100px; 
            height: 38px;
            flex-shrink: 0;
            font-variant-numeric: tabular-nums; 
        }

        /* 영역 2: 퍼즐 문제 영역 */
        .puzzle-card {
            background: var(--card-bg);
            padding: 24px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.04);
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            height: auto;
        }

        .puzzle-container {
            display: grid;
            gap: 6px;
            background: #e9ecef;
            padding: 6px;
            border-radius: 12px;
            width: fit-content;
            margin: 0 auto;
        }

        .puzzle-square {
            width: var(--square-size);
            height: var(--square-size);
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: var(--active);
            color: white;
            font-size: var(--square-font-size);
            font-weight: 700;
            cursor: pointer;
            user-select: none;
            border-radius: 6px;
            transition: background-color 0.15s ease;
        }

        .puzzle-square:hover {
            background-color: #0069d9;
        }

        .puzzle-square.empty {
            background-color: #dee2e6;
            cursor: default;
        }

        /* 가이드 공간 공통 스타일 */
        .guide-box {
            background: var(--card-bg);
            padding: 18px 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.02);
            font-size: 16px;
            line-height: 1.6;
            color: var(--text-sub);
            width: 100%;
            word-break: keep-all;
            text-align: left;
        }

        .guide-box b {
            font-size: 17px;
            display: block;
            margin-bottom: 6px;
        }

        /* 영역 6: 누적 기록 표 공간 (스크롤바 및 최대 높이 제한 완전 제거) */
        .guide-status {
            border-left: 6px solid var(--danger);
            height: auto; /* 고정 및 최대 높이 해제 */
            display: flex;
            flex-direction: column;
        }
        
        .stats-header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
            width: 100%;
        }

        .guide-status b { color: var(--danger); margin-bottom: 0; }
        
        /* 누적 기록 초기화 버튼 스타일 */
        .clear-history-btn {
            background-color: #ffffff;
            color: var(--danger);
            border: 2px solid var(--danger);
            padding: 4px 12px;
            font-size: 14px;
            font-weight: 700;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .clear-history-btn:hover {
            background-color: #fff5f5;
            color: #b02a37;
            border-color: #b02a37;
        }

        .table-scroll-area {
            width: 100%;
        }

        /* 영역 4: 퍼즐 규칙 */
        .guide-rules {
            border-left: 6px solid var(--active);
        }
        .guide-rules b { color: var(--active); }

        /* 기록 집계 테이블 스타일 */
        .history-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            font-size: 15px;
            text-align: center;
        }

        .history-table th {
            background-color: #f8f9fa;
            color: var(--text-main);
            font-weight: 700;
            padding: 10px;
            border-bottom: 2px solid var(--table-border);
        }

        .history-table td {
            padding: 12px 10px;
            border-bottom: 1px solid var(--table-border);
            color: var(--text-main);
        }

        .time-badge {
            display: inline-block;
            background: #e6f7ff;
            color: #0050b3;
            padding: 2px 8px;
            border-radius: 4px;
            margin: 2px 4px;
            font-size: 14px;
            font-weight: 600;
        }

        .time-badge.latest-record {
            background: #fff5f5;
            color: var(--danger);
            border: 1px solid #ffe3e3;
        }

        /* 결과 알림 팝업창 (모달) 시스템 */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            backdrop-filter: blur(4px);
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            padding: 20px;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-card {
            background: var(--card-bg);
            border-radius: 20px;
            width: 100%;
            max-width: 350px;
            padding: 24px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            transform: translateY(20px);
            transition: transform 0.3s ease;
        }

        .modal-overlay.active .modal-card {
            transform: translateY(0);
        }

        .modal-card.success-mode { border-top: 6px solid var(--success); }
        .modal-card.danger-mode { border-top: 6px solid var(--danger); }

        .modal-title {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 12px;
        }
        .modal-card.success-mode .modal-title { color: var(--success); }
        .modal-card.danger-mode .modal-title { color: var(--danger); }

        .modal-body {
            font-size: 16px;
            color: var(--text-sub);
            margin-bottom: 24px;
            line-height: 1.5;
        }

        /* 버튼 컨테이너 배치용 */
        .modal-btn-container {
            display: flex;
            gap: 10px;
            width: 100%;
        }

        .modal-btn {
            flex: 1;
            height: 48px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            color: white;
            transition: background-color 0.2s ease;
        }
        .modal-card.success-mode .modal-btn { background: var(--success); }
        .modal-card.success-mode .modal-btn:hover { background: #218838; }

        /* 🛠️ 우선순위 결합 강화를 통해 상위 모드에 관계없이 항상 최초 회색 배경 고정 */
        .modal-card .modal-btn.btn-cancel {
            background-color: var(--btn-dark-gray) !important;
            color: #ffffff !important;
        }
        .modal-card .modal-btn.btn-cancel:hover {
            background-color: #5a6268 !important;
        }

        .modal-card .modal-btn.btn-confirm-delete {
            background-color: var(--danger) !important;
            color: #ffffff !important;
        }
        .modal-card .modal-btn.btn-confirm-delete:hover {
            background-color: #bd2130 !important;
        }
    </style>
</head>
<body>

    <div class="container-fixed">
        <h1>슬라이딩 퍼즐</h1>

        <div class="config-card">
            <div class="config-group">
                <label for="cols">가로</label>
                <input type="number" id="cols" min="2" max="10" value="4">
            </div>
            <div class="config-group">
                <label for="rows">세로</label>
                <input type="number" id="rows" min="2" max="10" value="4">
            </div>

            <button class="btn-start" onclick="initializePuzzle()">퍼즐 생성</button>
            
            <div class="timer-wrapper" id="timerWrapper">
                <span id="timer">0.00초</span>
            </div>
        </div>

        <div class="puzzle-card" id="puzzleCard">
            <div class="puzzle-container" id="puzzle-container"></div>
        </div>

        <div class="guide-box guide-status">
            <div class="stats-header-container">
                <b>📊 누적 기록</b>
                <button class="clear-history-btn" id="clearHistoryBtn">누적 기록 초기화</button>
            </div>
            <div class="table-scroll-area">
                <table class="history-table">
                    <thead>
                        <tr>
                            <th style="width: 25%;">퍼즐 크기</th>
                            <th style="width: 20%;">성공 횟수</th>
                            <th style="width: 55%;">기록 집계 (완료 시간)</th>
                        </tr>
                    </thead>
                    <tbody id="historyTableBody">
                        <tr>
                            <td colspan="3" id="emptyRow" style="color: var(--text-sub); font-style: italic; padding: 15px 0;">아직 달성한 클리어 기록이 없습니다.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="guide-box guide-rules">
            <b>◈ 게임 방법</b>
            • 퍼즐 조각을 클릭하면 인접한 빈 칸과 위치가 교환됩니다.<br>
            • 1부터 순서대로 숫자를 정렬하여 퍼즐을 올바르게 완성해보세요.
        </div>

    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-card" id="modalCard">
            <div class="modal-title" id="modalTitle">🎉 퍼즐 완성!</div>
            <div class="modal-body" id="modalBody">0.00초 만에 퍼즐을 완성했습니다!</div>
            <div class="modal-btn-container" id="modalBtnContainer">
                <button class="modal-btn" id="modalBtn">확인</button>
            </div>
        </div>
    </div>

    <script>
        // 모바일 제스처 방지
        document.addEventListener('gesturestart', function(e) { e.preventDefault(); });
        document.addEventListener('dblclick', function(event) { event.preventDefault(); }, { passive: false });
        document.addEventListener('contextmenu', e => e.preventDefault());

        const puzzleCard = document.getElementById('puzzleCard');
        const puzzleContainer = document.getElementById('puzzle-container');
        const timerWrapper = document.getElementById('timerWrapper');
        const timerElement = document.getElementById('timer');
        const historyTableBody = document.getElementById('historyTableBody');
        const clearHistoryBtn = document.getElementById('clearHistoryBtn');
        
        const modalOverlay = document.getElementById('modalOverlay');
        const mCard = document.getElementById('modalCard');
        const mTitle = document.getElementById('modalTitle');
        const mBody = document.getElementById('modalBody');
        const mBtnContainer = document.getElementById('modalBtnContainer');
        const modalBtn = document.getElementById('modalBtn');

        let puzzleState = [];
        let rows = 4, cols = 4;
        let startTime = null;
        let timerInterval = null;
        let isModalOpen = false;
        let isConfirmMode = false;

        const stageHistory = {};
        
        let recordDatabase = JSON.parse(localStorage.getItem('puzzleRecords')) || {}; 

        let globalLatestRecord = {
            stageKey: null,
            index: -1
        };

        function resizePuzzleSquares() {
            if (puzzleState.length === 0) return;

            const cardWidth = puzzleCard.offsetWidth;
            const padding = 48; 
            const containerPadding = 12; 
            const gaps = 6 * (cols - 1); 
            
            const availableWidth = cardWidth - padding - containerPadding - gaps;
            
            let dynamicSize = Math.floor(availableWidth / cols);
            if (dynamicSize > 75) {
                dynamicSize = 75;
            }

            document.documentElement.style.setProperty('--square-size', `${dynamicSize}px`);
            
            const dynamicFontSize = Math.max(14, Math.min(24, dynamicSize * 0.38));
            document.documentElement.style.setProperty('--square-font-size', `${dynamicFontSize}px`);
        }

        function initializePuzzle() {
            rows = parseInt(document.getElementById('rows').value) || 4;
            cols = parseInt(document.getElementById('cols').value) || 4;
            
            rows = Math.max(2, Math.min(10, rows));
            cols = Math.max(2, Math.min(10, cols));
            document.getElementById('rows').value = rows;
            document.getElementById('cols').value = cols;

            puzzleContainer.style.gridTemplateColumns = `repeat(${cols}, var(--square-size))`;
            puzzleContainer.style.gridTemplateRows = `repeat(${rows}, var(--square-size))`;

            resetPuzzleData();
            renderPuzzle();
            
            resizePuzzleSquares();
            closeModal();
        }

        window.addEventListener('resize', resizePuzzleSquares);

        function resetPuzzleData() {
            const totalSquares = rows * cols;
            puzzleState = Array.from({ length: totalSquares - 1 }, (_, i) => i + 1);
            puzzleState.push(null);

            shufflePuzzle();
            while (isAlreadySolved()) {
                shufflePuzzle();
            }

            stopTimer();
            timerElement.textContent = '0.00초';
            timerWrapper.style.display = 'none';
            
            saveCurrentHistory();
        }

        function isAlreadySolved() {
            const isSolved = puzzleState.slice(0, rows * cols - 1).every((value, index) => value === index + 1);
            return isSolved && puzzleState[rows * cols - 1] === null;
        }

        function shufflePuzzle() {
            const totalMoves = 1000; 
            let emptyIndex = puzzleState.indexOf(null);

            for (let i = 0; i < totalMoves; i++) {
                const directions = [-cols, cols, -1, 1];
                const validMoves = directions.filter(dir => {
                    const targetIndex = emptyIndex + dir;
                    return (
                        targetIndex >= 0 &&
                        targetIndex < rows * cols &&
                        !(dir === -1 && emptyIndex % cols === 0) && 
                        !(dir === 1 && emptyIndex % cols === cols - 1) 
                    );
                });

                const randomMove = validMoves[Math.floor(Math.random() * validMoves.length)];
                const targetIndex = emptyIndex + randomMove;

                [puzzleState[emptyIndex], puzzleState[targetIndex]] = [puzzleState[targetIndex], puzzleState[emptyIndex]];
                emptyIndex = targetIndex;
            }
        }

        function renderPuzzle() {
            puzzleContainer.innerHTML = '';
            puzzleState.forEach((value, index) => {
                const square = document.createElement('div');
                square.classList.add('puzzle-square');
                if (value === null) {
                    square.classList.add('empty');
                    square.textContent = '';
                } else {
                    square.textContent = value;
                }
                square.addEventListener('click', () => handleClick(index));
                puzzleContainer.appendChild(square);
            });
        }

        function handleClick(clickedIndex) {
            if (isModalOpen) return;

            if (startTime === null) {
                startTime = new Date();
                timerWrapper.style.display = 'flex';
                timerInterval = setInterval(updateTimer, 10);
            }

            const directions = [-cols, cols, -1, 1];
            for (const dir of directions) {
                const targetIndex = clickedIndex + dir;
                if (targetIndex >= 0 && targetIndex < rows * cols && puzzleState[targetIndex] === null) {
                    if ((dir === -1 && clickedIndex % cols === 0) || (dir === 1 && clickedIndex % cols === cols - 1)) {
                        continue; 
                    }
                    swapSquares(clickedIndex, targetIndex);
                    break;
                }
            }
            saveCurrentHistory();
            checkForWin();
        }

        function swapSquares(index1, index2) {
            [puzzleState[index1], puzzleState[index2]] = [puzzleState[index2], puzzleState[index1]];
            renderPuzzle();
        }

        function saveCurrentHistory() {
            const historyKey = `${rows}x${cols}`;
            stageHistory[historyKey] = {
                state: [...puzzleState],
                startTime: startTime,
                isSolved: false
            };
        }

        function checkForWin() {
            if (isAlreadySolved()) {
                const elapsedTime = ((new Date() - startTime) / 1000).toFixed(2);
                
                const historyKey = `${rows}x${cols}`;
                if (stageHistory[historyKey]) stageHistory[historyKey].isSolved = true;

                if (!recordDatabase[historyKey]) {
                    recordDatabase[historyKey] = [];
                }
                recordDatabase[historyKey].push(elapsedTime);
                
                localStorage.setItem('puzzleRecords', JSON.stringify(recordDatabase));
                
                globalLatestRecord.stageKey = historyKey;
                globalLatestRecord.index = recordDatabase[historyKey].length - 1;

                updateHistoryTable();
                showWinModal(elapsedTime);
                stopTimer();
            }
        }

        function updateHistoryTable() {
            const sortedKeys = Object.keys(recordDatabase).sort();

            if (sortedKeys.length === 0) {
                historyTableBody.innerHTML = `
                    <tr>
                        <td colspan="3" id="emptyRow" style="color: var(--text-sub); font-style: italic; padding: 15px 0;">아직 달성한 클리어 기록이 없습니다.</td>
                    </tr>
                `;
                return;
            }

            historyTableBody.innerHTML = '';

            sortedKeys.forEach(key => {
                const tr = document.createElement('tr');
                const timeList = recordDatabase[key];
                const sizeDisplay = key.replace('x', ' × ');
                
                let badgesHtml = '';
                timeList.forEach((t, index) => {
                    if (globalLatestRecord.stageKey === key && globalLatestRecord.index === index) {
                        badgesHtml += `<span class="time-badge latest-record">${t}초</span>`;
                    } else {
                        badgesHtml += `<span class="time-badge">${t}초</span>`;
                    }
                });

                tr.innerHTML = `
                    <td style="font-weight: 700;">${sizeDisplay}</td>
                    <td><b>${timeList.length}회</b></td>
                    <td style="text-align: left; padding-left: 15px;">${badgesHtml}</td>
                `;
                historyTableBody.appendChild(tr);
            });
        }

        function updateTimer() {
            if (!startTime) return;
            const currentTime = new Date();
            const elapsedTime = ((currentTime - startTime) / 1000).toFixed(2);
            timerElement.textContent = `${elapsedTime}초`;
        }

        function stopTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
            startTime = null;
        }

        function showWinModal(time) {
            isConfirmMode = false;
            mCard.className = 'modal-card success-mode';
            mTitle.textContent = "🎉 퍼즐 완성!";
            mBody.textContent = `${time}초 만에 퍼즐을 완성했습니다!`;
            
            mBtnContainer.innerHTML = '';
            const btn = document.createElement('button');
            btn.className = 'modal-btn';
            btn.textContent = "확인";
            btn.addEventListener('click', () => {
                closeModal();
                resetPuzzleData();
                renderPuzzle();
            });
            mBtnContainer.appendChild(btn);

            modalOverlay.classList.add('active');
            isModalOpen = true;
            btn.focus();
        }

        function showClearHistoryConfirmModal() {
            isConfirmMode = true;
            mCard.className = 'modal-card danger-mode';
            mTitle.textContent = "기록 초기화";
            mBody.textContent = "누적 기록을 모두 삭제하시겠습니까?";
            
            mBtnContainer.innerHTML = '';
            
            // 취소 버튼 (회색 고정 바탕 + 흰색 글자)
            const cancelBtn = document.createElement('button');
            cancelBtn.className = 'modal-btn btn-cancel';
            cancelBtn.textContent = "취소";
            cancelBtn.addEventListener('click', closeModal);
            
            // 초기화 버튼 (빨간색 바탕 + 흰색 글자)
            const confirmBtn = document.createElement('button');
            confirmBtn.className = 'modal-btn btn-confirm-delete';
            confirmBtn.textContent = "초기화";
            confirmBtn.addEventListener('click', () => {
                executeClearHistory();
                closeModal();
            });
            
            mBtnContainer.appendChild(cancelBtn);
            mBtnContainer.appendChild(confirmBtn);

            modalOverlay.classList.add('active');
            isModalOpen = true;
            cancelBtn.focus();
        }

        function executeClearHistory() {
            recordDatabase = {};
            localStorage.removeItem('puzzleRecords');
            globalLatestRecord = { stageKey: null, index: -1 };
            updateHistoryTable();
            resetPuzzleData();
            renderPuzzle();
        }

        function closeModal() {
            modalOverlay.classList.remove('active');
            isModalOpen = false;
            isConfirmMode = false;
        }

        clearHistoryBtn.addEventListener('click', showClearHistoryConfirmModal);

        document.addEventListener('keydown', function(e) {
            if (isModalOpen) {
                if (e.key === 'Escape') {
                    e.preventDefault();
                    closeModal();
                }
                if ((e.key === 'Enter' || e.code === 'Space') && !isConfirmMode) {
                    e.preventDefault();
                    const activeBtn = mBtnContainer.querySelector('.modal-btn');
                    if (activeBtn) activeBtn.click();
                }
            }
        });

        // 앱이 처음 시작될 때 로컬 저장소에 저장된 테이블 내용을 화면에 복원 출력
        updateHistoryTable();
        initializePuzzle();
    </script>
</body>
</html>
