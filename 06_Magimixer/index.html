<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>매지믹서</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            font-family: Arial, sans-serif;
            text-align: center;
        }
        #level-selector {
            margin-bottom: 0px;
            border-bottom: 3px solid #eee;
            padding-bottom: 20px;
        }
        #level-selector button {
            width: 80px;
            height: 45px;
            padding: 0px;
            font-size: 18px;
            cursor: pointer;
            border: 1px solid #ccc;
            border-radius: 5px;
            margin: 0 5px;
            background-color: white;
            transition: all 0.2s ease-in-out;
        }
        #level-selector button:hover {
            background-color: #f0f0f0;
        }
        #level-selector button.active {
            background-color: #007BFF;
            color: white;
            border-color: #007BFF;
            font-weight: bold;
        }
        .button-container {
            /* flex-wrap: nowrap; 삭제 (작은 화면에서 줄바꿈 허용) */
            display: flex;
            flex-wrap: wrap; 
            gap: 10px;
            margin-top: 20px;
            justify-content: center;
            max-width: 800px;
            /* overflow-x: auto; 제거 (스크롤 대신 줄바꿈 유도) */
        }
        button {
            padding: 0px;
            font-size: 20px;
            cursor: pointer;
            width: 60px;
            height: 40px;
            border: none;
            border-radius: 5px;
            margin: 0px;
            flex-shrink: 0;
        }
        .button_e {
            padding: 0px;
            font-size: 20px;
            cursor: pointer;
            width: 140px;
            height: 40px;
            border: none;
            border-radius: 5px;
            margin: 0px;
            background-color: rgb(134, 190, 255);
        }
        .button_new {
            padding: 0px;
            font-size: 20px;
            cursor: pointer;
            width: 140px;
            height: 40px;
            border: none;
            border-radius: 5px;
            margin: 0px;
            background-color: #eee;
        }
        .primary {
            background-color: #007BFF;
            color: white;
        }
        .secondary {
            background-color: #28A745;
            color: white;
        }
        .disabled {
            background-color: #6c757d;
            color: #fff;
            cursor: not-allowed;
        }
        #display {
            /* 🚩 수정: 왼쪽 정렬 관련 속성 제거 및 중앙 정렬 추가 */
            margin-top: 20px;
            font-size: 20px;
            text-align: left; 
            width: 100%;
            max-width: 600px;
            /* 기존: position: relative; left: 60px; */
            margin: 20px auto 0 auto; /* 상하 20px, 좌우 auto로 중앙 정렬 */
            padding: 0 20px; /* 좌우 패딩 추가하여 너무 붙지 않게 함 */
            box-sizing: border-box; /* 패딩이 너비에 포함되도록 설정 */
        }
        #display div {
            margin-bottom: 5px;
            min-height: 24px;
        }
        #input-display {
            /* 🚩 수정: 고정 너비 460px을 100%로 변경 */
            border: 2px solid #007BFF;
            background-color: #f0f8ff;
            width: 100%; /* 부모 (#display) 너비에 맞게 조정 */
            padding: 10px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1.2em;
            margin-bottom: 10px;
            color: #333;
            /* 기존: position: relative; left: 0px; */
            box-sizing: border-box; /* 패딩이 너비에 포함되도록 설정 */
        }
        .error-message {
            color: red;
            font-weight: bold;
        }
        .correct-message {
            color: green;
            font-weight: bold;
        }
        .line-break {
            width: 100%;
            margin: 10px 0;
        }
        #button-container, #operator-container {
            width: 100%;
            max-width: 600px;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
        }
        #operator-container {
            margin-top: 10px;
            flex-direction: column;
            align-items: center;
        }
        .operator-row {
            display: flex;
            flex-wrap: wrap; /* 🚩 수정: 연산자 버튼도 줄바꿈 허용 */
            gap: 10px;
            justify-content: center;
            margin-bottom: 8px;
        }
        #score-table {
            margin-top: 40px;
            width: 100%;
            max-width: 500px;
            border-collapse: collapse;
            font-size: 16px;
        }
        #score-table caption {
            font-size: 1.5em;
            font-weight: bold;
            margin-bottom: 10px;
            color: #333;
        }
        #score-table th, #score-table td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: center;
            color: #333;
        }
        #score-table th {
            background-color: #f2f2f2;
            color: #555;
        }
    </style>
</head>
<body role="presentation">
    
    <div id="level-selector">
        <button id="level-easy">초급</button>
        <button id="level-medium">중급</button>
        <button id="level-hard">고급</button>
    </div>

    <h2 id="game-title"></h2>

    <div id="button-container" class="button-container"></div>
    <div class="line-break"></div>
    <div id="operator-container"></div>
    <div id="display">
        <div id="input-display">입력: </div><br>
        <div id="result-display">결과: </div>
    </div>


    <table id="score-table">
        <caption>매지믹서 누적 기록</caption>
        <thead>
            <tr>
                <th>수준</th>
                <th>초급</th>
                <th>중급</th>
                <th>고급</th>
            </tr>
        </thead>
        <tbody>
            <tr id="solved-row">
                <td>해결한 횟수</td>
                <td id="score-easy-solved">0</td>
                <td id="score-medium-solved">0</td>
                <td id="score-hard-solved">0</td>
            </tr>
            <tr id="failed-row">
                <td>실패한 횟수</td>
                <td id="score-easy-failed">0</td>
                <td id="score-medium-failed">0</td>
                <td id="score-hard-failed">0</td>
            </tr>
            <tr id="new-problem-row">
                <td>문제를 바꾼 횟수</td>
                <td id="score-easy-new">0</td>
                <td id="score-medium-new">0</td>
                <td id="score-hard-new">0</td>
            </tr>
        </tbody>
    </table>

    <br>

    <div id="instructions">
        <p id="instruction-text" style="font-size: 18px;"></p>
    </div>
    <div style="font-size: 18px;">
        ◈ 키보드<br>
        숫자, 연산기호, Backspace 모두 사용 가능<br>
        C (초기화): C, Esc<br>
        = (결과확인): Enter, Space<br>
        새로운 문제: R
    </div>

    <a href="example.html" style="
        width: 250px;
        padding: 20px;
        border: 1px solid #333;
        border-radius: 12px;
        background-color: #ffffff;
        text-align: center;
        font-family: sans-serif;
        font-size: 20px;
        margin: 50px auto;
        text-decoration: none;
        color: #000;
    ">
        문제 설명
    </a>

    <script>
const easyBtn = document.getElementById('level-easy');
        const mediumBtn = document.getElementById('level-medium');
        const hardBtn = document.getElementById('level-hard');
        
        let currentLevel = null; 
        let score = {
            easy: { solved: 0, failed: 0, new: 0 },
            medium: { solved: 0, failed: 0, new: 0 },
            hard: { solved: 0, failed: 0, new: 0 }
        };

        // 현재 게임의 상태를 유지하기 위한 변수들
        let levelStates = {
            easy: { numbers: [], targetSum: 0 },
            medium: { numbers: [], targetSum: 0 },
            hard: { numbers: [], targetSum: 0 }
        };
        let currentNumbers = []; 
        let currentTargetSum = 0;
        let solvedExpressions = [];
        let isSolved = false;
        let usedGreenNumbers = [];
        let currentInput = '';

        let lastHighlightedCells = [];
        let currentKeydownHandler = null;
        let currentKeyupHandler = null;

        function initializeScoreTable() {
            const levels = ['easy', 'medium', 'hard'];
            levels.forEach(lvl => {
                ['solved', 'failed', 'new'].forEach(cat => {
                    const id = `score-${lvl}-${cat}`;
                    const cell = document.getElementById(id);
                    cell.textContent = score[lvl][cat];
                    cell.style.color = '#333';
                });
            });
            lastHighlightedCells = [];
        }

        function resetCellColors() {
            const cells = document.querySelectorAll('#score-table td');
            cells.forEach(c => c.style.color = '#333');
            lastHighlightedCells = [];
        }

        function highlightScoreCell(cellId) {
            if (lastHighlightedCells.length > 0) {
                lastHighlightedCells.forEach(c => c.style.color = '#333');
            }
            const cell = document.getElementById(cellId);
            if (cell) {
                cell.style.color = 'red';
                lastHighlightedCells = [cell];
            }
        }

        function updateScoreTable(level, category) {
            const id = `score-${level}-${category}`;
            const cell = document.getElementById(id);
            cell.textContent = score[level][category];
            highlightScoreCell(id);
        }
        
        function updateActiveButton(level) {
            easyBtn.classList.remove('active');
            mediumBtn.classList.remove('active');
            hardBtn.classList.remove('active');
            if (level === 'easy') easyBtn.classList.add('active');
            else if (level === 'medium') mediumBtn.classList.add('active');
            else if (level === 'hard') hardBtn.classList.add('active');
        }

        function insertImplicitMultiplication(expr) {
            let tokens = expr.split(' ').filter(t => t.length > 0);
            let result = [];
            for (let i = 0; i < tokens.length; i++) {
                result.push(tokens[i]);
                if (i < tokens.length - 1 && ((!isNaN(tokens[i]) && tokens[i] !== '') || tokens[i] === ')') && tokens[i + 1] === '(') {
                    result.push('*');
                }
                if (i < tokens.length - 1 && tokens[i] === ')' && !isNaN(tokens[i + 1]) && tokens[i + 1] !== '') {
                    result.push('*');
                }
            }
            return result.join(' ');
        }

        // --- UI 업데이트 함수 (레벨 변경 시 호출) ---
        function updateUIByLevel(level) {
            currentLevel = level;
            updateActiveButton(level);
            
            const gameTitle = document.getElementById('game-title');
            const instructionText = document.getElementById('instruction-text');
            
            if (level === 'easy') {
                gameTitle.textContent = '매지믹서(초급)';
                instructionText.innerHTML = '□ 초록색 5개 숫자를 이용하여 파란색 2개 숫자를 더한 수를 만드세요.<br>(단, 초록색 5개 숫자 중 일부만 이용해도 됩니다.)';
            } else if (level === 'medium') {
                gameTitle.textContent = '매지믹서(중급)';
                instructionText.innerHTML = '□ 초록색 5개 숫자를 이용하여 파란색 2개 숫자를 더한 수를 만드세요.<br>(단, 초록색 5개를 모두 이용해야 합니다.)';
            } else {
                gameTitle.textContent = '매지믹서(고급)';
                instructionText.innerHTML = '□ 초록색 5개 숫자를 이용하여 파란색 2개 숫자를 더한 수를 만드세요.<br>(단, 초록색 5개를 모두 이용해야 합니다.)';
            }
            document.title = gameTitle.textContent;
        }

        // --- 새로운 문제 생성 및 게임판 그리기 ---
        function startGame(level, isNewProblem = true) {
            if (currentKeydownHandler) document.removeEventListener('keydown', currentKeydownHandler);
            if (currentKeyupHandler) document.removeEventListener('keyup', currentKeyupHandler);

            updateUIByLevel(level);

            const buttonContainer = document.getElementById('button-container');
            const operatorContainer = document.getElementById('operator-container');
            const inputDisplay = document.getElementById('input-display');
            const resultDisplay = document.getElementById('result-display');
            const display = document.getElementById('display');

            // 초기화
            buttonContainer.innerHTML = '';
            operatorContainer.innerHTML = '';
            inputDisplay.textContent = '입력: ';
            resultDisplay.textContent = '결과: ';
            resultDisplay.classList.remove('error-message', 'correct-message');
            const oldAnswers = display.querySelectorAll('.answer');
            oldAnswers.forEach(div => div.remove());
            
            currentInput = '';
            usedGreenNumbers = [];
            isSolved = false;
            solvedExpressions = [];
            let isProcessing = false;

            // 새로운 문제일 경우에만 숫자 재생성 및 저장
            if (isNewProblem) {
                let firstOptions = (level === 'hard') ? [10, 20, 30, 40, 50, 60, 70, 80, 90] : [10, 20, 30, 40, 50, 60];
                let otherMax = (level === 'hard') ? 9 : 6;
                
                const p1 = firstOptions[Math.floor(Math.random() * firstOptions.length)];
                const p2 = Math.floor(Math.random() * otherMax) + 1;
                const secondaries = Array.from({ length: 5 }, () => Math.floor(Math.random() * otherMax) + 1);
                
                // 해당 레벨의 전용 저장소에 저장
                levelStates[level].numbers = [p1, p2, ...secondaries];
                levelStates[level].targetSum = p1 + p2;
            }

            // 화면에 그릴 숫자를 현재 레벨 저장소에서 불러오기
            currentNumbers = levelStates[level].numbers;
            currentTargetSum = levelStates[level].targetSum;

            const buttons = [];
            currentNumbers.forEach((num, index) => {
                const button = document.createElement('button');
                button.textContent = num;
                if (index < 2) {
                    button.classList.add('primary');
                    button.disabled = true;
                } else {
                    button.classList.add('secondary');
                    button.addEventListener('click', () => {
                        if (isSolved) {
                            resultDisplay.textContent = '결과: ';
                            resultDisplay.classList.remove('error-message', 'correct-message');
                            isSolved = false;
                        }
                        if (!button.disabled) {
                            currentInput += num;
                            inputDisplay.textContent = `입력: ${currentInput}`;
                            button.disabled = true;
                            button.classList.remove('secondary');
                            button.classList.add('disabled');
                            usedGreenNumbers.push(num);
                            enterOperatorMode();
                        }
                    });
                }
                buttonContainer.appendChild(button);
                buttons.push(button);
            });

            const enterNumberMode = () => {
                buttons.forEach(btn => {
                    if (btn.classList.contains('temp-disabled')) {
                        btn.disabled = false;
                        btn.classList.remove('temp-disabled');
                    }
                });
            };

            const enterOperatorMode = () => {
                buttons.forEach((btn, idx) => {
                    if (idx >= 2 && !btn.classList.contains('disabled')) {
                        btn.disabled = true;
                        btn.classList.add('temp-disabled');
                    }
                });
            };

            const operators = ['+', '-', '*', '/', '(', ')', '^'];
            const operatorRow1 = document.createElement('div');
            operatorRow1.className = 'operator-row';
            const operatorRow2 = document.createElement('div');
            operatorRow2.className = 'operator-row';

            operators.forEach(op => {
                const button = document.createElement('button');
                button.textContent = op;
                button.addEventListener('click', () => {
                    currentInput += ` ${op} `;
                    inputDisplay.textContent = `입력: ${currentInput}`;
                    enterNumberMode();
                });
                operatorRow1.appendChild(button);
            });

            const resetButton = document.createElement('button');
            resetButton.textContent = 'C';
            resetButton.addEventListener('click', () => {
                currentInput = '';
                inputDisplay.textContent = '입력: ';
                resultDisplay.textContent = '결과: ';
                resultDisplay.classList.remove('error-message', 'correct-message');
                isSolved = false;
                buttons.forEach((btn, index) => {
                    if (index >= 2) {
                        btn.disabled = false;
                        btn.classList.remove('disabled', 'temp-disabled');
                        btn.classList.add('secondary');
                    }
                });
                usedGreenNumbers = [];
            });
            operatorRow2.appendChild(resetButton);

            const backspaceButton = document.createElement('button');
            backspaceButton.textContent = '←';
            backspaceButton.addEventListener('click', () => {
                const tokens = currentInput.trim().split(' ');
                if (tokens.length === 0 || (tokens.length === 1 && tokens[0] === '')) return;
                const lastToken = tokens.pop();
                currentInput = tokens.join(' ') + (tokens.length > 0 ? ' ' : '');
                if (!isNaN(lastToken)) {
                    const lastNumber = Number(lastToken);
                    let foundButton = false;
                    for (let i = buttons.length - 1; i >= 2; i--) {
                        if (Number(buttons[i].textContent) === lastNumber && buttons[i].classList.contains('disabled') && !foundButton) {
                            buttons[i].disabled = false;
                            buttons[i].classList.remove('disabled');
                            buttons[i].classList.add('secondary');
                            foundButton = true;
                            break;
                        }
                    }
                    for (let i = usedGreenNumbers.length - 1; i >= 0; i--) {
                        if (Number(usedGreenNumbers[i]) === lastNumber) {
                            usedGreenNumbers.splice(i, 1);
                            break;
                        }
                    }
                    enterNumberMode();
                }
                inputDisplay.textContent = `입력: ${currentInput}`;
            });
            operatorRow2.appendChild(backspaceButton);

            const calcLogic = () => {
                if (isSolved || isProcessing) return;
                isProcessing = true;
                resetCellColors();
                const normalizedInput = currentInput.trim();
                const useAllNumbers = (currentLevel !== 'easy');
                
                try {
                    if (normalizedInput === '') {
                        handleGameResult(false, '잘못된 수식입니다. (입력 없음)');
                        return;
                    }
                    let result;
                    try {
                        let fixedInput = insertImplicitMultiplication(normalizedInput.replace(/\^/g, '**'));
                        result = eval(fixedInput);
                        if (typeof result !== 'number' || !isFinite(result)) throw new Error();
                    } catch (e) {
                        handleGameResult(false, '잘못된 수식입니다. (계산 불가)');
                        return; 
                    }
                    
                    if (useAllNumbers) {
                        if (usedGreenNumbers.length < 5) {
                            handleGameResult(false, '모든 초록색 숫자를 사용해야 합니다.');
                            return; 
                        }
                    }
                    
                    if (result === currentTargetSum) {
                        if (solvedExpressions.includes(normalizedInput)) {
                            handleGameResult(false, '동일한 결과가 있습니다.');
                            return;
                        }
                        handleGameResult(true, '정답입니다!', normalizedInput, result);
                    } else {
                        handleGameResult(false, `${result} (틀렸습니다. 목표값: ${currentTargetSum})`);
                    }
                } finally {
                    isProcessing = false;
                }
            };

            const handleGameResult = (isSuccess, message, expression = null, resultValue = null) => {
                if (message.includes('계산 불가') || message.includes('입력 없음') || message.includes('동일한 결과') || message.includes('모든 초록색')) {
                    resultDisplay.className = 'error-message';
                    resultDisplay.textContent = `결과: ${message}`;
                    if(message.includes('동일한 결과')) isSolved = true;
                    return;
                }
                if (isSuccess) {
                    score[currentLevel].solved++;
                    updateScoreTable(currentLevel, 'solved');
                    solvedExpressions.push(expression);
                    resultDisplay.className = 'correct-message';
                    const answerDiv = document.createElement('div');
                    answerDiv.className = 'answer';
                    answerDiv.style.color = '#007BFF';
                    answerDiv.textContent = `정답: ${expression} = ${resultValue}`;
                    display.appendChild(answerDiv);
                    resultDisplay.textContent = `결과: ${resultValue} (정답입니다!)`;
                    isSolved = true;
                    currentInput = '';
                    buttons.forEach((btn, idx) => { if(idx >= 2) { btn.disabled = false; btn.className = 'secondary'; }});
                    usedGreenNumbers = [];
                } else {
                    score[currentLevel].failed++;
                    updateScoreTable(currentLevel, 'failed');
                    resultDisplay.className = 'error-message';
                    resultDisplay.textContent = `결과: ${message}`;
                }
            };

            const calcButton = document.createElement('button');
            calcButton.textContent = '=';
            calcButton.className = 'button_e';
            calcButton.addEventListener('click', calcLogic); 
            operatorRow2.appendChild(calcButton);

            const newProblemButton = document.createElement('button');
            newProblemButton.textContent = '새로운 문제';
            newProblemButton.className = 'button_new';
            newProblemButton.addEventListener('click', () => {
                resetCellColors();
                score[currentLevel].new++;
                updateScoreTable(currentLevel, 'new');
                startGame(currentLevel, true); // 진짜 새로운 문제 생성
            });
            operatorRow2.appendChild(newProblemButton);

            operatorContainer.appendChild(operatorRow1);
            operatorContainer.appendChild(operatorRow2);
            calcButton.focus();

            currentKeydownHandler = (e) => {
                if (e.key === 'Enter') { e.preventDefault(); return; }
                let handled = false;
                if (e.key >= '0' && e.key <= '9') {
                    const target = buttons.find(btn => btn.textContent === e.key && !btn.disabled && btn.classList.contains('secondary'));
                    if (target) { target.click(); handled = true; }
                } else if (['+', '-', '*', '/', '(', ')', '^'].includes(e.key)) {
                    const opTarget = Array.from(operatorRow1.children).find(btn => btn.textContent === e.key);
                    if (opTarget) { opTarget.click(); handled = true; }
                } else if (e.key === 'Escape' || e.key.toLowerCase() === 'c') { resetButton.click(); handled = true; }
                else if (e.key === 'Backspace') { backspaceButton.click(); handled = true; }
                if (handled) { e.preventDefault(); }
            };

            currentKeyupHandler = (e) => {
                if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); calcLogic(); }
                else if (e.key.toLowerCase() === 'r') { newProblemButton.click(); }
            };

            document.addEventListener('keydown', currentKeydownHandler);
            document.addEventListener('keyup', currentKeyupHandler);
        }

        
// [수정 후] 지능적 레벨 변경 방식

// 1. 각 레벨 방문 여부 저장 (초급은 시작하자마자 방문한 상태)
let visitedLevels = { easy: true, medium: false, hard: false };

function handleLevelChange(newLevel) {
    resetCellColors();
    
    if (!visitedLevels[newLevel]) {
        visitedLevels[newLevel] = true; 
        // 첫 방문이므로 해당 레벨의 문제를 처음으로 생성함
        startGame(newLevel, true); 
    } else {
        // 이미 생성된 적이 있으므로, 해당 레벨 저장소에 있던 숫자를 그대로 보여줌
        startGame(newLevel, false); 
    }
}

        easyBtn.addEventListener('click', () => handleLevelChange('easy'));
        mediumBtn.addEventListener('click', () => handleLevelChange('medium'));
        hardBtn.addEventListener('click', () => handleLevelChange('hard'));

        // 초기 실행
        initializeScoreTable();
        startGame('easy', true);
    </script>
</body>
</html>
