<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>숫자 야구 게임</title>
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
  <style>
    :root {
      --bg: #f0f2f5;
      --card-bg: #ffffff;
      --active: #007bff;
      --success: #28a745;
      --danger: #dc3545;
      --text-main: #222222;
      --text-sub: #555555;
      --border: #e9ecef;
      --btn-gray: #f8f9fa;
      --btn-dark-gray: #6c757d; /* 취소 버튼용 어두운 회색 */
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Pretendard', sans-serif;
      -webkit-touch-callout: none;
    }

    body {
      background-color: var(--bg);
      color: var(--text-main);
      padding: 15px 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      touch-action: manipulation;
    }

    .section-wrapper {
      width: 100%;
      max-width: 800px;
      margin-bottom: 20px;
    }

    .container-fixed {
      background-color: var(--card-bg);
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
      width: 100%;
    }

    h1.game-title {
      font-size: 36px;
      font-weight: 800;
      text-align: center;
      margin: 15px 0 25px 0;
      color: var(--text-main);
    }

    .stage-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .stage-btn {
      background-color: var(--btn-gray);
      border: 1px solid var(--border);
      color: var(--text-sub);
      padding: 12px 0;
      font-size: 16px;
      font-weight: 700;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s ease;
      text-align: center;
    }

    .stage-btn:hover {
      background-color: var(--border);
    }

    .stage-btn.current {
      background-color: var(--active);
      color: #fff;
      border-color: var(--active);
      box-shadow: 0 4px 12px rgba(0, 123, 255, 0.3);
    }

    .play-zone {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      width: 100%;
    }

    .input-wrapper {
      display: flex;
      flex-direction: row;
      flex-wrap: nowrap;
      gap: 8px;
      width: 100%;
      max-width: 400px;
    }

    .game-input {
      flex: 1;
      min-width: 0;
      padding: 14px 10px;
      font-size: 20px;
      font-weight: 700;
      border: 2px solid var(--border);
      border-radius: 12px;
      text-align: center;
      letter-spacing: 2px;
      outline: none;
      transition: border-color 0.2s;
    }

    .game-input:focus {
      border-color: var(--active);
    }

    .submit-btn {
      padding: 0 20px;
      font-size: 17px;
      font-weight: 700;
      background-color: var(--active);
      color: white;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      white-space: nowrap; 
      flex-shrink: 0;
    }

    .log-container {
      width: 100%;
      max-width: 500px;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
      background: #fafafa;
    }

    .log-item {
      display: flex;
      justify-content: space-between;
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      font-size: 18px;
      word-break: keep-all;
    }

    .log-item:last-child {
      border-bottom: none;
    }

    .log-item .out { color: var(--text-sub); }
    .log-item .hit { color: var(--danger); font-weight: 700; }
    .log-item .success-hit { color: var(--success); font-weight: 700; }

    .control-zone {
      display: flex;
      justify-content: center;
      gap: 15px;
    }

    .action-btn {
      height: 54px;
      width: 100%;
      max-width: 800px;
      font-size: 18px;
      font-weight: 700;
      border-radius: 12px;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
      transition: all 0.2s ease;
    }

    .btn-reset {
      background-color: #ffffff;
      color: var(--danger);
      border: 2px solid var(--danger);  
    }
    .btn-reset:hover {
      background-color: var(--danger);
      color: white;
    }

    .guide-box {
      background-color: var(--card-bg);
      border-radius: 12px;
      padding: 16px 20px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.02);
      font-size: 17px;
      line-height: 1.6;
      word-break: keep-all;
      color: var(--text-sub);
    }
    .guide-box h3 {
      font-size: 18px;
      margin-bottom: 6px;
    }

    /* 각 성격별 타이틀 컬러 명시적 지정 */
    .guide-blue h3 { color: var(--active); }   /* 파란색 */
    .guide-green h3 { color: var(--success); } /* 녹색 */
    .guide-red .stats-title { color: var(--danger); }  /* 빨간색 */

    .stats-header-container {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .stats-title {
      font-size: 18px;
      font-weight: 700;
    }

    /* 누적 기록 초기화 버튼: 흰색 바탕 + 빨간 테두리/글자 */
    .clear-history-btn {
      background-color: #ffffff;
      color: var(--danger);
      border: 2px solid var(--danger);
      padding: 4px 12px;
      font-size: 14px;
      font-weight: 700;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .clear-history-btn:hover {
      background-color: #fff5f5;
      color: #b02a37;
      border-color: #b02a37;
    }

    .guide-blue { border-left: 6px solid var(--active); }
    .guide-green { border-left: 6px solid var(--success); }
    .guide-red { border-left: 6px solid var(--danger); }

    .record-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
      font-size: 15px;
    }
    .record-table th, .record-table td {
      border: 1px solid var(--border);
      padding: 6px;
      text-align: center;
    }
    .record-table th { background-color: var(--btn-gray); }

    .shortcut-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px 20px; font-size: 15px; color: var(--text-sub); }
/* 모바일 화면 대응: 한 줄에 하나씩 정렬 */
@media (max-width: 600px) {
.shortcut-grid {    grid-template-columns: 1fr;  }}
.shortcut-item { display: flex; align-items: center; gap: 10px; line-height: 1.5; }
kbd {
  background-color: #f8f9fa; border: 1px solid #ced4da; border-bottom: 3px solid #adb5bd; border-radius: 6px;
  color: #495057; display: inline-block; font-size: 14px; font-weight: 700; padding: 5px 9px; white-space: nowrap;
}

    .modal-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s ease;
    }

    .modal-overlay.active {
      opacity: 1;
      visibility: visible;
    }

    .modal-card {
      background: var(--card-bg);
      width: 90%;
      max-width: 350px;
      border-radius: 20px;
      padding: 25px;
      text-align: center;
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
      transform: translateY(20px);
      transition: transform 0.3s ease;
    }

    .modal-overlay.active .modal-card {
      transform: translateY(0);
    }

    .modal-card.success-mode { border-top: 6px solid var(--success); }
    .modal-card.danger-mode { border-top: 6px solid var(--danger); }

    .modal-title {
      font-size: 24px;
      font-weight: 800;
      margin-bottom: 15px;
    }
    .modal-card.success-mode .modal-title { color: var(--success); }
    .modal-card.danger-mode .modal-title { color: var(--danger); }

    .modal-body {
      font-size: 16px;
      color: var(--text-sub);
      margin-bottom: 20px;
      line-height: 1.5;
    }

    /* 버튼 배치 레이아웃 컨테이너 */
    .modal-btn-container {
      display: flex;
      gap: 10px;
      width: 100%;
    }

    .modal-btn {
      flex: 1;
      height: 48px;
      font-size: 16px;
      font-weight: 700;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      color: white;
      transition: background-color 0.2s ease;
    }
    .modal-card.success-mode .modal-btn { background-color: var(--success); }
    .modal-card.danger-mode .modal-btn { background-color: var(--danger); }

    /* 🛠️ [해결됨] 우선순위(Specificity) 강화를 통해 danger-mode 안에서도 무조건 회색 배경 유지 */
    .modal-card .modal-btn.btn-cancel {
      background-color: var(--btn-dark-gray) !important;
      color: #ffffff !important;
    }
    .modal-card .modal-btn.btn-cancel:hover {
      background-color: #5a6268 !important;
    }
    
    .modal-card .modal-btn.btn-confirm-delete {
      background-color: var(--danger) !important;
      color: #ffffff !important;
    }
    .modal-card .modal-btn.btn-confirm-delete:hover {
      background-color: #bd2130 !important;
    }
  </style>
</head>
<body>

  <div class="section-wrapper">
    <h1 class="game-title">숫자 야구 게임</h1>
  </div>

  <div class="section-wrapper container-fixed">
    <div class="stage-grid" id="stage-grid"></div>
  </div>

  <div class="section-wrapper container-fixed">
    <div class="play-zone">
      <div style="text-align: center;">
        <span id="digit-indicator" style="font-size: 18px; font-weight: 700; color: var(--active);"></span>
        <p style="font-size: 15px; color: var(--text-sub); margin-top: 4px;">중복되지 않는 숫자를 조합하세요.</p>
      </div>

      <div class="input-wrapper">
        <input type="text" id="game-input" class="game-input" inputmode="numeric" autocomplete="off">
        <button id="submit-btn" class="submit-btn">제출</button>
      </div>

      <div class="log-container" id="log-container"></div>
    </div>
  </div>

  <div class="section-wrapper control-zone">
    <button id="reset-btn" class="action-btn btn-reset">🔄 현재 게임 초기화</button>
  </div>

  <div class="section-wrapper guide-box guide-red">
    <div class="stats-header-container">
      <span class="stats-title">📊 누적 기록</span>
      <button class="clear-history-btn" id="clear-history">누적 기록 초기화</button>
    </div>
    <div id="statistics-area"></div>
  </div>


  <div class="section-wrapper guide-box guide-blue">
    <h3>⚾ 게임 규칙</h3>
    <p>• 숫자와 자릿수가 모두 맞으면 <b>S(Strike)</b>, 숫자는 맞지만 자릿수가 다르면 <b>B(Ball)</b>이 됩니다.<br>
      •  맞는 숫자가 하나도 없으면 <b>OUT</b> 처리됩니다. <br>
      • 0은 맨 앞에 올 수 없습니다.</p>
  </div>

  <div class="section-wrapper guide-box guide-green">
    <h3>⌨️ 키보드 단축키</h3>
    <div class="shortcut-grid">
      <div class="shortcut-item">
      <kbd>Enter</kbd> 숫자 제출
      </div>
      <div class="shortcut-item">
      <kbd>Esc</kbd> 현재 게임 초기화
      </div>
    </div>
  </div>


  <div class="modal-overlay" id="modal-overlay">
    <div class="modal-card" id="modal-card">
      <div class="modal-title" id="modal-title">🎉 성공!</div>
      <div class="modal-body" id="modal-body">정답을 맞췄습니다.</div>
      <div class="modal-btn-container" id="modal-btn-container">
        <button class="modal-btn" id="modal-close-btn">확인</button>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener('contextmenu', e => e.preventDefault());

    const dataSets = [
      { stage: 1, digits: 3, label: "3자리 숫자 야구" },
      { stage: 2, digits: 4, label: "4자리 숫자 야구" }
    ];

    let stageHistory = {}; 
    let globalStats = JSON.parse(localStorage.getItem('baseball_stats')) || { 3: {}, 4: {} };

    let currentStageIdx = 0;
    let currentDigits = 3;
    let isConfirmMode = false;

    const stageGrid = document.getElementById('stage-grid');
    const gameInput = document.getElementById('game-input');
    const submitBtn = document.getElementById('submit-btn');
    const logContainer = document.getElementById('log-container');
    const digitIndicator = document.getElementById('digit-indicator');
    const resetBtn = document.getElementById('reset-btn');
    const clearHistoryBtn = document.getElementById('clear-history');
    const statisticsArea = document.getElementById('statistics-area');

    const modalOverlay = document.getElementById('modal-overlay');
    const mCard = document.getElementById('modal-card');
    const mTitle = document.getElementById('modal-title');
    const mBody = document.getElementById('modal-body');
    const mBtnContainer = document.getElementById('modal-btn-container');
    const mCloseBtn = document.getElementById('modal-close-btn');

    function initGame() {
      stageGrid.innerHTML = '';
      dataSets.forEach((data, index) => {
        const btn = document.createElement('button');
        btn.classList.add('stage-btn');
        btn.innerText = data.label;
        btn.setAttribute('data-index', index);
        btn.addEventListener('click', () => switchStage(index));
        stageGrid.appendChild(btn);
        
        if (!stageHistory[index]) {
          stageHistory[index] = generateNewState(data.digits);
        }
      });

      switchStage(0);
      renderStatistics();
    }

    function generateNewState(digits) {
      return {
        digits: digits,
        answer: generateUniqueRandom(digits),
        logs: [],
        attempts: 0,
        isCleared: false,
        shouldResetOnNextSubmit: false
      };
    }

    function generateUniqueRandom(digits) {
      const pool = ['1','2','3','4','5','6','7','8','9','0'];
      const firstIdx = Math.floor(Math.random() * 9);
      const answer = [pool.splice(firstIdx, 1)[0]];
      
      while(answer.length < digits) {
        const rIdx = Math.floor(Math.random() * pool.length);
        answer.push(pool.splice(rIdx, 1)[0]);
      }
      return answer.join('');
    }

    function switchStage(index) {
      currentStageIdx = index;
      currentDigits = dataSets[index].digits;

      const buttons = stageGrid.querySelectorAll('.stage-btn');
      buttons.forEach((btn, idx) => {
        btn.classList.remove('current');
        if (idx === index) {
          btn.classList.add('current');
        }
      });

      gameInput.maxLength = currentDigits;
      gameInput.placeholder = currentDigits === 3 ? "예: 123" : "예: 1234";
      digitIndicator.innerText = `${currentDigits}자리 숫자 야구`;

      restoreStageData(index);
    }

    function restoreStageData(index) {
      const state = stageHistory[index];
      logContainer.innerHTML = '';
      
      if (state.logs.length === 0) {
        logContainer.style.display = 'none';
      } else {
        logContainer.style.display = 'block';
        state.logs.forEach(log => {
          const row = document.createElement('div');
          row.classList.add('log-item');
          
          let resultClass = 'hit';
          if (log.out) resultClass = 'out';
          if (log.result.includes('정답')) resultClass = 'success-hit';

          row.innerHTML = `<span>[${log.count}회] ${log.guess}</span> <span class="${resultClass}">${log.result}</span>`;
          logContainer.appendChild(row);
        });
      }

      gameInput.disabled = false;
      submitBtn.disabled = false;
      gameInput.value = '';
      setTimeout(() => gameInput.focus(), 50);
    }

    function evaluateGuess(guess, answer) {
      let strikes = 0;
      let balls = 0;
      
      for(let i=0; i<guess.length; i++) {
        if(guess[i] === answer[i]) {
          strikes++;
        } else if(answer.includes(guess[i])) {
          balls++;
        }
      }
      return { strikes, balls };
    }

    function processSubmit() {
      let state = stageHistory[currentStageIdx];

      if (state.shouldResetOnNextSubmit) {
        stageHistory[currentStageIdx] = generateNewState(currentDigits);
        state = stageHistory[currentStageIdx];
      }

      const guess = gameInput.value.trim();

      if (guess.startsWith('0')) {
        showModal(false, `입력 오류`, `맨 앞자리에는 숫자 0이 올 수 없습니다.`);
        return;
      }

      if (guess.length !== currentDigits || isNaN(guess)) {
        showModal(false, `경고`, `올바른 ${currentDigits}자리 숫자를 입력하세요.`);
        return;
      }
      if (new Set(guess).size !== guess.length) {
        showModal(false, `중복 차단`, `중복된 숫자는 입력할 수 없습니다.`);
        return;
      }

      state.attempts++;
      const { strikes, balls } = evaluateGuess(guess, state.answer);
      
      let resultText = '';
      let isOut = false;

      if (strikes === currentDigits) {
        resultText = '정답 🎉';
        state.isCleared = true;
        state.shouldResetOnNextSubmit = true;
        
        globalStats[currentDigits][state.attempts] = (globalStats[currentDigits][state.attempts] || 0) + 1;
        localStorage.setItem('baseball_stats', JSON.stringify(globalStats));
        renderStatistics();
      } else if (strikes === 0 && balls === 0) {
        resultText = 'OUT';
        isOut = true;
      } else {
        resultText = `${strikes}S ${balls}B`;
      }

      state.logs.push({ count: state.attempts, guess, result: resultText, out: isOut });
      
      restoreStageData(currentStageIdx);

      if (state.isCleared) {
        showModal(true, `🎉 성공!`, `${state.attempts}번째 시도 끝에 정답을 맞추셨습니다.`);
      }
    }

    function showModal(isSuccess, title, msg) {
      isConfirmMode = false;
      mCard.className = 'modal-card ' + (isSuccess ? 'success-mode' : 'danger-mode');
      mTitle.innerText = title;
      mBody.innerText = msg;
      
      mBtnContainer.innerHTML = '';
      const btn = document.createElement('button');
      btn.className = 'modal-btn';
      btn.id = 'modal-close-btn';
      btn.innerText = isSuccess ? "계속 하기" : "다시 시도";
      btn.addEventListener('click', closeModal);
      mBtnContainer.appendChild(btn);
      
      modalOverlay.classList.add('active');
      btn.focus();
    }

    function showClearHistoryConfirmModal() {
      isConfirmMode = true;
      mCard.className = 'modal-card danger-mode'; 
      mTitle.innerText = "기록 초기화";
      mBody.innerText = "누적 기록을 모두 삭제하시겠습니까?";
      
      mBtnContainer.innerHTML = '';
      
      // 취소 버튼
      const cancelBtn = document.createElement('button');
      cancelBtn.className = 'modal-btn btn-cancel';
      cancelBtn.innerText = "취소";
      cancelBtn.addEventListener('click', closeModal);
      
      // 초기화 버튼
      const confirmBtn = document.createElement('button');
      confirmBtn.className = 'modal-btn btn-confirm-delete';
      confirmBtn.innerText = "초기화";
      confirmBtn.addEventListener('click', () => {
        executeClearHistory();
        closeModal();
      });
      
      mBtnContainer.appendChild(cancelBtn);
      mBtnContainer.appendChild(confirmBtn);
      
      modalOverlay.classList.add('active');
      cancelBtn.focus();
    }

    function closeModal() {
      modalOverlay.classList.remove('active');
      isConfirmMode = false;
      setTimeout(() => gameInput.focus(), 50);
    }

    function resetCurrentStage() {
      stageHistory[currentStageIdx] = generateNewState(currentDigits);
      switchStage(currentStageIdx);
    }

    function renderStatistics() {
      let html = '';
      const activeDigits = dataSets.map(d => d.digits);

      activeDigits.forEach(dig => {
        const records = globalStats[dig] || {};
        const keys = Object.keys(records).map(Number).sort((a,b)=>a-b);
        
        if (keys.length > 0) {
          html += `<div style="margin-top:12px;"><strong style="color:var(--active);">${dig}자리 숫자 야구 통계</strong>`;
          let header = '<tr><th>시도 횟수</th>';
          let data = '<tr><td>성공 카운트</td>';
          let sum = 0;

          keys.forEach(k => {
            header += `<td>${k}회</td>`;
            data += `<td>${records[k]}번</td>`;
            sum += records[k];
          });
          header += '<th>종합</th></tr>';
          data += `<td><b>${sum}회 성공</b></td></tr>`;

          html += `<table class="record-table">${header}${data}</table></div>`;
        }
      });

      statisticsArea.innerHTML = html || '<p style="font-size:14px; color:#999; margin-top:8px;">아직 기록된 클리어 이력이 없습니다.</p>';
    }

    function executeClearHistory() {
      globalStats = { 3: {}, 4: {} };
      localStorage.removeItem('baseball_stats');
      renderStatistics();
      dataSets.forEach((_, i) => stageHistory[i] = generateNewState(dataSets[i].digits));
      switchStage(currentStageIdx);
    }

    document.addEventListener('keydown', (e) => {
      if (modalOverlay.classList.contains('active')) {
        if (e.key === 'Escape') {
          e.preventDefault();
          closeModal();
        }
        if ((e.key === 'Enter' || e.key === ' ') && !isConfirmMode) {
          e.preventDefault();
          closeModal();
        }
        return;
      }

      if (e.key === 'Enter') {
        processSubmit();
      } else if (e.key === 'Escape') {
        e.preventDefault();
        resetCurrentStage();
      }
    });

    submitBtn.addEventListener('click', processSubmit);
    resetBtn.addEventListener('click', resetCurrentStage);
    mCloseBtn.addEventListener('click', closeModal);
