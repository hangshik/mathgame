<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>멀린게임</title>
  
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
  
  <style>
    :root {
      --bg: #f0f2f5;
      --card-bg: #ffffff;
      --active: #007bff;
      --success: #28a745;
      --danger: #dc3545;
      --danger-light: #fff5f5; /* 마지막 기록 행을 위한 연한 빨간색 */
      --text-main: #222222;
      --text-sub: #555555;
      --border: #e9ecef;
      --gray-btn: #f8f9fa;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background-color: var(--bg);
      color: var(--text-main);
      padding: 20px 15px;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      touch-action: manipulation; /* 더블클릭 줌 방지 */
      user-select: none; /* 텍스트 선택 방지 */
      -webkit-user-select: none;
    }

    /* 공통 레이아웃 컨테이너 - 가로 최대 크기 800px 제한 */
    .section-wrapper {
      width: 100%;
      max-width: 800px;
      margin-bottom: 20px;
    }

    /* 카드 형태의 고정 컨테이너 */
    .container-fixed {
      background-color: var(--card-bg);
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
      width: 100%;
      border: 3px solid transparent; /* 테두리 변화 시 레이아웃 흔들림 방지 */
      transition: border-color 0.3s ease, box-shadow 0.3s ease;
    }

    /* [영역 1-A: 퍼즐 제목] */
    h1 {
      font-size: 32px;
      font-weight: 800;
      text-align: center;
      color: var(--text-main);
      margin: 10px 0 5px 0;
    }

    /* [영역 1-B: 크기 입력 및 시작 / Turn 표시 영역] */
    .setup-container {
      display: flex;
      justify-content: space-between; /* 양 끝 배치 */
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    /* 입력 박스와 버튼이 포함된 컨트롤 그룹을 조금 더 오른쪽(가운데 쪽)으로 밀어주는 세팅 */
    .input-control-box {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-left: auto;  
      margin-right: auto; 
    }

    @media (max-width: 530px) {
      .input-control-box {
        margin-left: 0;
        margin-right: 0;
      }
    }

    .input-group {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 18px;
      font-weight: 700;
      color: var(--text-sub);
    }

    .size-input {
      width: 60px;
      height: 40px;
      font-size: 18px;
      font-weight: 700;
      text-align: center;
      border: 2px solid var(--border);
      border-radius: 10px;
      color: var(--text-main);
      outline: none;
      transition: border-color 0.2s;
    }

    .size-input:focus {
      border-color: var(--active);
    }

    /* 시작 버튼 */
    .start-btn {
      height: 40px;
      padding: 0 20px;
      background-color: var(--active);
      color: #ffffff;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: background-color 0.2s;
    }

    .start-btn:hover {
      background-color: #0056b3;
    }

    /* 턴 수 출력 메인보드 */
    .status-inline {
      font-size: 18px;
      font-weight: 800;
      color: var(--text-sub);
      background-color: var(--gray-btn);
      padding: 8px 20px;
      border-radius: 10px;
      border: 1px solid var(--border);
      min-width: 125px;
      text-align: center;
      margin-left: auto; 
    }

    .status-inline span {
      color: var(--active);
    }

    /* [영역 2: 퍼즐 문제 영역] */
    .puzzle-card {
      display: flex;
      justify-content: center; 
      align-items: center;     
      padding: 24px;
    }

    /* ★ 게임 성공 시 붙을 녹색 테두리 클래스 */
    .puzzle-card.game-success {
      border-color: var(--success);
      box-shadow: 0 10px 25px rgba(40, 167, 69, 0.15);
    }

    .puzzle-grid-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center; 
      width: 100%;
      max-width: 750px; 
      margin: 0 auto;
    }

    .row {
      display: flex;
      justify-content: center; 
      width: 100%;
      clear: both;
    }

    /* 사각형 스타일 규칙 */
    .cell {
      flex: 1 1 0%;
      max-width: 72px; 
      aspect-ratio: 1 / 1;
      margin-right: 6px;  
      margin-bottom: 6px; 
      border-radius: 8px; 
      user-select: none;
      text-align: center;
      font-size: 32px; 
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-weight: 700;
      color: #ffffff;
      box-shadow: inset 0 -5px 0 rgba(0,0,0,0.1); 
      transition: background-color 0.2s, transform 0.1s;
      background-color: #dddddd; 
    }

    /* 반응형 글자 크기 유동 다운사이징 */
    @media (max-width: 580px) {
      .cell {
        font-size: 22px;
      }
    }
    @media (max-width: 400px) {
      .cell {
        font-size: 16px;
      }
    }

    .cell:last-child {
      margin-right: 0;
    }

    .cell:active {
      transform: scale(0.92);
    }

    .cell.on {
      background-color: var(--danger);
    }

    /* [영역 4, 5: 하단 가이드 공간] */
    .guide-box {
      background-color: var(--card-bg);
      border-radius: 12px;
      padding: 18px 20px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.02);
      word-break: keep-all;
    }

    .guide-title-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }

    .guide-box h2 {
      font-size: 18px;
      font-weight: 800;
    }

    /* 영역 4: 누적 기록 (빨간색 강조) */
    .record-box {
      border-left: 6px solid var(--danger);
    }
    .record-box h2 {
      color: var(--danger);
    }
    
    .record-clear-btn {
      background-color: #ffffff;
      color: var(--danger);
      border: 1px solid var(--danger);
      padding: 6px 12px;
      font-size: 13px;
      font-weight: 700;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .record-clear-btn:hover {
      background-color: rgba(220, 53, 69, 0.05);
    }
    
    .record-content {
      font-size: 16px;
      color: var(--text-sub);
      font-weight: 600;
      line-height: 1.5;
    }

    .record-table-wrapper {
      margin-top: 10px;
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }

    .record-table {
      width: 100%;
      border-collapse: collapse;
      text-align: center;
      font-size: 14px;
    }

    .record-table th, .record-table td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
    }

    .record-table th {
      background-color: var(--gray-btn);
      color: var(--text-main);
      font-weight: 700;
    }

    .record-table tr:last-child td {
      border-bottom: none;
    }

    /* 마지막 기록된 행 커스텀 타겟 스타일 (연한 빨간색) */
    .record-table tr.latest-row td {
      background-color: var(--danger-light) !important;
      color: var(--danger);
      font-weight: 700;
    }
    
    /* 합계 요약 셀 스타일 */
    .summary-cell {
      background-color: #fdfdfd !important;
      text-align: left !important;
      padding: 16px 20px !important;
      line-height: 1.6;
      border-top: 2px solid var(--border) !important;
    }
    .summary-title {
      font-weight: 800;
      color: var(--text-main);
      margin-bottom: 8px;
      font-size: 15px;
    }
    .summary-item {
      font-size: 14px;
      color: var(--text-sub);
      font-weight: 600;
    }

    /* 영역 5: 퍼즐 규칙 (파란색 강조) */
    .rules-box {
      border-left: 6px solid var(--active);
    }
    .rules-box h2 {
      color: var(--active);
    }
    .rules-box ul {
      list-style: none;
    }
    .rules-box li {
      font-size: 15px;
      color: var(--text-sub);
      line-height: 1.6;
      font-weight: 500;
    }

    /* 게임 보드 비활성화 잠금 */
    .grid-locked {
      pointer-events: none;
      opacity: 0.6;
    }

    /* ==========================================================================
       기존의 디자인 레이아웃을 그대로 유지한 통합형 모달창 스타일
       ========================================================================== */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .modal-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    .modal-card {
      background-color: var(--card-bg);
      width: 90%;
      max-width: 350px;
      border-radius: 20px;
      padding: 30px 24px;
      text-align: center;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
      transform: scale(0.9);
      transition: transform 0.3s ease, border-top 0.1s ease;
      border-top: 6px solid var(--success); /* 기본 상태는 초록색 */
    }

    .modal-overlay.active .modal-card {
      transform: scale(1);
    }

    .modal-title {
      font-size: 26px;
      font-weight: 800;
      margin-bottom: 12px;
      color: var(--success);
    }

    .modal-body {
      font-size: 16px;
      color: var(--text-sub);
      margin-bottom: 24px;
      line-height: 1.5;
    }

    .modal-btn {
      width: 100%;
      height: 48px;
      font-size: 16px;
      font-weight: 700;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      color: #ffffff;
      transition: opacity 0.2s;
    }
    .modal-btn:hover { opacity: 0.9; }

    /* 성공 확인 버튼 전용색상 (초록색) */
    .modal-btn.btn-success {
      background-color: var(--success);
    }

    /* 초기화용 하단 조작계 가로 정렬 그룹 */
    .modal-btn-group {
      display: flex;
      gap: 10px;
      width: 100%;
    }
    /* 회색 바탕의 취소 버튼 */
    .modal-btn.btn-cancel {
      background-color: #6c757d;
    }
    /* 빨간색 바탕의 초기화 버튼 */
    .modal-btn.btn-danger {
      background-color: var(--danger);
    }
  </style>
</head>
<body>

  <div class="section-wrapper">
    <h1>멀린게임</h1>
  </div>

  <div class="section-wrapper container-fixed">
    <div class="setup-container">
      <div class="input-control-box">
        <div class="input-group">
          <input type="number" id="txt1" class="size-input" value="3" min="1" max="10">
          <span>X</span>
          <input type="number" id="txt2" class="size-input" value="3" min="1" max="10">
        </div>
        <button class="start-btn" onclick="validateAndStart()">시작</button>
      </div>
      
      <div class="status-inline" id="statusDisplay">Turn : <span id="turnCount">0</span></div>
    </div>
  </div>

  <div id="puzzleCard" class="section-wrapper container-fixed puzzle-card">
    <div id="puzzleGridWrapper" class="puzzle-grid-wrapper">
      </div>
  </div>

  <div class="section-wrapper guide-box record-box">
    <div class="guide-title-row">
      <h2>📊 누적 기록</h2>
      <button class="record-clear-btn" onclick="openClearModal()">누적 기록 초기화</button>
    </div>
    <div class="record-content">
      <div id="winCount" style="margin-bottom: 4px;">성공 횟수 : 0회</div>
      
      <div class="record-table-wrapper">
        <table class="record-table">
          <thead>
            <tr>
              <th>번호</th>
              <th>단계 (크기)</th>
              <th>횟수 (성공 턴 수)</th>
            </tr>
          </thead>
          <tbody id="recordTableBody">
            <tr>
              <td colspan="3" style="color: #aaa; padding: 20px 0;">성공 기록이 없습니다.</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="section-wrapper guide-box rules-box">
    <div class="guide-title-row">
      <h2>◈ 멀린게임(Merlin Game) 방법</h2>
    </div>
    <ul>
      <li>• 타일을 클릭하면 해당 타일과 상하좌우 인접한 타일들의 숫자가 반전됩니다.</li>
      <li>• 숫자 0은 회색, 숫자 1은 빨간색으로 표시됩니다.</li>
      <li>• 모든 타일을 하나의 색상(전부 0 또는 전부 1)으로 통일하면 스테이지 클리어!</li>
      <li>• 게임을 다시 시작할려면 "시작" 버튼을 다시 클릭하세요.</li>
    </ul>
  </div>

  <div class="modal-overlay" id="gameModalOverlay">
    <div class="modal-card" id="gameModalCard">
      <div class="modal-title" id="gameModalTitle">🎉 성공!</div>
      <div class="modal-body" id="gameModalBody"></div>
      
      <button class="modal-btn btn-success" id="modalConfirmBtn" onclick="closeModal()">확인</button>
      
      <div class="modal-btn-group" id="modalResetButtonGroup" style="display: none;">
        <button class="modal-btn btn-cancel" onclick="closeModal()">취소</button>
        <button class="modal-btn btn-danger" onclick="confirmClearRecords()">초기화</button>
      </div>
    </div>
  </div>

  <script>
    // 마우스 오른쪽 버튼 클릭 및 컨텍스트 메뉴 금지
    document.addEventListener('contextmenu', function(e) {
      e.preventDefault();
    });

    let count = 1;
    let wincount = 0;
    let historyList = []; 
    let isGameClear = false;
    let list = [];
    let b1 = 3, b2 = 3;

    const puzzleCardEl = document.getElementById("puzzleCard"); 
    const puzzleGridWrapper = document.getElementById("puzzleGridWrapper");
    const turnCountEl = document.getElementById("turnCount");
    const statusDisplay = document.getElementById("statusDisplay");
    const winCountEl = document.getElementById("winCount");
    const recordTableBody = document.getElementById("recordTableBody");

    const gameModalOverlay = document.getElementById("gameModalOverlay");
    const gameModalCard = document.getElementById("gameModalCard");
    const gameModalTitle = document.getElementById("gameModalTitle");
    const gameModalBody = document.getElementById("gameModalBody");
    const modalConfirmBtn = document.getElementById("modalConfirmBtn");
    const modalResetButtonGroup = document.getElementById("modalResetButtonGroup");

    // 로컬 스토리지에서 데이터 불러오기 함수
    function loadSavedRecords() {
      const savedWinCount = localStorage.getItem("merlin_wincount");
      const savedHistory = localStorage.getItem("merlin_history");

      if (savedWinCount) {
        wincount = parseInt(savedWinCount);
        winCountEl.textContent = "성공 횟수 : " + wincount + "회";
      }
      
      if (savedHistory) {
        historyList = JSON.parse(savedHistory);
        renderTableRecords();
      }
    }

    // 로컬 스토리지에 데이터 저장하기 함수
    function saveRecords() {
      localStorage.setItem("merlin_wincount", wincount);
      localStorage.setItem("merlin_history", JSON.stringify(historyList));
    }

    function validateAndStart() {
      let r = parseInt(document.getElementById("txt1").value);
      let c = parseInt(document.getElementById("txt2").value);

      if (isNaN(r) || r < 1) r = 1;
      if (r > 10) r = 10;
      if (isNaN(c) || c < 1) c = 1;
      if (c > 10) c = 10;

      document.getElementById("txt1").value = r;
      document.getElementById("txt2").value = c;

      main(r, c);
    }

    function main(a1, a2) {
      list = [];
      count = 1;
      isGameClear = false;

      b1 = parseInt(a1);
      b2 = parseInt(a2);

      puzzleCardEl.classList.remove("game-success"); 
      puzzleGridWrapper.classList.remove("grid-locked");
      statusDisplay.style.color = "var(--text-sub)";
      statusDisplay.innerHTML = `Turn : <span id="turnCount">0</span>`;

      let tag = "";
      for (let j = 0; j < b1; j++) {
        tag += "<div class='row'>";
        for (let i = 0; i < b2; i++) {
          const id = i + j * b2;
          const value = Math.floor(Math.random() * 2);
          list.push(value);
          tag += `<div class='cell' id='${id}' onclick='clickbt(${id})'>${value}</div>`;
        }
        tag += "</div>";
      }

      puzzleGridWrapper.innerHTML = tag;
      all_bg();
      
      if (checkSuccessCondition()) {
        main(a1, a2);
      }
    }

    function bg(bl) {
      const cell = document.getElementById(bl);
      if (!cell) return;
      if (list[bl] === 0) {
        cell.style.backgroundColor = "#dddddd";
        cell.classList.remove("on");
      } else {
        cell.style.backgroundColor = "var(--danger)"; 
        cell.classList.add("on");
      }
    }

    function all_bg() {
      for (let k = 0; k < b1 * b2; k++) {
        bg(k);
      }
    }

    function checkSuccessCondition() {
      const sum = list.reduce((a, c) => a + c, 0);
      const average = sum / list.length;
      return average === 0 || average === 1;
    }

    function success() {
      const currentTurnCountEl = document.getElementById("turnCount");
      
      if (checkSuccessCondition()) {
        statusDisplay.innerHTML = `<span style="color:var(--success)">성공! (${count}턴)</span>`;
        
        puzzleCardEl.classList.add("game-success");

        wincount++;
        winCountEl.textContent = "성공 횟수 : " + wincount + "회";

        historyList.push({ id: wincount, stage: `${b1}x${b2}`, turns: count });
        
        saveRecords();
        renderTableRecords();
        
        isGameClear = true;
        puzzleGridWrapper.classList.add("grid-locked");

        gameModalCard.style.borderTop = "6px solid var(--success)";
        gameModalTitle.style.color = "var(--success)";
        gameModalTitle.textContent = "🎉 성공!";
        gameModalBody.innerHTML = `<b>${b1}x${b2} 단계</b>를 ${count}턴 만에 통일했습니다!`;
        
        modalConfirmBtn.style.display = "block";
        modalResetButtonGroup.style.display = "none";
        gameModalOverlay.classList.add("active");
      } else {
        if (currentTurnCountEl) {
          currentTurnCountEl.textContent = count;
        }
        count++;
        all_bg();
      }
    }

    // ★ 렌더링 테이블 수정 및 합계 요약 기능 추가 
    function renderTableRecords() {
      if (historyList.length === 0) {
        recordTableBody.innerHTML = `<tr><td colspan="3" style="color: #aaa; padding: 20px 0;">성공 기록이 없습니다.</td></tr>`;
        return;
      }

      let tableHtml = "";
      
      // 1. 기본 기록 행 생성
      for (let i = 0; i < historyList.length; i++) {
        const isLatest = (i === historyList.length - 1); 
        const rowClass = isLatest ? "class='latest-row'" : ""; 
        
        tableHtml += `
          <tr ${rowClass}>
            <td>${historyList[i].id}</td>
            <td>${historyList[i].stage}</td>
            <td>${historyList[i].turns}턴</td>
          </tr>
        `;
      }

      // 2. 누적 합계 데이터 계산
      let summary = {};
      historyList.forEach(record => {
        let stage = record.stage; // 예: "3x3"
        let turns = record.turns;

        if (!summary[stage]) {
          let parts = stage.split('x');
          let r = parseInt(parts[0]);
          let c = parseInt(parts[1]);
          summary[stage] = { sizeCount: r * c, under: 0, over: 0 };
        }

        if (turns <= summary[stage].sizeCount) {
          summary[stage].under++;
        } else {
          summary[stage].over++;
        }
      });

      // 3. 누적 합계 영역 렌더링
      let summaryHtml = "";
      for (let stage in summary) {
        let data = summary[stage];
        let parts = stage.split('x');
        
        // 요구하신 "3*3이면 9회 이하: 0회, 10회 이상: 0회" 출력 형식 적용
        summaryHtml += `<div class="summary-item">▶ ${parts[0]}*${parts[1]} : ${data.sizeCount}회 이하 ${data.under}회, ${data.sizeCount + 1}회 이상 ${data.over}회</div>`;
      }

      // 마지막 행에 합계 병합(colspan=3) 추가
      tableHtml += `
        <tr>
          <td colspan="3" class="summary-cell">
            <div class="summary-title">[ 크기별 성공 횟수 합계 ]</div>
            ${summaryHtml}
          </td>
        </tr>
      `;

      recordTableBody.innerHTML = tableHtml;
    }

    function clickbt(location) {
      if (isGameClear) return;

      list[location] = (list[location] + 1) % 2;
      document.getElementById(location).innerText = list[location];
      bg(location);

      if ((location + 1) % b2 !== 0) {
        list[location + 1] = (list[location + 1] + 1) % 2;
        document.getElementById(location + 1).innerText = list[location + 1];
        bg(location + 1);
      }

      if (location % b2 !== 0) {
        list[location - 1] = (list[location - 1] + 1) % 2;
        document.getElementById(location - 1).innerText = list[location - 1];
        bg(location - 1);
      }

      if (location < (b1 - 1) * b2) {
        list[location + b2] = (list[location + b2] + 1) % 2;
        document.getElementById(location + b2).innerText = list[location + b2];
        bg(location + b2);
      }

      if (location >= b2) {
        list[location - b2] = (list[location - b2] + 1) % 2;
        document.getElementById(location - b2).innerText = list[location - b2];
        bg(location - b2);
      }

      success();
    }

    /* ==========================================================================
       동적 모달창 제어 로직 인터페이스
       ========================================================================== */
    function openClearModal() {
      gameModalCard.style.borderTop = "6px solid var(--danger)";
      gameModalTitle.style.color = "var(--danger)";
      gameModalTitle.textContent = "기록 초기화";
      gameModalBody.innerHTML = "누적 기록을 모두 삭제하시겠습니까?";
      
      modalConfirmBtn.style.display = "none";
      modalResetButtonGroup.style.display = "flex";
      gameModalOverlay.classList.add("active");
    }

    function closeModal() {
      gameModalOverlay.classList.remove("active");
    }

    function confirmClearRecords() {
      wincount = 0;
      historyList = [];
      winCountEl.textContent = "성공 횟수 : 0회";
      localStorage.removeItem("merlin_wincount");
      localStorage.removeItem("merlin_history");
      renderTableRecords();
      closeModal();
    }

    window.onload = () => {
      loadSavedRecords(); 
      main(document.getElementById("txt1").value, document.getElementById("txt2").value);
    };
  </script>
</body>
</html>
